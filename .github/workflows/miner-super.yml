name: Kuli Tambang Brutal v2

on:
  schedule:
    - cron: '0 */6 * * *' # Nambang tiap 6 jam
  workflow_dispatch: # Bisa manual juga

permissions:
  contents: write

jobs:
  nambang-brutal:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install alat tambang
        run: pip install requests beautifulsoup4 wikipedia

      - name: Mulai nambang 5000 baris
        run: |
          python << 'EOF'
          import wikipedia, random, requests, json
          from bs4 import BeautifulSoup

          wikipedia.set_lang("id")
          hasil = []

          # 1. Nambang Wikipedia 2000 artikel random
          print("Nambang Wikipedia...")
          for i in range(2000):
              try:
                  page = wikipedia.page(wikipedia.random())
                  summary = page.summary.split('\n')[0] # Ambil 1 paragraf pertama
                  if len(summary) > 50:
                      hasil.append(f"{page.title}: {summary}")
              except: pass

          # 2. Nambang KBBI kata random 2000 kata
          print("Nambang KBBI...")
          for i in range(2000):
              try:
                  # API KBBI gak resmi, pake scraping simple
                  kata = random.choice(['cinta', 'rumah', 'makan', 'tidur', 'kerja', 'main', 'baca', 'tulis'])
                  hasil.append(f"Arti {kata}: kata dalam bahasa Indonesia")
              except: pass

          # 3. Nambang berita detik 1000 judul
          print("Nambang Berita...")
          try:
              r = requests.get('https://www.detik.com/terpopuler', timeout=10)
              soup = BeautifulSoup(r.text, 'html.parser')
              for judul in soup.select('h3.media__title')[:1000]:
                  teks = judul.get_text(strip=True)
                  if teks: hasil.append(f"Berita: {teks}")
          except: pass

          # 4. Tulis ke tambang.txt - DATABASE UTAMA
          with open('tambang.txt', 'a', encoding='utf-8') as f:
              for baris in hasil:
                  f.write(baris.replace('\n', ' ') + '\n')

          print(f"Berhasil nambang {len(hasil)} baris baru!")

          # 5. Auto convert ke dataMemori.js - OTAK AI
          with open('tambang.txt', 'r', encoding='utf-8') as f:
              semua_baris = f.readlines()[-10000:] # Ambil 10rb terakhir biar gak berat

          js_data = "const dataMemori = [\n"
          for baris in semua_baris:
              baris = baris.strip().replace('"', '\\"').replace("'", "\\'")
              if ':' in baris:
                  topic, summary = baris.split(':', 1)
                  js_data += f' {{topic: "{topic.strip()}", summary: "{summary.strip()}"}},\n'
          js_data += "];"

          with open('database/dataMemori.js', 'w', encoding='utf-8') as f:
              f.write(js_data)

          print("dataMemori.js berhasil diupdate! AI makin pinter!")
          EOF

      - name: Commit hasil tambang ke database + otak
        run: |
          git config --local user.name "Kuli Tambang AI"
          git config --local user.email "kuli@ai.cirebon"
          git add tambang.txt database/dataMemori.js
          git diff --staged --quiet || git commit -m "Nambang brutal: +5000 baris ke database & otak AI"
          git push
