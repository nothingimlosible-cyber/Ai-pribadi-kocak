      - name: Smart Mining v2.0
        run: |
          python3 -c "
          import yaml, json, os, time
          db_path = 'database'
          if not os.path.exists(db_path): os.makedirs(db_path)
          
          # 1. PROSES PENAMBANGAN DATA BARU
          if os.path.exists('tambang.txt'):
              with open('tambang.txt', 'r', encoding='utf-8') as f:
                  raw_content = f.read().strip()
              
              if raw_content:
                  blocks = [b.strip() for b in raw_content.split('---') if b.strip()]
                  new_entries = []
                  for block in blocks:
                      lines = block.split('\n')
                      if len(lines) >= 2:
                          topic = lines[0].strip()
                          body = ' '.join([l.strip() for l in lines[1:] if l.strip()])
                          new_entries.append({
                              'id': int(time.time()) + len(new_entries),
                              'topic': topic,
                              'summary': body,
                              'date': time.strftime('%Y-%m-%d')
                          })
                  
                  if new_entries:
                      filename = f'mine_{int(time.time())}.yml'
                      with open(os.path.join(db_path, filename), 'w', encoding='utf-8') as f:
                          yaml.dump(new_entries, f, allow_unicode=True)
                      print(f'Sukses nambang {len(new_entries)} data.')
              
              # Kosongkan file tambang.txt setelah diproses
              open('tambang.txt', 'w').close()

          # 2. PENGGABUNGAN SEMUA DATA KE OTAKAI.JS
          merged_data = []
          if os.path.exists(db_path):
              for f_name in sorted(os.listdir(db_path)):
                  if f_name.endswith(('.yml', '.yaml')):
                      with open(os.path.join(db_path, f_name), 'r', encoding='utf-8') as f:
                          data = yaml.safe_load(f)
                          if isinstance(data, list):
                              merged_data.extend(data)
          
          # Tulis hasil akhir ke otakai.js
          with open('otakai.js', 'w', encoding='utf-8') as f:
              json_str = json.dumps(merged_data, indent=2, ensure_ascii=False)
              f.write(f'const dataMemori = {json_str};')
          "
