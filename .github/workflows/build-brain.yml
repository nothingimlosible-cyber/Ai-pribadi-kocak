          # PROSES GABUNGIN SEMUA & BIKIN LOGIKA PINTER
          merged_data = []
          if os.path.exists(db_path):
              for filename in sorted(os.listdir(db_path)):
                  if filename.endswith(('.yml', '.yaml')):
                      with open(os.path.join(db_path, filename), 'r', encoding='utf-8') as f:
                          content = yaml.safe_load(f)
                          if isinstance(content, list): merged_data.extend(content)
          
          # BIKIN OTAKAI.JS DENGAN LOGIKA "BALAS"
          # Kita pakai teknik pencarian kata kunci (keyword matching)
          js_brain = f"""
const memoriAlan = {json.dumps(merged_data, indent=2, ensure_ascii=False)};

const tanyaRobot = (pesan) => {{
    const input = pesan.toLowerCase();
    // Cari data yang paling nyambung sama topik atau ringkasan
    const temuan = memoriAlan.find(item => 
        input.includes(item.topic.toLowerCase()) || 
        item.summary.toLowerCase().includes(input)
    );

    if (temuan) {{
        return `[INFO TAMBANG] Bos Alan, soal ${{temuan.topic}}: ${{temuan.summary}} (Data tgl: ${{temuan.date}})`;
    } else {{
        return "Aduh Bos, data itu belum ada di tambang. Coba isi tambang.txt dulu!";
    }}
}};

module.exports = {{ tanyaRobot, memoriAlan }};
"""
          with open('otakai.js', 'w', encoding='utf-8') as f:
              f.write(js_brain)
