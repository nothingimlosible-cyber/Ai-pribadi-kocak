name: Auto Build Brain
on:
  push:
    paths:
      - 'database/**' # Robot jalan kalau ada file di folder database yang berubah

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Merge All YAMLs to JS
        run: |
          python -c "
          import yaml, json, os
          merged_data = []
          db_path = 'database'
          try:
              if os.path.exists(db_path):
                  # Ambil semua file .yml di folder database
                  for filename in sorted(os.listdir(db_path)):
                      if filename.endswith('.yml') or filename.endswith('.yaml'):
                          with open(os.path.join(db_path, filename), 'r', encoding='utf-8') as f:
                              content = yaml.safe_load(f)
                              if isinstance(content, list):
                                  merged_data.extend(content)
              
              with open('otakai.js', 'w', encoding='utf-8') as f:
                  f.write('const otakAI = ' + json.dumps(merged_data, indent=2, ensure_ascii=False) + ';')
              print(f'Berhasil gabungin {len(merged_data)} data!')
          except Exception as e:
              print(f'Error: {e}'); exit(1)
          "
      
      - name: Push Ke Repositori
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add otakai.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Merge semua otak otomatis" && git push)
