name: Auto Build & Mine Brain
on:
  push:
    paths:
      - 'database/**'
      - 'tambang.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: pip install pyyaml

      - name: Auto Mining & Merging
        run: |
          python -c "
          import yaml, json, os, time
          db_path = 'database'
          if not os.path.exists(db_path): os.makedirs(db_path)
          
          # 1. PROSES MINING
          if os.path.exists('tambang.txt'):
              with open('tambang.txt', 'r', encoding='utf-8') as f:
                  raw_content = f.read().strip()
              
              if raw_content:
                  blocks = raw_content.split('---')
                  new_entries = []
                  for block in blocks:
                      lines = block.strip().split('\n')
                      if len(lines) >= 2:
                          topic = lines[0].strip()
                          summary = ' '.join(lines[1:]).replace('\"', '\\\"')
                          new_entries.append({
                              'id': int(time.time()) + len(new_entries),
                              'topic': topic,
                              'summary': summary,
                              'date': time.strftime('%Y-%m-%d')
                          })
                  if new_entries:
                      filename = f'mine_bulk_{int(time.time())}.yml'
                      with open(os.path.join(db_path, filename), 'w', encoding='utf-8') as f:
                          yaml.dump(new_entries, f)
                  open('tambang.txt', 'w').close()

          # 2. PROSES GABUNGIN
          merged_data = []
          if os.path.exists(db_path):
              for filename in sorted(os.listdir(db_path)):
                  if filename.endswith(('.yml', '.yaml')):
                      with open(os.path.join(db_path, filename), 'r', encoding='utf-8') as f:
                          content = yaml.safe_load(f)
                          if isinstance(content, list): merged_data.extend(content)
          
          # Tulis ke otakai.js (Pake format yang lebih aman dari bentrokan tanda petik)
          json_data = json.dumps(merged_data, indent=2, ensure_ascii=False)
          js_template = f'''
          const dataMemori = {json_data};
          function balas(pesan) {{
              const input = pesan.toLowerCase();
              const hasil = dataMemori.find(item => 
                  input.includes(item.topic.toLowerCase()) || 
                  item.summary.toLowerCase().includes(input)
              );
              if (hasil) {{
                  return \"[ALAN-AI] Mengenai \" + hasil.topic + \": \" + hasil.summary + \" (Diperbarui: \" + hasil.date + \")\";
              }} else {{
                  return \"Maaf Bos Alan, data itu belum ada di tambang. Isi tambang.txt dulu ya!\";
              }}
          }}
          module.exports = {{ dataMemori, balas }};
          '''
          with open('otakai.js', 'w', encoding='utf-8') as f:
              f.write(js_template.strip())
          "
      
      - name: Save Changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Robot nambang borongan ⛏️📦" && git push)
