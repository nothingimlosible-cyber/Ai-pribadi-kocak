      - name: Smart Mining v2.0
        run: |
          python -c "
          import yaml, json, os, time
          db_path = 'database'
          if not os.path.exists(db_path): os.makedirs(db_path)
          
          if os.path.exists('tambang.txt'):
              with open('tambang.txt', 'r', encoding='utf-8') as f:
                  raw_content = f.read().strip()
              
              if raw_content:
                  # Pisah per blok materi
                  blocks = [b.strip() for b in raw_content.split('---') if b.strip()]
                  new_entries = []
                  for block in blocks:
                      lines = block.split('\n')
                      if len(lines) >= 2:
                          topic = lines[0].strip()
                          # Gabungin sisa baris jadi satu summary, bersihin spasi double
                          body = ' '.join([l.strip() for l in lines[1:] if l.strip()])
                          
                          new_entries.append({
                              'id': int(time.time()) + len(new_entries),
                              'topic': topic,
                              'summary': body,
                              'date': time.strftime('%Y-%m-%d')
                          })
                  
                  if new_entries:
                      filename = f'mine_v2_{int(time.time())}.yml'
                      with open(os.path.join(db_path, filename), 'w', encoding='utf-8') as f:
                          yaml.dump(new_entries, f, allow_unicode=True)
                      print(f'✅ Berhasil nambang {len(new_entries)} materi baru.')
                  
                  # Kosongkan tambang setelah sukses
                  open('tambang.txt', 'w').close()

          # MERGE SEMUA KE OTAKAI.JS (Sistem Database Utama)
          merged_data = []
          if os.path.exists(db_path):
              files = sorted([f for f in os.listdir(db_path) if f.endswith(('.yml', '.yaml'))])
              for filename in files:
                  with open(os.path.join(db_path, filename), 'r', encoding='utf-8') as f:
                      content = yaml.safe_load(f)
                      if isinstance(content, list): merged_data.extend(content)
          
          with open('otakai.js', 'w', encoding='utf-8') as f:
              f.write(f'const dataMemori = {json.dumps(merged_data, indent=2, ensure_ascii=False)};')
          "
