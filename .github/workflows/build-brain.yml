name: Auto Build Brain
on:
  push:
    paths:
      - 'database/**' # Robot jalan kalau ada file baru di folder database

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Merge All YAMLs to JS
        run: |
          python -c "
          import yaml, json, os
          merged_data = []
          db_path = 'database'
          if not os.path.exists(db_path):
              os.makedirs(db_path)
          
          files = [f for f in os.listdir(db_path) if f.endswith('.yml') or f.endswith('.yaml')]
          for filename in sorted(files):
              with open(os.path.join(db_path, filename), 'r', encoding='utf-8') as f:
                  content = yaml.safe_load(f)
                  if isinstance(content, list):
                      merged_data.extend(content)
          
          with open('otakai.js', 'w', encoding='utf-8') as f:
              f.write('const otakAI = ' + json.dumps(merged_data, indent=2, ensure_ascii=False) + ';')
          print(f'Total {len(merged_data)} data berhasil digabung!')
          "
      
      - name: Push Ke Repositori
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add otakai.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Merge otak otomatis" && git push)
