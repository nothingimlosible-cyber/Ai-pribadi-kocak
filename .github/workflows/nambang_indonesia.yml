name: Robot Kuli v5 - Penumpuk Memori Abadi

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install wikipedia pyyaml

      - name: Eksekusi Tumpuk Ilmu
        run: |
          python << 'EOF'
          import wikipedia, os, time, random, yaml, json, re

          wikipedia.set_lang("id")
          folder_db = 'database'
          path_keys = os.path.join(folder_db, 'keywords.yml')
          path_otak_js = 'otakai.js'

          def load_yml(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          res = yaml.safe_load(f)
                          return res if isinstance(res, list) else []
                      except: return []
              return []

          # 1. BACA MEMORI LAMA DARI OTAKAI.JS (Biar bisa nambahin)
          memori_sekarang = []
          if os.path.exists(path_otak_js):
              with open(path_otak_js, 'r', encoding='utf-8') as f:
                  konten_js = f.read()
                  # Ekstrak JSON dari dalam variabel JS menggunakan Regex
                  match = re.search(r'const dataMemori = (\[.*\]);', konten_js, re.DOTALL)
                  if match:
                      try:
                          memori_sekarang = json.loads(match.group(1))
                      except: memori_sekarang = []

          # 2. NAMBANG ILMU BARU
          all_keywords = load_yml(path_keys)
          if not all_keywords: all_keywords = ["Teknologi", "Sejarah"]
          selected_keys = random.sample(all_keywords, min(len(all_keywords), 2))
          
          hasil_baru = []
          for key in selected_keys:
              try:
                  search_results = wikipedia.search(key, results=3)
                  for title in search_results[:2]:
                      p = wikipedia.page(title)
                      hasil_baru.append({
                          "id": int(time.time() * 1000) + random.randint(1, 999),
                          "t": p.title,
                          "s": p.summary.split('\n')[0][:150],
                          "d": time.strftime('%Y-%m-%d')
                      })
              except: continue

          # 3. GABUNGKAN (TUMPUK)
          # Cek duplikat biar gak ada judul yang sama masuk dua kali
          existing_titles = {str(item.get('t') or item.get('topic')).lower() for item in memori_sekarang}
          data_unik = [n for n in hasil_baru if n['t'].lower() not in existing_titles]
          
          # Tumpuk data baru di ATAS data lama (biar yang paling baru di paling atas)
          memori_total = data_unik + memori_sekarang

          # 4. SIMPAN KEMBALI KE OTAKAI.JS (TANPA BATAS 100)
          # Kita kasih limit longgar 2000 data biar web tetep lancar tapi pinter banget
          memori_final = memori_total[:2000] 
          
          js_content = "const dataMemori = " + json.dumps(memori_final, indent=2, ensure_ascii=False) + ";"
          with open(path_otak_js, 'w', encoding='utf-8') as f:
              f.write(js_content)

          print(f"✅ Memori bertambah! Total ilmu di otak: {len(memori_final)}")
          EOF

      - name: Push Update
        run: |
          git config --local user.name "Robot Kuli v5"
          git config --local user.email "robot@smartai.alan"
          git add otakai.js
          git diff --staged --quiet || (git commit -m "Memory: Menambah ilmu baru ke otak" && git push)
