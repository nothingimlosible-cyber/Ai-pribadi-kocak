name: Kuli Tambang Brutal v2 - Hybrid DB

on:
  schedule:
    - cron: '0 */6 * * *' # Jalan otomatis tiap 6 jam
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4 # Perbaikan sedikit di sini (ambassadors -> actions)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Alat Tambang
        run: pip install requests beautifulsoup4 wikipedia pyyaml

      - name: Eksekusi Robot Tambang
        run: |
          python << 'EOF'
          import wikipedia, requests, os, time, random, yaml, json
          from bs4 import BeautifulSoup

          wikipedia.set_lang("id")
          hasil_tambang = []
          tgl = time.strftime('%Y-%m-%d')

          # --- TAHAP 1: NAMBANG DATA ---
          print("⛏️ Nambang Wikipedia...")
          try:
              random_pages = wikipedia.random(pages=20) # Kurangi dikit biar gak limit
              for p in random_pages:
                  try:
                      pg = wikipedia.page(p)
                      sumry = pg.summary.split('\n')[0]
                      if len(sumry) > 50:
                          hasil_tambang.append({"topic": pg.title, "summary": sumry[:250]})
                  except: pass
          except: pass

          print("⛏️ Nambang Berita Terkini...")
          try:
              r = requests.get('https://www.detik.com/terpopuler', timeout=10)
              soup = BeautifulSoup(r.text, 'html.parser')
              for jdl in soup.select('.media__title a')[:20]:
                  teks = jdl.get_text().strip()
                  if teks:
                      hasil_tambang.append({"topic": "Berita Terkini", "summary": teks})
          except: pass

          # --- TAHAP 2: SIMPAN KE GUDANG (YAML) ---
          file_yml = 'database/otakai.yml'
          os.makedirs('database', exist_ok=True)
          
          data_lama = []
          if os.path.exists(file_yml):
              with open(file_yml, 'r', encoding='utf-8') as f:
                  data_lama = yaml.safe_load(f) or []

          new_entries = []
          for item in hasil_tambang:
              new_entries.append({
                  "id": int(time.time() * 1000) + random.randint(1, 9999),
                  "topic": item["topic"],
                  "summary": item["summary"],
                  "date": tgl
              })

          data_total = data_lama + new_entries
          # UBAH LIMIT KE 100 BIAR RINGAN
          data_final = data_total[-100:] 

          with open(file_yml, 'w', encoding='utf-8') as f:
              yaml.dump(data_final, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          # --- TAHAP 3: BAGI KE OTAK (JS) ---
          file_js = 'database/otakai.js'
          js_content = "const dataMemori = " + json.dumps(data_final, indent=2, ensure_ascii=False) + ";"
          
          with open(file_js, 'w', encoding='utf-8') as f:
              f.write(js_content)

          print(f"✅ Selesai! {len(new_entries)} data baru masuk. Total database: {len(data_final)} baris.")
          EOF

      - name: Push Perubahan ke Repo
        run: |
          git config --local user.name "Kuli Tambang Robot"
          git config --local user.email "robot@smartai.alan"
          git add database/otakai.yml database/otakai.js
          git diff --staged --quiet || (git commit -m "Robot Update: Database 100 baris terbaru" && git push)
