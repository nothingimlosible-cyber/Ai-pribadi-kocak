name: Kuli Tambang Brutal v3 - Jalur Folder Benar

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install wikipedia pyyaml

      - name: Eksekusi Tambah Data
        run: |
          python << 'EOF'
          import wikipedia, os, time, random, yaml, json

          wikipedia.set_lang("id")
          tgl_sekarang = time.strftime('%Y-%m-%d')
          
          # PATH DISESUAIKAN DENGAN FOLDER KAMU
          path_data = 'data.yml'
          path_keys = 'basis data/keywords.yml' # <--- Ini kuncinya, Lan!
          path_otak_js = 'otakai.js'

          def load_yml(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          res = yaml.safe_load(f)
                          return res if isinstance(res, list) else []
                      except: return []
              return []

          # 1. BACA KEYWORDS DARI FOLDER 'basis data'
          all_keywords = load_yml(path_keys)
          
          if not all_keywords:
              print("❌ ERROR: File keywords.yml di folder 'basis data' kosong atau gak ketemu!")
              all_keywords = ["HTML", "Sejarah", "Fakta Unik"]
          
          selected_keys = random.sample(all_keywords, min(len(all_keywords), 2))
          print(f"🎯 Sesi ini nambang topik: {selected_keys}")

          hasil_nambang_baru = []

          # 2. PROSES SEARCH
          for key in selected_keys:
              try:
                  search_results = wikipedia.search(key, results=5)
                  random.shuffle(search_results)
                  for title in search_results[:2]:
                      try:
                          p = wikipedia.page(title)
                          hasil_nambang_baru.append({
                              "id": int(time.time() * 1000) + random.randint(1, 9999),
                              "topic": p.title,
                              "summary": p.summary.split('\n')[0][:250],
                              "date": tgl_sekarang
                          })
                      except: continue
              except: continue

          # 3. UPDATE GUDANG (data.yml) - MURNI TAMBAH
          gudang_lama = load_yml(path_data)
          topik_lama = [item.get('topic') for item in gudang_lama if isinstance(item, dict)]
          
          data_fix_masuk = [n for n in hasil_nambang_baru if n['topic'] not in topik_lama]
          data_total_final = gudang_lama + data_fix_masuk

          with open(path_data, 'w', encoding='utf-8') as f:
              yaml.dump(data_total_final, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          # 4. UPDATE OTAK (otakai.js)
          memori_web = data_total_final[-100:]
          js_content = "const dataMemori = " + json.dumps(memori_web, indent=2, ensure_ascii=False) + ";"
          with open(path_otak_js, 'w', encoding='utf-8') as f:
              f.write(js_content)

          print(f"✅ BERHASIL! Database nambah jadi {len(data_total_final)} data.")
          EOF

      - name: Push ke GitHub
        run: |
          git config --local user.name "Kuli Tambang Robot"
          git config --local user.email "robot@smartai.alan"
          # Kita hapus keywords.yml yang nyasar di root kalau ada
          rm -f keywords.yml 
          git add data.yml otakai.js
          git diff --staged --quiet || (git commit -m "Mining: Pakai keyword dari folder basis data" && git push)
