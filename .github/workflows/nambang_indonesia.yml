name: Kuli Tambang Brutal v3 - Final Indonesia

on:
  schedule:
    - cron: '0 */6 * * *' # Jalan tiap 6 jam otomatis
  workflow_dispatch: # Bisa diklik manual

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install requests beautifulsoup4 wikipedia pyyaml

      - name: Proses Tambang & Sinkronisasi
        run: |
          python << 'EOF'
          import wikipedia, requests, os, time, random, yaml, json
          from bs4 import BeautifulSoup

          # Setup
          wikipedia.set_lang("id")
          tgl_sekarang = time.strftime('%Y-%m-%d')
          os.makedirs('database', exist_ok=True)
          
          path_data = 'database/data.yml'
          path_sapaan = 'database/sapaan.yml'
          path_otak_js = 'otakai.js' # File di ROOT

          hasil_baru = []

          # 1. PROSES NAMBANG
          print("⛏️ Memulai penambangan Indonesia...")
          try:
              # Wikipedia id
              random_titles = wikipedia.random(pages=25)
              for title in random_titles:
                  try:
                      p = wikipedia.page(title)
                      hasil_baru.append({"t": p.title, "s": p.summary.split('\n')[0][:250]})
                  except: pass
              
              # Detik Terpopuler
              r = requests.get('https://www.detik.com/terpopuler', timeout=10)
              soup = BeautifulSoup(r.text, 'html.parser')
              for link in soup.select('.media__title a')[:20]:
                  hasil_baru.append({"t": "Berita Terkini", "s": link.get_text().strip()})
          except Exception as e:
              print(f"⚠️ Skip nambang karena: {e}")

          # 2. BACA DATABASE LAMA (Gudang)
          def load_yml(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          return yaml.safe_load(f) or []
                      except: return []
              return []

          data_lama = load_yml(path_data)
          sapaan_lama = load_yml(path_sapaan)

          # 3. KONVERSI HASIL BARU KE FORMAT YAML
          for item in hasil_baru:
              data_lama.append({
                  "id": int(time.time() * 1000) + random.randint(1, 9999),
                  "topic": item["t"],
                  "summary": item["s"],
                  "date": tgl_sekarang
              })

          # Simpan kembali ke database/data.yml (Limit 500 baris agar file gudang gak meledak)
          data_gudang = data_lama[-500:]
          with open(path_data, 'w', encoding='utf-8') as f:
              yaml.dump(data_gudang, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          # 4. MERACIK OTAKAI.JS (Sapaan + Data Terbaru)
          # Ambil semua sapaan + 100 data hasil tambang terbaru
          gabungan_final = sapaan_lama + data_gudang[-100:]
          
          # Tulis ke ROOT sebagai otakai.js
          js_output = "const dataMemori = " + json.dumps(gabungan_final, indent=2, ensure_ascii=False) + ";"
          with open(path_otak_js, 'w', encoding='utf-8') as f:
              f.write(js_output)

          print(f"✅ SUKSES: {len(hasil_baru)} data ditambang. otakai.js diupdate di root!")
          EOF

      - name: Simpan ke GitHub
        run: |
          git config --local user.name "Kuli Tambang Robot"
          git config --local user.email "robot@smartai.alan"
          # Git add spesifik ke file-file penting
          git add database/data.yml database/sapaan.yml otakai.js
          git diff --staged --quiet || (git commit -m "Robot Brutal: Sinkronisasi Gudang & Otak AI" && git push)
