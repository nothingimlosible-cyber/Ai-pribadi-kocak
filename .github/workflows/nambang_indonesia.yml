name: Kuli Tambang Brutal v3 - Fix Logic

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install requests beautifulsoup4 wikipedia pyyaml

      - name: Proses Tambang & Sinkronisasi
        run: |
          python << 'EOF'
          import wikipedia, requests, os, time, random, yaml, json
          from bs4 import BeautifulSoup

          # Setup
          wikipedia.set_lang("id")
          tgl_sekarang = time.strftime('%Y-%m-%d')
          os.makedirs('database', exist_ok=True)
          
          path_data = 'database/data.yml'
          path_sapaan = 'database/sapaan.yml'
          path_otak_js = 'otakai.js'

          # --- 1. PROSES NAMBANG INFO BARU ---
          print("⛏️ Nambang Info (Wikipedia & Detik)...")
          hasil_nambang_baru = []
          try:
              # Wikipedia
              titles = wikipedia.random(pages=15)
              for t in titles:
                  try:
                      p = wikipedia.page(t)
                      hasil_nambang_baru.append({
                          "id": int(time.time() * 1000) + random.randint(1, 999),
                          "topic": p.title,
                          "summary": p.summary.split('\n')[0][:250],
                          "date": tgl_sekarang
                      })
                  except: pass
              # Detik
              r = requests.get('https://www.detik.com/terpopuler', timeout=10)
              soup = BeautifulSoup(r.text, 'html.parser')
              for link in soup.select('.media__title a')[:10]:
                  hasil_nambang_baru.append({
                      "id": int(time.time() * 1000) + random.randint(1, 999),
                      "topic": "Berita Terkini",
                      "summary": link.get_text().strip(),
                      "date": tgl_sekarang
                  })
          except Exception as e:
              print(f"⚠️ Gagal nambang: {e}")

          # --- 2. BACA DATABASE LAMA (Gudang Data) ---
          def load_yml(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          res = yaml.safe_load(f)
                          return res if isinstance(res, list) else []
                      except: return []
              return []

          gudang_data_lama = load_yml(path_data)
          sapaan_static = load_yml(path_sapaan)

          # Gabung data lama + hasil nambang baru (Hanya untuk data.yml)
          update_gudang = gudang_data_lama + hasil_nambang_baru
          # Simpan 500 data terbaru di gudang
          update_gudang = update_gudang[-500:]

          with open(path_data, 'w', encoding='utf-8') as f:
              yaml.dump(update_gudang, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          # --- 3. MERACIK OTAKAI.JS (Sapaan + 100 Info Terbaru) ---
          # Di sini kuncinya: Sapaan diambil dari sapaan.yml, Info diambil dari data.yml
          gabungan_final = sapaan_static + update_gudang[-100:]
          
          js_content = "const dataMemori = " + json.dumps(gabungan_final, indent=2, ensure_ascii=False) + ";"
          with open(path_otak_js, 'w', encoding='utf-8') as f:
              f.write(js_content)

          print(f"✅ SUKSES! Tambang berhasil. Otak berisi {len(sapaan_static)} sapaan & 100 info baru.")
          EOF

      - name: Simpan ke GitHub
        run: |
          git config --local user.name "Kuli Tambang Robot"
          git config --local user.email "robot@smartai.alan"
          git add database/data.yml otakai.js
          git diff --staged --quiet || (git commit -m "Fix Logic: Nambang Info & Sync Sapaan" && git push)
