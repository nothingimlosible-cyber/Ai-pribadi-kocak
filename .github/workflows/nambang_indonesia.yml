name: Kuli Tambang Brutal v3 - Keyword Focus (Small JS)

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  nambang:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install requests beautifulsoup4 wikipedia pyyaml

      - name: Proses Tambang Berbasis Keyword
        run: |
          python << 'EOF'
          import wikipedia, requests, os, time, random, yaml, json
          from bs4 import BeautifulSoup

          wikipedia.set_lang("id")
          tgl_sekarang = time.strftime('%Y-%m-%d')
          os.makedirs('database', exist_ok=True)
          
          # Path sesuai request Alan
          path_data = 'database/data.yml'
          path_sapaan = 'database/sapaan.yml'
          path_keys = 'database/keywords.yml'
          path_otak_js = 'otakai.js' # DI ROOT

          def load_yml(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          res = yaml.safe_load(f)
                          return res if isinstance(res, list) else []
                      except: return []
              return []

          # 1. BACA KATA KUNCI (UMPAN)
          keywords = load_yml(path_keys)
          if not keywords:
              keywords = ["Teknologi", "Sejarah", "Bisnis"]

          hasil_nambang_baru = []

          # 2. PROSES NAMBANG
          print(f"⛏️ Nambang pake kata kunci: {keywords}")
          for key in keywords:
              try:
                  search_results = wikipedia.search(key, results=3)
                  for title in search_results:
                      try:
                          p = wikipedia.page(title)
                          hasil_nambang_baru.append({
                              "id": int(time.time() * 1000) + random.randint(1, 9999),
                              "topic": p.title,
                              "summary": p.summary.split('\n')[0][:250],
                              "date": tgl_sekarang
                          })
                      except: continue
              except: continue

          # 3. UPDATE GUDANG (data.yml)
          gudang_data_lama = load_yml(path_data)
          # Gabung & simpan 500 data terakhir biar gudang aman
          update_gudang = (gudang_data_lama + hasil_nambang_baru)[-500:]

          with open(path_data, 'w', encoding='utf-8') as f:
              yaml.dump(update_gudang, f, allow_unicode=True, default_flow_style=False, sort_keys=False)

          # 4. RACIK OTAK KECIL (otakai.js)
          sapaan_static = load_yml(path_sapaan)
          
          # Gabungkan sapaan + hanya 100 data terbaru (BIAR KECIL & ENTENG)
          gabungan_final = sapaan_static + update_gudang[-100:]
          
          js_content = "const dataMemori = " + json.dumps(gabungan_final, indent=2, ensure_ascii=False) + ";"
          
          with open(path_otak_js, 'w', encoding='utf-8') as f:
              f.write(js_content)

          print(f"✅ Selesai! otakai.js di root sekarang enteng (100 baris).")
          EOF

      - name: Simpan ke GitHub
        run: |
          git config --local user.name "Kuli Tambang Robot"
          git config --local user.email "robot@smartai.alan"
          git add database/data.yml otakai.js
          git diff --staged --quiet || (git commit -m "Update Otak Kecil & Gudang Data" && git push)
