<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Sidebar Styles */
        .sidebar { background: #1e1f20; width: 260px; transition: 0.3s; }
        .nav-item { transition: 0.2s; border-radius: 8px; margin-bottom: 4px; cursor: pointer; }
        .nav-item:hover { background: #333537; }
        
        /* Chat Styles */
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; background: #131314; }
        .message-container { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .message-container::-webkit-scrollbar { display: none; }
        
        .user-bubble { background: #2b2d31; border-radius: 20px; padding: 12px 18px; max-width: 80%; align-self: flex-end; }
        .ai-content { width: 100%; display: flex; flex-direction: column; margin-bottom: 30px; }
        .ai-text { font-size: 16px; line-height: 1.8; color: #d1d1d1; max-width: 90%; }
        
        /* Input Area */
        .input-wrapper { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .input-bar { background: #1e1f20; border-radius: 32px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        .input-bar:focus-within { border-color: #8ab4f8; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 16px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.5s ease; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar h-full hidden md:flex flex-col p-3">
        <button onclick="newChat()" class="flex items-center gap-3 p-3 mb-8 bg-[#333537] rounded-full text-sm font-medium hover:bg-[#444]">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Obrolan Baru
        </button>
        
        <div class="flex-1 overflow-y-auto">
            <p class="text-[10px] text-gray-500 font-bold px-3 mb-2 uppercase tracking-widest">Riwayat</p>
            <div id="historyList" class="space-y-1">
                </div>
        </div>

        <div class="mt-auto p-3 border-t border-white/5 text-[10px] text-gray-500 font-mono">
            NEURAL_CORE_v14.0 // ALAN_PROJ
        </div>
    </aside>

    <div class="chat-area">
        <header class="p-4 flex justify-between items-center md:hidden">
            <h1 class="font-bold text-sm">SMART AI</h1>
            <button onclick="newChat()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
        </header>

        <main id="chatBox" class="message-container p-6 flex flex-col"></main>

        <footer class="input-wrapper">
            <div class="input-bar shadow-2xl">
                <input type="text" id="userInput" onkeypress="if(event.key==='Enter') processThinking()" placeholder="Tanya sesuatu...">
                <div class="flex gap-3">
                    <button class="text-gray-500 hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
                    <button onclick="processThinking()" class="text-[#8ab4f8]"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
                </div>
            </div>
            <p class="text-[9px] text-center mt-3 text-gray-600">Smart AI dapat memberikan hasil yang berbeda berdasarkan ribuan memori lokal.</p>
        </footer>
    </div>

    <script src="otakai.js"></script>
    <script>
        class ProEngine {
            constructor() {
                this.stopWords = ['apakah', 'bagaimana', 'apa', 'itu', 'saya', 'kak', 'dong', 'bang', 'bisa', 'tolong'];
                this.threshold = 1.2;
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.stopWords.includes(w));
            }

            // ALGORITMA HEURISTIC SCORING v10.5 (DIKEMBALIKAN!)
            think(query, db) {
                const tokens = this.clean(query);
                let ranking = [];

                db.forEach(entry => {
                    let score = 0;
                    const topicTokens = this.clean(entry.topic);
                    const summaryLower = entry.summary.toLowerCase();

                    tokens.forEach(q => {
                        // Skor 10.0: Kecocokan di Topic DNA
                        if (topicTokens.some(t => t.includes(q))) score += 10.0;
                        // Skor 1.5: Kecocokan di Isi
                        if (summaryLower.includes(q)) {
                            score += 1.5;
                            const occurence = summaryLower.split(q).length - 1;
                            score += (occurence * 0.3);
                        }
                    });

                    if (score > this.threshold) ranking.push({ ...entry, pwr: score });
                });

                return ranking.sort((a, b) => b.pwr - a.pwr)[0];
            }
        }

        const Engine = new ProEngine();

        function newChat() {
            document.getElementById('chatBox').innerHTML = `
                <div class="ai-content fade-in">
                    <p class="text-[#8ab4f8] text-xs font-bold mb-2 uppercase tracking-widest">Sistem Ready</p>
                    <p class="ai-text">Obrolan baru dimulai. Silakan ajukan pertanyaan, Kak Alan. Saya akan menyisir ribuan data lokal secara akurat.</p>
                </div>`;
        }

        function processThinking() {
            const el = document.getElementById('userInput');
            const q = el.value.trim();
            if(!q) return;

            addBubble(q, 'user');
            el.value = '';

            const rid = "res-" + Date.now();
            addBubble(`<div class="animate-pulse flex gap-1"><div class="w-1 h-1 bg-gray-500 rounded-full"></div><div class="w-1 h-1 bg-gray-500 rounded-full"></div><div class="w-1 h-1 bg-gray-500 rounded-full"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = Engine.think(q, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let out = result.summary;
                    if(out.includes('/')) {
                        const parts = out.split('/');
                        out = parts[Math.floor(Math.random() * parts.length)].trim();
                    }
                    box.innerHTML = `<p class="ai-text">${out}</p>`;
                    addToHistory(result.topic);
                } else {
                    box.innerHTML = `<p class="ai-text italic opacity-40">Data tidak ditemukan untuk "${q}". Silakan nambang lebih banyak.</p>`;
                }
                const container = document.getElementById('chatBox');
                container.scrollTop = container.scrollHeight;
            }, 700);
        }

        function addBubble(txt, type, id = null) {
            const container = document.getElementById('chatBox');
            const row = document.createElement('div');
            row.className = type === 'user' ? 'flex justify-end mb-6 fade-in' : 'ai-content fade-in';
            
            const html = type === 'user' 
                ? `<div class="user-bubble text-sm">${txt}</div>`
                : `<p class="text-[#8ab4f8] text-[10px] font-bold mb-1 uppercase tracking-widest">Smart AI</p><div id="${id}">${txt}</div>`;
            
            row.innerHTML = html;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function addToHistory(topic) {
            const hist = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = "nav-item p-2 px-3 text-[11px] truncate text-gray-400";
            item.innerText = topic;
            if(hist.firstChild) hist.insertBefore(item, hist.firstChild);
            else hist.appendChild(item);
        }

        window.onload = newChat;
    </script>
</body>
</html>
