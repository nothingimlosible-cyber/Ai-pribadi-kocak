<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hybrid GPT FIX UI</title>

<script src="otakai.js"></script>
<script src="dataMemori.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#111;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

#sidebar.hidden{
  margin-left:-260px;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* TOP BAR */
#topbar{
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  border-bottom:1px solid #222;
  background:#0b0b0b;
  z-index:10;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:15px;
  z-index:1;
}

.msg{
  margin:10px 0;
  padding:10px 14px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#2a2a2a;margin-left:auto}
.ai{background:#151515;border:1px solid #333}

/* INPUT */
#bar{
  display:flex;
  padding:10px;
  background:#111;
  border-top:1px solid #222;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:#222;
  color:white;
  border-radius:10px;
}

button{
  padding:12px 16px;
  border:none;
  background:white;
  color:black;
  border-radius:10px;
  cursor:pointer;
}

/* OVERLAY FIX (biar gak ketutup layer) */
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div style="padding:10px;font-weight:bold;border-bottom:1px solid #222">
    🧠 History
  </div>
  <div id="history" style="padding:10px;font-size:12px"></div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="topbar">
    <button onclick="toggleSidebar()">☰</button>
    <div>Hybrid GPT AI</div>
    <div id="status">online</div>
  </div>

  <div id="chat"></div>

  <div id="bar">
    <input id="input" placeholder="Tanya AI...">
    <button onclick="send()">Kirim</button>
  </div>

</div>

<script>

// =========================
// SIDEBAR TOGGLE FIX
// =========================

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hidden")
}

// =========================
// MEMORY
// =========================

let memory=[]

// =========================
// EMOTION
// =========================

function emotion(t){
  t=t.toLowerCase()
  if(t.includes("sedih")) return "empathetic"
  if(t.includes("kenapa")) return "analytical"
  return "neutral"
}

// =========================
// DATABASE SEARCH
// =========================

function search(q){

  let best=null
  let score=0

  for(let d of dataMemori){

    let s=0

    if(d.topic.includes(q.toLowerCase())) s+=2
    if(d.summary.includes(q.toLowerCase())) s+=1

    if(s>score){
      score=s
      best=d
    }
  }

  return best
}

// =========================
// RESPONSE BUILDER
// =========================

function build(db,emo){

  let out="🧠 proses selesai<br><br>"

  if(db){
    out+="📦 "+db.summary+"<br><br>"
  }

  if(emo==="empathetic"){
    out+="Aku ngerti kamu...<br>"
  }

  if(emo==="analytical"){
    out+="Aku jelasin logis ya...<br>"
  }

  return out
}

// =========================
// UI
// =========================

function add(t,type){
  let d=document.createElement("div")
  d.className="msg "+type
  d.innerHTML=t
  document.getElementById("chat").appendChild(d)
  document.getElementById("chat").scrollTop=999999
}

// =========================
// MAIN FLOW
// =========================

function send(){

  let input=document.getElementById("input")
  let text=input.value
  if(!text)return

  add(text,"user")

  let emo=emotion(text)

  let db=search(text)

  add("thinking...","ai")

  setTimeout(()=>{

    let res=build(db,emo)

    add(res,"ai")

  },400)

  input.value=""
}

</script>

</body>
</html>
