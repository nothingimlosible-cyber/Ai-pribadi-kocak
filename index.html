<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Sidebar Styles */
        .sidebar { background: #1e1f20; width: 260px; transition: 0.3s; height: 100vh; flex-shrink: 0; }
        .nav-item { transition: 0.2s; border-radius: 8px; cursor: pointer; color: #c4c7c5; }
        .nav-item:hover { background: #333537; color: white; }
        
        /* Chat Styles */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .message-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 20px 0; }
        .message-area::-webkit-scrollbar { display: none; }
        .chat-container { max-width: 800px; margin: 0 auto; width: 100%; padding: 0 20px; }
        
        /* Bubbles */
        .user-row { display: flex; justify-content: flex-end; margin-bottom: 24px; animation: slideUp 0.3s ease; }
        .user-bubble { background: #2b2d31; border-radius: 22px; padding: 12px 20px; max-width: 85%; font-size: 15px; }
        .ai-row { margin-bottom: 40px; animation: fadeIn 0.5s ease; }
        .ai-name { font-size: 11px; font-weight: 600; color: #8ab4f8; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .ai-text { font-size: 16px; line-height: 1.8; color: #e3e3e3; white-space: pre-line; }

        /* Input Area ala Gemini */
        .input-section { padding: 20px; max-width: 850px; margin: 0 auto; width: 100%; }
        .input-box { background: #1e1f20; border-radius: 32px; padding: 8px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
        .input-box:focus-within { background: #282a2c; border-color: #444746; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; height: 48px; font-size: 16px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .dot-flashing { width: 4px; height: 4px; background: #8ab4f8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex">

    <aside class="sidebar hidden md:flex flex-col p-4">
        <button onclick="window.location.reload()" class="flex items-center gap-3 p-3 mb-6 bg-[#333537] rounded-full text-sm font-medium hover:bg-[#444] transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Obrolan Baru
        </button>
        
        <div class="flex-1 overflow-y-auto">
            <p class="text-[10px] text-gray-500 font-bold px-3 mb-3 uppercase tracking-widest">Terbaru</p>
            <div id="historyList" class="space-y-1">
                </div>
        </div>

        <div class="mt-auto p-3 border-t border-white/5">
            <div class="flex items-center gap-2 text-xs text-gray-400">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                Neural Core v14.5
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="p-4 flex justify-between items-center border-b border-white/5 bg-[#131314]">
            <h1 class="text-sm font-bold tracking-[3px]">SMART <span class="text-[#8ab4f8]">AI</span></h1>
            <div class="flex gap-4">
                 <button class="text-gray-400"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></button>
                 <button class="text-gray-400"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
            </div>
        </header>

        <main id="chatWindow" class="message-area">
            <div class="chat-container">
                <div class="ai-row">
                    <div class="ai-name">Smart AI</div>
                    <div class="ai-text">Ada yang bisa saya bantu, Kak Alan? Saya siap memproses data memori lokal kita.</div>
                </div>
            </div>
        </main>

        <footer class="input-section">
            <div class="input-box shadow-2xl">
                <input type="text" id="userInput" onkeypress="if(event.key==='Enter') executeProcess()" placeholder="Tanya sesuatu ke AI...">
                <div class="flex items-center gap-4 px-2">
                    <button class="text-gray-500 hover:text-white transition-colors">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg>
                    </button>
                    <button onclick="executeProcess()" class="text-[#8ab4f8] hover:scale-110 transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </div>
            <p class="text-[9px] text-center mt-3 text-gray-600 uppercase tracking-widest">Heuristic Engine v10.5 Active</p>
        </footer>
    </div>

    <script src="otakai.js"></script>
    <script>
        class NeuralEngine {
            constructor() {
                this.stopWords = ['apakah', 'bagaimana', 'apa', 'itu', 'saya', 'kak', 'dong', 'bang', 'bisa', 'tolong'];
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.stopWords.includes(w));
            }

            // ALGORITMA SCORING v10.5 (DIKEMBALIKAN!)
            think(query, db) {
                const tokens = this.clean(query);
                let ranking = [];

                db.forEach(entry => {
                    let score = 0;
                    const topicStr = entry.topic.toLowerCase();
                    const summaryStr = entry.summary.toLowerCase();

                    tokens.forEach(tok => {
                        // Skor Tinggi (10.0) jika ada di Topic DNA
                        if (topicStr.includes(tok)) score += 10.0;
                        // Skor Pendukung (1.5) jika ada di Isi
                        if (summaryStr.includes(tok)) {
                            score += 1.5;
                            // Tambahan skor jika kata muncul berulang
                            const count = summaryStr.split(tok).length - 1;
                            score += (count * 0.2);
                        }
                    });

                    if (score > 1.2) ranking.push({ ...entry, pwr: score });
                });

                return ranking.sort((a, b) => b.pwr - a.pwr)[0];
            }
        }

        const AI = new NeuralEngine();

        function executeProcess() {
            const el = document.getElementById('userInput');
            const prompt = el.value.trim();
            if (!prompt) return;

            renderBubble(prompt, 'user');
            el.value = '';

            const rid = "ai-" + Date.now();
            renderBubble(`<div class="flex gap-1 py-2"><div class="dot-flashing"></div><div class="dot-flashing" style="animation-delay:0.2s"></div><div class="dot-flashing" style="animation-delay:0.4s"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = AI.think(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let out = result.summary;
                    // Smart Slicer /
                    if (out.includes('/')) {
                        const parts = out.split('/');
                        out = parts[Math.floor(Math.random() * parts.length)].trim();
                    }
                    box.innerHTML = `<div class="ai-text">${out}</div>`;
                    updateHistory(result.topic);
                } else {
                    box.innerHTML = `<div class="ai-text italic opacity-40">Maaf Kak, pola memori lokal tidak menemukan jawaban yang relevan.</div>`;
                }
                scrollChat();
            }, 800);
        }

        function renderBubble(txt, type, id = null) {
            const container = document.querySelector('.chat-container');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'user-row' : 'ai-row';
            
            const content = type === 'user' 
                ? `<div class="user-bubble">${txt}</div>`
                : `<div class="ai-name">Smart AI</div><div id="${id}">${txt}</div>`;
            
            div.innerHTML = content;
            container.appendChild(div);
            scrollChat();
        }

        function updateHistory(topic) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = "nav-item p-2 px-3 text-[11px] truncate mb-1";
            item.innerHTML = `<span class="opacity-50 text-[10px]">#</span> ${topic}`;
            list.prepend(item);
        }

        function scrollChat() {
            const area = document.getElementById('chatWindow');
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
