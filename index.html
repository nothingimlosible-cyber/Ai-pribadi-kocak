<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI - Fixed UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #212121;
            --sidebar-bg: #171717;
            --text-main: #ececec;
            --input-bg: #2f2f2f;
            --accent: #10a37f;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* SIDEBAR BASE */
        .sidebar {
            width: 260px; 
            background: var(--sidebar-bg);
            height: 100%;
            position: fixed;
            top: 0;
            transition: 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        #sb-left { left: -260px; }
        #sb-right { right: -260px; }

        /* KELUAR MASUK LOGIC */
        #sb-left.open { left: 0; }
        #sb-right.open { right: 0; }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-content { padding: 15px; flex: 1; overflow-y: auto; }

        .sidebar-item {
            padding: 12px; border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; font-size: 14px; color: #ccc; transition: 0.2s;
        }
        .sidebar-item:hover { background: #2b2b2b; color: white; }

        /* MAIN CONTENT */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            transition: 0.3s ease;
            width: 100%;
        }

        header {
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: var(--bg-dark);
            z-index: 100;
        }

        .btn-icon { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 10px; }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .message-row { width: 100%; display: flex; justify-content: center; padding: 25px 20px; }
        .ai-row { background-color: #343541; }
        .message-content { max-width: 800px; width: 100%; display: flex; gap: 20px; }
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .u-av { background: #5436da; }
        .a-av { background: #10a37f; }

        /* INPUT AREA */
        .input-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
            padding: 20px; display: flex; justify-content: center;
            z-index: 50;
        }
        .input-box {
            max-width: 800px; width: 100%; background: var(--input-bg);
            border-radius: 12px; border: 1px solid var(--border); 
            padding: 12px 15px; display: flex; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        textarea {
            flex: 1; background: none; border: none; color: white;
            outline: none; resize: none; font-size: 16px; max-height: 200px;
        }
        #send-btn { color: var(--accent); background: none; border: none; font-size: 20px; cursor: pointer; margin-left: 10px; }

        /* Overlay saat sidebar buka */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 500;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="app-container">
        <aside id="sb-left" class="sidebar">
            <div class="sidebar-header">
                <span>Riwayat Chat</span>
                <button class="btn-icon" onclick="closeAll()"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-item"><i class="fas fa-plus"></i> Chat Baru</div>
                <div class="sidebar-item"><i class="far fa-comment"></i> Ide Konten Hoodie</div>
                <div class="sidebar-item"><i class="far fa-comment"></i> Strategi Affiliate</div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <button class="btn-icon" onclick="openLeft()"><i class="fas fa-bars"></i></button>
                <div style="font-weight:600; font-size:18px;">SMART AI</div>
                <button class="btn-icon" onclick="openRight()"><i class="fas fa-cog"></i></button>
            </header>

            <div id="chat-window">
                <div class="message-row ai-row">
                    <div class="message-content">
                        <div class="avatar a-av">S</div>
                        <div class="text">Halo Alan! Silakan ketik pesanmu di bawah. Proses berpikir saya sudah otomatis di balik layar.</div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Tulis pesan..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <aside id="sb-right" class="sidebar">
            <div class="sidebar-header">
                <span>Pengaturan AI</span>
                <button class="btn-icon" onclick="closeAll()"><i class="fas fa-times"></i></button>
            </div>
            <div class="sidebar-content">
                <p style="font-size: 14px; margin-bottom: 10px;">Model: <b>GPT-4 Turbo</b></p>
                <p style="font-size: 14px; margin-bottom: 20px;">Database: <span style="color:var(--accent)">otakai.js connected</span></p>
                <hr style="border:0; border-top:1px solid var(--border); margin-bottom:20px;">
                <div class="sidebar-item"><i class="fas fa-trash"></i> Hapus Semua Chat</div>
            </div>
        </aside>
    </div>

    <script src="otakai.js"></script>
    <script>
        const left = document.getElementById('sb-left');
        const right = document.getElementById('sb-right');
        const overlay = document.getElementById('overlay');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        function openLeft() { left.classList.add('open'); overlay.classList.add('active'); }
        function openRight() { right.classList.add('open'); overlay.classList.add('active'); }
        function closeAll() { 
            left.classList.remove('open'); 
            right.classList.remove('open'); 
            overlay.classList.remove('active'); 
        }

        userInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        async function handleSend() {
            const val = userInput.value.trim();
            if(!val) return;

            // User Chat
            appendMsg('user', val);
            userInput.value = '';
            userInput.style.height = 'auto';

            // AI Berpikir (Silent Process)
            const aiMsg = appendMsg('ai', '<i class="fas fa-circle-notch fa-spin"></i>');
            const textDiv = aiMsg.querySelector('.text');

            try {
                // Di sini letak proses otakai.js & logic step-by-step kamu
                await new Promise(r => setTimeout(r, 1200)); 
                textDiv.innerText = "Ini adalah jawaban terbaik yang sudah disusun SMART AI tanpa mengganggu layar chat kamu.";
            } catch (e) {
                textDiv.innerText = "Koneksi database terputus.";
            }
        }

        function appendMsg(role, text) {
            const row = document.createElement('div');
            row.className = `message-row ${role === 'ai' ? 'ai-row' : ''}`;
            row.innerHTML = `
                <div class="message-content">
                    <div class="avatar ${role === 'user' ? 'u-av' : 'a-av'}">${role === 'user' ? 'A' : 'S'}</div>
                    <div class="text">${text}</div>
                </div>`;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return row;
        }

        document.getElementById('send-btn').onclick = handleSend;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    </script>
</body>
</html>
