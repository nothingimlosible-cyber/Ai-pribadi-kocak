<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAN OMEGA ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ai-glow { box-shadow: 0 0 20px rgba(66, 133, 244, 0.1); }
        .typing-dot { width: 4px; height: 4px; background: #4285f4; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    </style>
</head>
<body class="flex flex-col items-center h-screen overflow-hidden">

    <header class="w-full max-w-3xl p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_10px_#4285f4]"></div>
            <h1 class="text-xs font-black tracking-[0.3em] uppercase opacity-70">Alan Neural Omega</h1>
        </div>
        <div id="ram-indicator" class="text-[9px] font-mono text-gray-500">OPTIMIZED_FOR_4GB_RAM</div>
    </header>

    <main id="chatbox" class="flex-1 w-full max-w-3xl overflow-y-auto px-6 space-y-8 scrollbar-hide">
        <div class="flex flex-col gap-2">
            <div class="text-sm opacity-40 font-mono text-[10px]">SYSTEM_INITIALIZED</div>
            <div class="text-xl font-medium leading-relaxed max-w-xl">
                Halo Kak Alan. Eksperimen "Otak Omega" sudah aktif. Saya siap berpikir lebih dalam menggunakan database kita.
            </div>
        </div>
    </main>

    <footer class="w-full max-w-3xl p-6">
        <div class="glass ai-glow rounded-3xl p-2 flex items-center gap-2 transition-all focus-within:border-blue-500/50">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') berpikir()" 
                placeholder="Diskusikan sesuatu..." 
                class="flex-1 bg-transparent p-3 px-4 outline-none text-sm placeholder:opacity-30">
            <button onclick="berpikir()" class="bg-blue-600 hover:bg-blue-500 text-white p-3 px-6 rounded-2xl text-xs font-bold transition-all active:scale-95">
                THINK
            </button>
        </div>
        <div class="text-[9px] text-center mt-4 opacity-20 tracking-widest uppercase">Deep Context Retrieval • No External API</div>
    </footer>

    <script src="otakai.js"></script>
    <script>
        class OmegaBrain {
            constructor() {
                this.stopWords = ['dan', 'yang', 'itu', 'adalah', 'di', 'ke', 'buat', 'kak', 'dong', 'sih'];
            }

            // Memecah input dan memberi bobot pada setiap kata
            analyze(text) {
                const words = text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/);
                return words.filter(w => !this.stopWords.includes(w) && w.length > 1);
            }

            // Logika Berpikir "Deep Retrieval"
            solve(input, db) {
                const tokens = this.analyze(input);
                let brainMap = [];

                db.forEach((memory, index) => {
                    let connectionStrength = 0;
                    const content = (memory.topic + " " + memory.summary).toLowerCase();

                    tokens.forEach(token => {
                        if (content.includes(token)) {
                            // Hitung seberapa penting kata ini di dalam memori
                            const occurrences = content.split(token).length - 1;
                            const isTopic = memory.topic.toLowerCase().includes(token);
                            
                            // Skor: Judul (10 poin), Isi (2 poin * jumlah munculnya kata)
                            connectionStrength += isTopic ? 10 : (2 * occurrences);
                        }
                    });

                    if (connectionStrength > 0) {
                        brainMap.push({ data: memory, power: connectionStrength });
                    }
                });

                // Urutkan berdasarkan kekuatan sinyal saraf terkuat
                brainMap.sort((a, b) => b.power - a.power);
                return brainMap.length > 0 ? brainMap[0] : null;
            }
        }

        const Omega = new OmegaBrain();

        function berpikir() {
            const el = document.getElementById('userInput');
            const q = el.value.trim();
            if (!q) return;

            // Render User Chat
            renderChat(q, 'user');
            el.value = '';

            // Render Thinking Animation
            const tid = "thought-" + Date.now();
            renderChat(`<div class="flex gap-1 py-2"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div></div>`, 'ai', tid);

            setTimeout(() => {
                const result = Omega.solve(q, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(tid);

                if (result) {
                    const variants = result.data.summary.split(' / ');
                    const finalAnswer = variants[Math.floor(Math.random() * variants.length)];
                    box.innerHTML = `
                        <div class="text-[10px] text-blue-500 font-mono mb-2 uppercase tracking-tighter">Memory_Link: ${result.data.topic} [Strength: ${result.power}]</div>
                        <div class="text-lg leading-relaxed text-gray-200">${finalAnswer}</div>
                    `;
                } else {
                    box.innerHTML = `<div class="opacity-50 text-sm italic">Maaf Kak, sirkuit memori saya tidak menemukan koneksi yang kuat untuk "${q}". Perlu asupan data baru di tambang.txt.</div>`;
                }
            }, 1000);
        }

        function renderChat(txt, sender, id = null) {
            const chatbox = document.getElementById('chatbox');
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${sender === 'user' ? 'items-end' : 'items-start animate-in fade-in slide-in-from-bottom-2 duration-500'}`;
            
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'bg-[#1a1a1a] p-3 px-5 rounded-2xl text-sm max-w-[80%]' : 'w-full py-2';
            if (id) div.id = id;
            div.innerHTML = txt;

            wrap.appendChild(div);
            chatbox.appendChild(wrap);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
