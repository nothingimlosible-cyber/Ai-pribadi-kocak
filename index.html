<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAN_LITE_MODEL_v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: monospace; }
        .console { background: #0d1117; border: 1px solid #30363d; height: 65vh; overflow-y: auto; padding: 15px; border-radius: 4px; }
        .token-info { color: #8b949e; font-size: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-2xl">
        <header class="mb-4 border-b border-[#30363d] pb-2">
            <h1 class="text-sm font-bold text-white tracking-widest uppercase">HF_ENGINE / ALAN-7B-LITE-MOBILE</h1>
            <div class="flex gap-4 mt-1">
                <span class="text-[10px] text-green-500">● model.safetensors: LOADED</span>
                <span class="text-[10px] text-blue-500">● tokenizer: READY</span>
            </div>
        </header>

        <div id="console" class="console space-y-4 shadow-inner"></div>

        <div class="mt-4 flex gap-2">
            <span class="text-blue-500 font-bold">>>></span>
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') runModel()" 
                placeholder="input_promp_di_sini..." 
                class="w-full bg-transparent outline-none text-blue-400 text-sm">
        </div>
    </div>

    <script src="otakai.js"></script>
    <script>
        /**
         * ALAN_MODEL_ENGINE (Mobile Optimized)
         * Meniru struktur arsitektur Safetensors & Tokenizer
         */
        const Config = {
            model_name: "Alan-7B-Lite",
            version: "6.0",
            max_tokens: 50,
            threshold: 0.15
        };

        const Tokenizer = {
            encode: (text) => text.toLowerCase().split(/\s+/),
            clean: (text) => text.replace(/[^\w\s]/gi, '')
        };

        const InferenceEngine = {
            predict: (prompt, database) => {
                const inputTokens = Tokenizer.encode(Tokenizer.clean(prompt));
                let results = [];

                database.forEach(entry => {
                    let weight = 0;
                    const entryContent = (entry.topic + " " + entry.summary).toLowerCase();
                    
                    inputTokens.forEach(token => {
                        if (entryContent.includes(token)) {
                            // Logic Weighting: Judul dapat bobot lebih besar (meniru attention mechanism)
                            weight += entry.topic.toLowerCase().includes(token) ? 0.8 : 0.2;
                        }
                    });

                    if (weight > Config.threshold) {
                        results.push({ ...entry, weight });
                    }
                });

                return results.sort((a, b) => b.weight - a.weight)[0];
            }
        };

        function runModel() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if (!prompt) return;

            log(`[USER]: ${prompt}`, 'white');
            input.value = '';

            setTimeout(() => {
                const output = InferenceEngine.predict(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                
                if (output) {
                    const variasi = output.summary.split(' / ');
                    const finalRes = variasi[Math.floor(Math.random() * variasi.length)];
                    log(`[MODEL]: <span class="text-blue-400">#${output.topic}</span> (weight: ${output.weight.toFixed(2)})<br>${finalRes}`, 'blue');
                } else {
                    log(`[MODEL]: <span class="text-red-500">ERROR: NULL_RESPONSE.</span> Data tidak ditemukan dalam safetensors lokal.`, 'red');
                }
            }, 300);
        }

        function log(msg, color) {
            const con = document.getElementById('console');
            const div = document.createElement('div');
            div.className = `text-sm ${color === 'red' ? 'text-red-400' : (color === 'blue' ? 'text-gray-300' : 'text-white')}`;
            div.innerHTML = msg;
            con.appendChild(div);
            con.scrollTop = con.scrollHeight;
        }
    </script>
</body>
</html>
