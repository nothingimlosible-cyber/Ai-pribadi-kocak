<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #212121;
            --sidebar: #171717;
            --input: #2f2f2f;
            --accent: #10a37f;
            --text: #ececec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* SIDEBAR SISTEM */
        .sidebar {
            width: 260px; height: 100%; background: var(--sidebar);
            position: fixed; top: 0; transition: transform 0.3s ease; z-index: 1000;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
        }
        #sb-left { left: 0; transform: translateX(-100%); }
        #sb-right { right: 0; transform: translateX(100%); }
        .sidebar.open { transform: translateX(0); }

        /* MAIN CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; transition: 0.3s; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-icon { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

        /* CHAT CLEAN UI */
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .msg-row { width: 100%; padding: 25px 15%; display: flex; gap: 20px; }
        .msg-row.ai { background: rgba(255,255,255,0.02); }
        .avatar { width: 32px; height: 32px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }
        .u-av { background: #5436da; }
        .a-av { background: var(--accent); }
        .text { font-size: 16px; line-height: 1.6; color: #d1d1d1; flex: 1; }

        /* INPUT AREA */
        .input-wrap {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, var(--bg) 40%);
            padding: 20px 15%; z-index: 10;
        }
        .input-box {
            background: var(--input); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px 15px; display: flex; align-items: center;
        }
        textarea { flex: 1; background: none; border: none; color: #fff; outline: none; resize: none; font-size: 16px; max-height: 200px; }
        #send-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; margin-left: 10px; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <div class="app-container">
        <aside id="sb-left" class="sidebar">
            <div style="padding:20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
                <span>Histori Chat</span>
                <i class="fas fa-times" onclick="closeAll()" style="cursor:pointer"></i>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <button class="btn-icon" onclick="openSB('sb-left')"><i class="fas fa-bars"></i></button>
                <div style="font-weight:600">SMART AI</div>
                <button class="btn-icon" onclick="openSB('sb-right')"><i class="fas fa-cog"></i></button>
            </header>

            <div id="chat-window">
                </div>

            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Tulis sesuatu..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <aside id="sb-right" class="sidebar">
            <div style="padding:20px; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between;">
                <span>Database Info</span>
                <i class="fas fa-times" onclick="closeAll()" style="cursor:pointer"></i>
            </div>
            <div style="padding:20px; font-size:14px; color:#888;">
                Connected to: <b>otakai.js</b>
            </div>
        </aside>
    </div>

    <script src="otakai.js"></script>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const overlay = document.getElementById('overlay');

        function openSB(id) { document.getElementById(id).classList.add('open'); overlay.classList.add('active'); }
        function closeAll() { document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('open')); overlay.classList.remove('active'); }

        userInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        async function startChat() {
            const prompt = userInput.value.trim();
            if(!prompt) return;

            // 1. Munculkan Chat User
            appendMsg('user', prompt);
            userInput.value = '';
            userInput.style.height = 'auto';

            // 2. Munculkan Loading AI (Cuma titik atau icon kecil agar bersih)
            const aiRow = appendMsg('ai', '<i class="fas fa-circle-notch fa-spin"></i>');
            const textDiv = aiRow.querySelector('.text');

            try {
                /* PROSES DI BALIK LAYAR (DATABASE):
                   - Pahami maksud
                   - Ubah jadi konsep
                   - Nilai jawaban
                   - Pilih terbaik
                */
                
                // PANGGIL FUNGSI DARI otakai.js DISINI
                // let response = await otakai.ask(prompt); // <--- Hubungkan fungsi database di sini
                
                await new Promise(r => setTimeout(r, 1500)); // Simulasi proses 
                
                const finalResult = "Ini adalah jawaban natural dari SMART AI."; 
                textDiv.innerText = finalResult;

            } catch (err) {
                textDiv.innerText = "Error: Database otakai.js tidak merespon.";
            }
        }

        function appendMsg(role, content) {
            const row = document.createElement('div');
            row.className = `msg-row ${role === 'ai' ? 'ai' : ''}`;
            row.innerHTML = `
                <div class="avatar ${role === 'user' ? 'u-av' : 'a-av'}">${role === 'user' ? 'A' : 'S'}</div>
                <div class="text">${content}</div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return row;
        }

        document.getElementById('send-btn').onclick = startChat;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); } };
    </script>
</body>
</html>
