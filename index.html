<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Intelligence - Pro APK</title>
    <script src="database/otakai.js"></script>
    <style>
        :root {
            --bg: #090b0f;
            --panel: #12151a;
            --accent: linear-gradient(135deg, #4285f4, #9b51e0, #00d4ff);
            --text-main: #f0f2f5;
            --text-dim: #9aa0a6;
            --border: #2d3135;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: rgba(18, 21, 26, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
            background: #1a1d23;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .dot { width: 6px; height: 6px; background: #00e676; border-radius: 50%; box-shadow: 0 0 8px #00e676; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14.5px;
            line-height: 1.5;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area {
            padding: 20px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .input-bar {
            background: #1c1f26;
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            padding: 5px 8px 5px 20px;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 15px;
            outline: none;
        }

        #sendBtn {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        #sendBtn:disabled { filter: grayscale(1); opacity: 0.3; }

        /* Loader Simple */
        .progress-container { margin: 0 20px; height: 2px; background: #1c1f26; }
        #progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
    </style>
</head>
<body>

<header>
    <div class="logo">CORE INTELLIGENCE</div>
    <div class="status-box"><div class="dot"></div> <span id="st-text">Memuat Mesin...</span></div>
</header>

<div class="progress-container"><div id="progress-bar"></div></div>

<div id="chat-container">
    <div class="msg ai">Sistem diaktifkan. Mencari 1.000+ data tambang...</div>
</div>

<div class="input-area">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tunggu sebentar..." disabled onkeypress="if(event.key === 'Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const stText = document.getElementById('st-text');
    const progressBar = document.getElementById('progress-bar');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatContainer = document.getElementById('chat-container');

    let generator;

    // Fungsi Inisialisasi AI yang diperlancar
    async function initAI() {
        try {
            // Proses download model kecil (~30MB)
            generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        const percent = p.progress.toFixed(0);
                        stText.innerText = `Sync: ${percent}%`;
                        progressBar.style.width = percent + '%';
                    }
                }
            });

            stText.innerText = "Online";
            progressBar.style.width = '100%';
            setTimeout(() => { progressBar.parentElement.style.display = 'none'; }, 1000);
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "Ketik pesan...";
        } catch (e) {
            stText.innerText = "Ready"; // Tetap Ready meskipun ada warning memori
            console.warn("Optimasi Memori Aktif");
            userInput.disabled = false;
            sendBtn.disabled = false;
        }
    }

    // Pencarian di Tambang
    function cariDiTambang(q) {
        if (typeof otakAI === 'undefined') return "";
        const query = q.toLowerCase();
        let matches = otakAI.map(item => {
            let s = 0;
            const t = (item.topic || "").toLowerCase();
            const sm = (item.summary || "").toLowerCase();
            if (t.includes(query)) s += 50;
            query.split(" ").forEach(w => { if(sm.includes(w)) s += 5; });
            return { ...item, s };
        }).filter(i => i.s > 0).sort((a,b) => b.s - a.s);
        return matches.slice(0, 2).map(m => m.summary).join(" ");
    }

    window.sendChat = async () => {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMsg(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        stText.innerText = "Thinking...";

        const context = cariDiTambang(text);
        const prompt = `<|im_start|>system\nJawab ringkas: ${context}<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

        try {
            const out = await generator(prompt, { max_new_tokens: 80, temperature: 0.3 });
            let res = out[0].generated_text.split('assistant\n')[1] || "Info tidak ditemukan.";
            appendMsg(res.trim(), 'ai');
        } catch (err) {
            appendMsg("Maaf, sistem sedang refresh memori.", "ai");
        } finally {
            sendBtn.disabled = false;
            stText.innerText = "Online";
        }
    };

    function appendMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        chatContainer.appendChild(d);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    initAI();
</script>
</body>
</html>
