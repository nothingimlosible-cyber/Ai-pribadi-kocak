<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #212121;
            --sidebar-bg: #171717;
            --text-main: #ececec;
            --input-bg: #2f2f2f;
            --accent: #10a37f;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* SIDEBAR KIRI (History) */
        .sidebar-left {
            width: 260px; background: var(--sidebar-bg);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-right: 1px solid var(--border); z-index: 100;
        }
        .sidebar-left.closed { margin-left: -260px; }

        /* SIDEBAR KANAN (Settings/Info) */
        .sidebar-right {
            width: 260px; background: var(--sidebar-bg);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); z-index: 100;
        }
        .sidebar-right.closed { margin-right: -260px; }

        .sidebar-content { padding: 15px; flex: 1; }
        .sidebar-item {
            padding: 10px; border-radius: 8px; margin-bottom: 5px;
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .sidebar-item:hover { background: #2b2b2b; }

        /* MAIN AREA */
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        header {
            padding: 10px 20px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid var(--border);
        }

        .btn-icon {
            background: none; border: none; color: white; 
            font-size: 18px; cursor: pointer; padding: 8px;
        }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .message-row { width: 100%; display: flex; justify-content: center; padding: 24px 20px; }
        .ai-row { background-color: #343541; }
        .message-content { max-width: 768px; width: 100%; display: flex; gap: 20px; }
        .avatar { width: 30px; height: 30px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        .u-av { background: #5436da; }
        .a-av { background: #10a37f; }

        /* INPUT AREA */
        .input-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, var(--bg-dark) 50%);
            padding: 20px; display: flex; justify-content: center;
        }
        .input-box {
            max-width: 768px; width: 100%; background: var(--input-bg);
            border-radius: 15px; border: 1px solid var(--border); 
            padding: 12px 18px; display: flex; align-items: flex-end;
        }
        textarea {
            flex: 1; background: none; border: none; color: white;
            outline: none; resize: none; font-size: 16px; max-height: 200px;
        }
        #send-btn { color: var(--accent); background: none; border: none; font-size: 20px; cursor: pointer; margin-left: 10px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside id="sb-left" class="sidebar-left">
            <div class="sidebar-content">
                <button class="sidebar-item" style="width:100%; border:1px solid var(--border); background:none; color:white; text-align:left;">
                    <i class="fas fa-plus"></i> Chat Baru
                </button>
                <div style="margin-top:20px; color:#888; font-size:12px;">Riwayat</div>
                <div class="sidebar-item">Ide Konten</div>
                <div class="sidebar-item">Script Dokumenter</div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <button class="btn-icon" onclick="toggleLeft()"><i class="fas fa-bars"></i></button>
                <div style="font-weight:600; font-size:18px;">SMART AI</div>
                <button class="btn-icon" onclick="toggleRight()"><i class="fas fa-cog"></i></button>
            </header>

            <div id="chat-window">
                <div class="message-row ai-row">
                    <div class="message-content">
                        <div class="avatar a-av">S</div>
                        <div class="text">Selamat datang, Alan. Ada yang bisa SMART AI bantu hari ini?</div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Tanyakan sesuatu..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <aside id="sb-right" class="sidebar-right">
            <div class="sidebar-content">
                <h3 style="font-size:16px; margin-bottom:15px;">Pengaturan AI</h3>
                <div class="sidebar-item">Model: GPT-4 Turbo</div>
                <div class="sidebar-item">Kreativitas: Tinggi</div>
                <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
                <div style="font-size:12px; color:#888;">DATABASE: connected to otakai.js</div>
            </div>
        </aside>
    </div>

    <script src="otakai.js"></script>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Toggle Functions
        function toggleLeft() { document.getElementById('sb-left').classList.toggle('closed'); }
        function toggleRight() { document.getElementById('sb-right').classList.toggle('closed'); }

        // Auto-size textarea
        userInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        async function processChat() {
            const val = userInput.value.trim();
            if(!val) return;

            // Tampilkan user chat
            appendMessage('user', val);
            userInput.value = '';
            userInput.style.height = 'auto';

            // AI Berpikir di balik layar
            const aiRow = appendMessage('ai', '...');
            const textElement = aiRow.querySelector('.text');
            textElement.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            /* LOGIKA PROSES (IN BACKGROUND):
               1. Pahami Maksud
               2. Ubah Jadi Konsep
               3. Generate & Nilai Jawaban (Otakai.js)
               4. Pilih Terbaik & Susun Natural
            */
            try {
                // Simulasi pemanggilan database otakai.js
                // let response = await Otakai.query(val); 
                
                await new Promise(r => setTimeout(r, 1500)); // Delay agar terasa natural

                textElement.innerText = "Selesai diproses secara internal. Ini adalah jawaban terbaik untuk Anda.";
            } catch (e) {
                textElement.innerText = "Error menyambungkan ke database.";
            }
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendMessage(role, text) {
            const row = document.createElement('div');
            row.className = `message-row ${role === 'ai' ? 'ai-row' : 'user-row'}`;
            row.innerHTML = `
                <div class="message-content">
                    <div class="avatar ${role === 'user' ? 'u-av' : 'a-av'}">${role === 'user' ? 'A' : 'S'}</div>
                    <div class="text">${text}</div>
                </div>
            `;
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return row;
        }

        sendBtn.onclick = processChat;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processChat(); } };
    </script>
</body>
</html>
