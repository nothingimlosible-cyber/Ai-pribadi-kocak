<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Intelligence - Ultra Lite AI</title>
    <script src="database/otakai.js"></script>
    <style>
        :root {
            --bg: #090b0f;
            --panel: #12151a;
            --accent: linear-gradient(135deg, #4285f4, #9b51e0);
            --text-primary: #f0f2f5;
            --text-secondary: #9aa0a6;
            --border: #2d3135;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 18px 25px;
            background: rgba(18, 21, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status-pill {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1a1d23;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-section { padding: 20px; background: var(--bg); }
        .input-bar {
            background: #1c1f26;
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            padding: 5px 15px;
            align-items: center;
        }

        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; color: white; font-weight: bold; }
        button:disabled { opacity: 0.3; }

        progress { width: 100%; height: 3px; accent-color: #9b51e0; }
    </style>
</head>
<body>

<header>
    <div class="brand">CORE INTELLIGENCE</div>
    <div id="status-pill">System Booting...</div>
</header>

<div id="chat-container">
    <div class="msg ai">Sistem diaktifkan. Mengoptimalkan 1.000+ data untuk performa RAM rendah.</div>
</div>

<div id="loader-box" style="padding: 0 25px;"></div>

<div class="input-section">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tunggu sinkronisasi..." disabled onkeypress="if(event.key === 'Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()" disabled>↑</button>
    </div>
</div>

<script type="module">
    // Menggunakan SmolLM yang super kecil (RAM friendly)
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const statusPill = document.getElementById('status-pill');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loaderBox = document.getElementById('loader-box');

    let generator;

    async function initAI() {
        try {
            statusPill.innerText = "Syncing Brain...";
            loaderBox.innerHTML = '<progress></progress>';
            
            // Menggunakan model yang sangat kecil (SmolLM-135M)
            generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
            
            statusPill.innerText = "Online";
            loaderBox.innerHTML = '';
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "Tanya database...";
        } catch (e) {
            statusPill.innerText = "Memory Full";
            console.error(e);
        }
    }

    function cariData(query) {
        if (typeof otakAI === 'undefined') return "";
        const q = query.toLowerCase();
        let matches = otakAI.map(item => {
            let skor = 0;
            const t = (item.topic || "").toLowerCase();
            const s = (item.summary || "").toLowerCase();
            if (t.includes(q)) skor += 50;
            if (s.includes(q)) skor += 5;
            return { ...item, skor };
        }).filter(i => i.skor > 0).sort((a,b) => b.skor - a.skor);
        return matches.slice(0, 2).map(m => m.summary).join(" ");
    }

    window.sendChat = async () => {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMsg(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;
        statusPill.innerText = "Thinking...";

        const context = cariData(text);
        const prompt = `<|im_start|>system\nJawab ringkas: ${context}<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

        try {
            const output = await generator(prompt, { 
                max_new_tokens: 100,
                temperature: 0.2,
                repetition_penalty: 1.2
            });
            
            let fullText = output[0].generated_text;
            let response = fullText.split('assistant\n')[1] || "Data tidak ditemukan.";
            appendMsg(response.trim(), 'ai');
        } catch (err) {
            appendMsg("Maaf, gangguan memori sistem.", "ai");
        } finally {
            sendBtn.disabled = false;
            statusPill.innerText = "Online";
        }
    };

    function appendMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        const cont = document.getElementById('chat-container');
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
    }

    initAI();
</script>
</body>
</html>
