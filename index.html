<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .chat-container { height: calc(100vh - 140px); scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        
        .user-bubble { background: #2b2d31; border-radius: 22px; padding: 12px 20px; max-width: 80%; align-self: flex-end; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .ai-wrapper { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-bottom: 30px; }
        .ai-name { font-size: 12px; font-weight: 600; color: #8ab4f8; letter-spacing: 1px; text-transform: uppercase; }
        .ai-text { font-size: 16px; line-height: 1.7; color: #e3e3e3; max-width: 95%; white-space: pre-line; }
        
        .input-area { background: #131314; padding: 15px 20px; border-top: 1px solid #333; }
        .input-bar { background: #1e1f20; border-radius: 32px; padding: 8px 24px; display: flex; align-items: center; gap: 12px; transition: 0.3s; border: 1px solid transparent; }
        .input-bar:focus-within { background: #282a2c; border-color: #8ab4f8; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; height: 48px; font-size: 16px; }
        
        .typing-anim { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 4px; height: 4px; background: #8ab4f8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-[#131314]/90 backdrop-blur-md z-50">
        <h1 class="text-sm font-bold tracking-[3px] text-white">SMART <span class="text-[#8ab4f8]">AI</span></h1>
        <div id="status-memori" class="text-[9px] font-mono text-gray-500 uppercase tracking-tighter">Syncing...</div>
    </header>

    <main id="chatArea" class="chat-container p-5 flex flex-col overflow-y-auto">
        <div class="ai-wrapper">
            <div class="ai-name">Smart AI</div>
            <div class="ai-text">Sistem diaktifkan. Ribuan data memori telah dipetakan. Silakan bertanya, Kak Alan.</div>
        </div>
    </main>

    <footer class="input-area">
        <div class="input-bar shadow-2xl">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') startInference()" placeholder="Tanya sesuatu ke Smart AI...">
            <button onclick="startInference()" class="text-[#8ab4f8] hover:scale-110 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
        <p class="text-[8px] text-center mt-3 text-gray-600 uppercase tracking-[3px]">Local Neural Processor // GPT-Logic v10.0</p>
    </footer>

    <script src="otakai.js"></script>
    <script>
        class SmartEngine {
            constructor() {
                this.stopWords = ['apakah', 'bagaimana', 'bisa', 'tolong', 'jelasin', 'apa', 'itu', 'saya', 'kak', 'dong'];
                this.threshold = 1.0;
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.stopWords.includes(w));
            }

            think(query, db) {
                const tokens = this.clean(query);
                let ranking = [];

                db.forEach(entry => {
                    let score = 0;
                    const topicStr = entry.topic.toLowerCase();
                    const summaryStr = entry.summary.toLowerCase();

                    tokens.forEach(tok => {
                        if (topicStr.includes(tok)) score += 10.0; // Bobot utama di Topic
                        if (summaryStr.includes(tok)) score += 1.5; // Bobot pendukung di Summary
                    });

                    if (score > this.threshold) {
                        ranking.push({ ...entry, pwr: score });
                    }
                });

                return ranking.sort((a, b) => b.pwr - a.pwr)[0];
            }
        }

        const AI = new SmartEngine();

        // Tampilkan jumlah memori
        window.onload = () => {
            const count = typeof dataMemori !== 'undefined' ? dataMemori.length : 0;
            document.getElementById('status-memori').innerText = `MEMORIES: ${count}`;
        };

        function startInference() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if (!prompt) return;

            renderChat(prompt, 'user');
            input.value = '';

            const rid = "ai-" + Date.now();
            renderChat(`<div class="typing-anim"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = AI.think(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let finalAnswer = result.summary;

                    // --- FIX SMART SLICER (PILIH SATU JAWABAN) ---
                    if (finalAnswer.includes('/')) {
                        const parts = finalAnswer.split('/');
                        const randomIndex = Math.floor(Math.random() * parts.length);
                        finalAnswer = parts[randomIndex].trim();
                    } else if (finalAnswer.length > 500) {
                        // Jika gak ada / tapi kepanjangan, ambil 4 kalimat pertama
                        finalAnswer = finalAnswer.split('. ').slice(0, 4).join('. ') + '.';
                    }

                    box.innerHTML = `
                        <div class="ai-name">RELEVANCE: ${result.topic}</div>
                        <div class="ai-text">${finalAnswer}</div>
                    `;
                } else {
                    box.innerHTML = `<div class="ai-text italic opacity-40">Maaf Kak, sirkuit Smart AI tidak menemukan data yang cocok untuk "${prompt}".</div>`;
                }
                const area = document.getElementById('chatArea');
                area.scrollTop = area.scrollHeight;
            }, 800);
        }

        function renderChat(text, type, id = null) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'user-bubble' : 'ai-wrapper';
            if (id) div.id = id;
            div.innerHTML = text;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
