<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Intelligence - Professional Hybrid</title>
    <script src="database/otakai.js"></script>
    <style>
        :root {
            --bg: #090b0f;
            --panel: #12151a;
            --accent: linear-gradient(135deg, #4285f4, #9b51e0, #00d4ff);
            --text-primary: #f0f2f5;
            --text-secondary: #9aa0a6;
            --border: #2d3135;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Premium */
        header {
            padding: 18px 25px;
            background: rgba(18, 21, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.8px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-pill {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #1a1d23;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse { width: 6px; height: 6px; background: #00e676; border-radius: 50%; box-shadow: 0 0 8px #00e676; }

        /* Chat Workspace */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 14.5px;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .user {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background: var(--panel);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Input Area Modern */
        .input-section { padding: 20px 25px 35px; background: var(--bg); }

        .input-bar {
            background: #1c1f26;
            border: 1px solid var(--border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 8px 5px 22px;
            transition: 0.3s;
        }

        .input-bar:focus-within { border-color: #4285f4; box-shadow: 0 0 0 4px rgba(66, 133, 244, 0.1); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 15px;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Progress Bar */
        #loader-box { margin: 0 25px; }
        progress { width: 100%; height: 3px; accent-color: #9b51e0; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand">CORE INTELLIGENCE</div>
    <div class="status-pill"><div class="pulse"></div> <span id="st-text">Menunggu...</span></div>
</header>

<div id="chat-container">
    <div class="msg ai">Sistem diinisialisasi. Menghubungkan ke 1.000+ index data tambang. Silakan masukkan kueri Anda.</div>
</div>

<div id="loader-box"></div>

<div class="input-section">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tunggu sistem siap..." disabled onkeypress="if(event.key === 'Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const stText = document.getElementById('st-text');
    const loaderBox = document.getElementById('loader-box');

    // Model Qwen 0.5B: Pintar, Ringkas, dan Kecil (Optimized for RAM 4GB)
    const modelId = "Qwen2-0.5B-Instruct-q4f16_1-MLC";
    let engine;

    async function initSystem() {
        try {
            const initProgressCallback = (report) => {
                stText.innerText = `Sync: ${(report.progress * 100).toFixed(0)}%`;
                if (report.progress < 1) {
                    loaderBox.innerHTML = `<progress value="${report.progress}" max="1"></progress>`;
                } else {
                    loaderBox.innerHTML = "";
                }
            };

            engine = await webllm.CreateMLCEngine(modelId, { initProgressCallback });
            
            stText.innerText = "Online";
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "Ajukan pertanyaan...";
        } catch (e) {
            stText.innerText = "Error System";
            console.error(e);
        }
    }

    function searchTambang(query) {
        if (typeof otakAI === 'undefined') return "";
        const q = query.toLowerCase();
        let results = otakAI.map(item => {
            let skor = 0;
            const topic = (item.topic || "").toLowerCase();
            const summary = (item.summary || "").toLowerCase();
            if (topic.includes(q)) skor += 60;
            q.split(" ").forEach(w => { if(summary.includes(w)) skor += 5; });
            return { ...item, skor };
        }).filter(i => i.skor > 0).sort((a,b) => b.skor - a.skor);

        return results.slice(0, 3).map(r => r.summary).join("\\n\\n");
    }

    window.sendChat = async () => {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMsg(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        const context = searchTambang(text);
        
        const messages = [
            { role: "system", content: "Kamu adalah AI profesional. Gunakan data tambang ini untuk menjawab secara cerdas dan ringkas: " + context },
            { role: "user", content: text }
        ];

        try {
            const reply = await engine.chat.completions.create({ messages });
            appendMsg(reply.choices[0].message.content, 'ai');
        } catch (err) {
            appendMsg("Gagal memproses permintaan informasi.", "ai");
        } finally {
            sendBtn.disabled = false;
        }
    };

    function appendMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    initSystem();
</script>
</body>
</html>
