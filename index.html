<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ececec; }
        .chat-bubble { max-width: 85%; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans flex flex-col h-screen">

    <header class="p-4 border-b border-white/5 flex justify-between items-center bg-[#050505]">
        <h1 class="text-lg font-semibold tracking-tight text-emerald-500">LITE AI</h1>
        <div class="text-[10px] text-gray-500 uppercase tracking-widest">Neural Core v3</div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6 md:px-64 hide-scroll">
        <div class="chat-bubble space-y-2">
            <p class="text-sm leading-relaxed text-gray-300">Halo Lan. Saya sudah siap. Mau bahas apa kita hari ini?</p>
        </div>
    </main>

    <footer class="p-6 md:px-64">
        <div class="relative max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." 
                   class="w-full bg-[#121212] border border-white/10 p-4 pr-14 rounded-2xl focus:outline-none focus:border-emerald-600 transition-all text-sm">
            <button onclick="pikirkan()" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-emerald-500 hover:text-emerald-400">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </footer>

    <script src="otakai.js"></script>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") pikirkan(); });

        // --- SISTEM SARAF MANUSIA (Balik Layar) ---
        function pikirkan() {
            const pesan = input.value.trim();
            if(!pesan) return;

            tambahChat("user", pesan);
            input.value = "";

            // Simulasi "Mikir" (Biar kerasa kayak manusia mikir dulu)
            setTimeout(() => {
                const jawaban = algoritmaSaraf(pesan);
                tambahChat("bot", jawaban);
            }, 600 + Math.random() * 1000); 
        }

        function algoritmaSaraf(input) {
            if (typeof dataMemori === 'undefined') return "Maaf Lan, saraf saya belum terhubung ke database.";

            const kataKunci = input.toLowerCase().split(/\s+/);
            let memoriTerkait = [];

            // 1. SCANNING DATA (Layer 1)
            dataMemori.forEach(item => {
                let matchCount = 0;
                const konten = (item.t + " " + item.s).toLowerCase();
                kataKunci.forEach(kata => { if(konten.includes(kata)) matchCount++; });
                
                if(matchCount > 0) memoriTerkait.push({...item, power: matchCount});
            });

            // 2. EMPATHY & PERSONALITY LAYER (Kemanusiaan)
            const pembuka = [
                "Oke Lan, coba saya pahami ya... ",
                "Wah menarik nih. Jadi gini, ",
                "Menurut ingatan saya, ",
                "Siap Lan, ini yang saya tau: ",
                "Berdasarkan apa yang saya pelajari, "
            ];
            
            const emosi = pembuka[Math.floor(Math.random() * pembuka.length)];

            // 3. SELECTION LAYER
            if (memoriTerkait.length > 0) {
                memoriTerkait.sort((a, b) => b.power - a.power);
                const hasil = memoriTerkait[0];
                
                // Rakit Jawaban agar tidak kaku
                return emosi + hasil.s + (hasil.s.length < 50 ? ". Ada lagi yang mau kamu tanya soal ini?" : "");
            }

            // 4. ADAPTABILITY (Jika data tidak ada)
            return "Waduh, saya coba cari di memori tapi belum ketemu. Sepertinya saya perlu belajar lebih banyak soal itu, Lan.";
        }

        function tambahChat(sender, teks) {
            const isBot = sender === 'bot';
            const div = document.createElement('div');
            div.className = `flex ${isBot ? 'justify-start' : 'justify-end'} animate-fadeIn`;
            
            div.innerHTML = `
                <div class="${isBot ? 'bg-transparent text-gray-200' : 'bg-emerald-600 text-white rounded-2xl'} p-3 px-4 chat-bubble text-sm leading-relaxed shadow-sm">
                    ${isBot ? '<span class="text-emerald-500 font-bold block text-[10px] mb-1">LITE AI</span>' : ''}
                    ${teks.replace(/\n/g, '<br>')}
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
