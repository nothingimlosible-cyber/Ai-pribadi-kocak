<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Alan - Versi Saraf Digital</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #chat-container { width: 90%; max-width: 500px; background: #161b22; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        #log-saraf { font-size: 10px; color: #8b949e; margin-bottom: 10px; font-family: monospace; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        #display { height: 300px; overflow-y: auto; border: 1px solid #30363d; padding: 10px; margin-bottom: 15px; border-radius: 10px; background: #010409; }
        .msg { margin-bottom: 12px; line-height: 1.4; }
        .bot { color: var(--primary); }
        .user { color: #58a6ff; text-align: right; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <h2>AI PRIBADI KOCAK 🧠</h2>

    <div id="chat-container">
        <div id="log-saraf">Sistem: Inisialisasi Jaringan Saraf... Ready.</div>
        <div id="display">
            <div class="msg bot">Menghubungkan ke saraf pusat...</div>
        </div>
        <input type="text" id="userInput" placeholder="Tanya sesuatu ke AI-mu..." onkeypress="handleEnter(event)">
    </div>

    <script src="otakai.js"></script>

    <script>
        const display = document.getElementById('display');
        const logSaraf = document.getElementById('log-saraf');
        const input = document.getElementById('userInput');

        // 1. DATABASE MOOD & KONTEKS
        let userNama = localStorage.getItem('nama_alan') || "";
        const moods = [
            { emosi: "Ceria", sapa: "Halo Lan! Lagi semangat nih. ", warna: "#00ff88" },
            { emosi: "Fokus", sapa: "Sistem stabil. Ada yang mau dipelajari? ", warna: "#58a6ff" },
            { emosi: "Lelah", sapa: "Hoam... robot juga bisa ngantuk, tapi oke saya bantu. ", warna: "#f1e05a" }
        ];

        // Inisialisasi awal
        setTimeout(() => {
            let sapaanAwal = userNama ? `Selamat datang kembali, ${userNama}!` : "Halo! Saya AI barumu. Siapa namamu?";
            addChat("bot", sapaanAwal);
        }, 1000);

        function handleEnter(e) {
            if (e.key === 'Enter') {
                prosesChat(input.value);
                input.value = "";
            }
        }

        function addChat(sender, text) {
            const div = document.createElement('div');
            div.classList.add('msg', sender);
            div.innerText = (sender === 'bot' ? '🤖 ' : '👤 ') + text;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        // 2. LOGIKA SARAF UTAMA (Thinking Process)
        async function prosesChat(pesan) {
            addChat("user", pesan);
            
            // Pilih mood secara acak untuk sesi ini
            const moodSekarang = moods[Math.floor(Math.random() * moods.length)];
            logSaraf.innerText = `Saraf: Emosi [${moodSekarang.emosi}] | Memproses: "${pesan}"`;

            // Cek jika AI belum tau nama
            if (!userNama) {
                userNama = pesan;
                localStorage.setItem('nama_alan', userNama);
                addChat("bot", `Oke, sekarang saya ingat. Kamu ${userNama} kan? Salam kenal!`);
                return;
            }

            // SIMULASI BERPIKIR (Saraf Digital)
            let skorTertinggi = 0;
            let dataTerpilih = null;
            const kataKunci = pesan.toLowerCase().split(" ");

            // Cari di otakai.js (yang diupdate robot tiap 6 jam)
            if (typeof dataMemori !== 'undefined') {
                dataMemori.forEach(item => {
                    let skor = 0;
                    let teksData = (item.t + " " + item.s).toLowerCase();

                    kataKunci.forEach(kata => {
                        if (teksData.includes(kata)) {
                            skor += 1;
                            // Bobot extra kalau kata kunci ada di judul (t)
                            if (item.t.toLowerCase().includes(kata)) skor += 2;
                        }
                    });

                    if (skor > skorTertinggi) {
                        skorTertinggi = skor;
                        dataTerpilih = item;
                    }
                });
            }

            // RESPONS LAYER
            setTimeout(() => {
                if (skorTertinggi > 0) {
                    let balasan = moodSekarang.sapa + "\n\n" + dataTerpilih.s;
                    addChat("bot", balasan);
                    logSaraf.innerText = `Saraf: Kecocokan ditemukan (${skorTertinggi} poin)`;
                } else {
                    // Respon jika tidak ada di database
                    const gagal = [
                        "Duh, saya cari di gudang nggak ada. Kamu udah suntik ilmu itu di Colab belum?",
                        "Saraf saya nggak nangkep maksudnya. Coba pake kata kunci lain, Lan.",
                        "Data itu kayaknya belum masuk ke database saya deh."
                    ];
                    addChat("bot", gagal[Math.floor(Math.random() * gagal.length)]);
                    logSaraf.innerText = `Saraf: Data tidak ditemukan.`;
                }
            }, 800); // Delay biar kerasa "mikir"
        }
    </script>
</body>
</html>
