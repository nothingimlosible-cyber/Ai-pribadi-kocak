<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Intelligence - Model x Tambang</title>
    <script src="database/otakai.js"></script>
    <style>
        :root {
            --bg: #090b0f;
            --panel: #12151a;
            --accent: linear-gradient(135deg, #4285f4, #9b51e0, #00d4ff);
            --text-main: #f0f2f5;
            --text-dim: #9aa0a6;
            --border: #2d3135;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px; background: rgba(18, 21, 26, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { font-weight: 800; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .status-badge { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-dim); background: #1a1d23; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
        .dot { width: 6px; height: 6px; background: #00e676; border-radius: 50%; box-shadow: 0 0 8px #00e676; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14.5px; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-bar { background: #1c1f26; border: 1px solid var(--border); border-radius: 30px; display: flex; padding: 5px 8px 5px 18px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 15px; }
        
        #p-bar-box { height: 2px; background: #1c1f26; width: 100%; }
        #p-bar { height: 100%; width: 0%; background: var(--accent); transition: 0.3s; }
        button { background: var(--accent); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="logo">CORE MODEL × TAMBANG</div>
    <div class="status-badge"><div class="dot"></div> <span id="st-text">Booting Engine...</span></div>
</header>
<div id="p-bar-box"><div id="p-bar"></div></div>

<div id="chat-container">
    <div class="msg ai">Sistem Hybrid Aktif. Model AI siap ngerapiin data dari Tambang Otak Alan.</div>
</div>

<div class="input-area">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tunggu sebentar..." disabled onkeypress="if(event.key === 'Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const stText = document.getElementById('st-text');
    const pBar = document.getElementById('p-bar');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatContainer = document.getElementById('chat-container');

    let penterjemah = null;

    // 1. Inisialisasi Model AI (Cuma buat ngerapiin teks, bukan buat mikir berat)
    async function initAI() {
        try {
            penterjemah = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct', {
                progress_callback: (p) => {
                    if (p.status === 'progress') {
                        stText.innerText = `Sync: ${p.progress.toFixed(0)}%`;
                        pBar.style.width = p.progress + '%';
                    }
                }
            });
            stText.innerText = "Online";
            pBar.parentElement.style.display = 'none';
        } catch (e) {
            stText.innerText = "Ready";
        }
        userInput.disabled = false; sendBtn.disabled = false;
        userInput.placeholder = "Tanya database...";
    }

    // 2. Fungsi Ambil Data dari Tambang (Cepat & Ringan)
    function ambilDariTambang(tanya) {
        if (typeof otakAI === 'undefined') return "";
        const q = tanya.toLowerCase();
        let matches = otakAI.map(item => {
            let skor = 0;
            const t = (item.topic || "").toLowerCase();
            const s = (item.summary || "").toLowerCase();
            if (t.includes(q)) skor += 100;
            q.split(" ").forEach(w => { if (s.includes(w)) skor += 10; });
            return { ...item, skor };
        }).filter(i => i.skor > 0).sort((a,b) => b.skor - a.skor);
        return matches.length > 0 ? matches[0].summary : "";
    }

    // 3. Kolaborasi: Tambang kasih data -> Model AI ngerapiin
    window.sendChat = async () => {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        appendMsg(text, 'user');
        userInput.value = '';
        
        // Step 1: Tarik data dari tambang (Instan)
        const daging = ambilDariTambang(text);
        if (!daging) {
            appendMsg("Maaf Lan, data itu gak ada di tambang.", "ai");
            return;
        }

        // Step 2: Model AI ngerapiin (Gak berat karena cuma baca satu teks)
        if (penterjemah) {
            stText.innerText = "Ngerapiin jawaban...";
            sendBtn.disabled = true;
            try {
                // Perintahnya cuma buat ngerapiin/meringkas data tambang
                const prompt = `<|im_start|>system\nJelaskan data ini secara profesional: ${daging}<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                const out = await penterjemah(prompt, { max_new_tokens: 60, temperature: 0.3 });
                const res = out[0].generated_text.split('assistant\n')[1];
                appendMsg(res.trim(), 'ai');
            } catch (err) {
                appendMsg(daging, 'ai'); // Backup hasil tambang asli kalo HP lagi cape
            } finally {
                sendBtn.disabled = false;
                stText.innerText = "Online";
            }
        } else {
            appendMsg(daging, 'ai');
        }
    };

    function appendMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        chatContainer.appendChild(d);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    initAI();
</script>
</body>
</html>
