<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAN ENGINE v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); border-top: 1px solid #30363d; }
        .chat-area { height: calc(100vh - 160px); scroll-behavior: smooth; }
        .user-bubble { background: #21262d; border: 1px solid #30363d; align-self: flex-end; border-radius: 18px 18px 4px 18px; color: #f0f6fc; }
        .ai-bubble { background: #23863615; border: 1px solid #23863644; align-self: flex-start; border-radius: 18px 18px 18px 4px; color: #7ee787; }
        .typing { font-style: italic; color: #8b949e; font-size: 0.8rem; }
    </style>
</head>
<body class="flex flex-col items-center h-screen overflow-hidden">

    <nav class="w-full max-w-2xl p-4 flex justify-between items-center border-b border-[#30363d] bg-[#0d1117]">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_8px_#238636]"></div>
            <span class="font-bold tracking-tight text-gray-200">ALAN-ENGINE <span class="text-[10px] text-green-500 bg-green-500/10 px-1.5 py-0.5 rounded">PRO</span></span>
        </div>
        <button onclick="location.reload()" class="text-[10px] uppercase tracking-widest text-gray-500 hover:text-white transition">Sync Data</button>
    </nav>

    <div id="chatBox" class="w-full max-w-2xl chat-area overflow-y-auto p-5 flex flex-col gap-6">
        <div class="ai-bubble p-4 text-sm shadow-sm">
            Selamat datang, **Bos Alan**. <br>Semua data dari `database/` sudah berhasil dimuat. Apa yang mau kita bahas?
        </div>
    </div>

    <div class="w-full max-w-2xl p-4 glass absolute bottom-0">
        <div class="flex gap-2 items-center bg-[#161b22] border border-[#30363d] rounded-2xl p-1.5 focus-within:border-[#58a6ff] transition">
            <input type="text" id="userInput" autocomplete="off" placeholder="Tanya hasil tambang..." 
                class="flex-1 bg-transparent border-none outline-none px-4 py-2 text-sm text-white">
            <button onclick="prosesChat()" class="bg-[#238636] hover:bg-[#2ea043] text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338L4.21 7.39l7.992-5.993-.001-.001ZM14.17 1.174 6.757 8.587 5.01 7.5l7.992-5.993-1.832 1.89-2.99 3.987L14.17 1.174Z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="otakai.js"></script>

    <script>
        function prosesChat() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const teks = input.value.trim();

            if (!teks) return;

            // Tampilkan Pesan User
            chatBox.innerHTML += `<div class="user-bubble p-4 text-sm shadow-sm">${teks}</div>`;
            
            // AI Sedang Mengetik...
            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `<div id="${typingId}" class="typing px-2 text-[10px]">Robot sedang mencari di database...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const typingElem = document.getElementById(typingId);
                if(typingElem) typingElem.remove();

                let jawaban = "";
                try {
                    // Logika pencarian data
                    const query = teks.toLowerCase();
                    const temuan = dataMemori.find(item => 
                        query.includes(item.topic.toLowerCase()) || 
                        item.summary.toLowerCase().includes(query) ||
                        item.topic.toLowerCase().includes(query)
                    );

                    if (temuan) {
                        // Ganti baris baru agar rapi
                        const cleanSummary = temuan.summary.replace(/\n/g, '<br>');
                        jawaban = `<strong>Topik: ${temuan.topic}</strong><br><br>${cleanSummary}`;
                    } else {
                        jawaban = "Maaf Bos Alan, data itu belum ada di tambang. Coba masukkan infonya ke `tambang.txt` dulu ya!";
                    }
                } catch (e) {
                    jawaban = "Error: Pastikan file `otakai.js` sudah ada di GitHub.";
                }

                // Tampilkan Jawaban AI
                chatBox.innerHTML += `<div class="ai-bubble p-4 text-sm leading-relaxed shadow-md">${jawaban}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);

            input.value = "";
        }

        // Fitur Enter
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') prosesChat();
        });
    </script>
</body>
</html>
