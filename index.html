<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan GPT - Neural Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-dot { width: 4px; height: 4px; background: #8e8ea0; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-[#343541] text-gray-100 font-sans">

    <div class="flex flex-col h-screen">
        <div class="p-3 text-center text-xs text-gray-400 border-b border-white/10">
            Algoritma: Jaringan Saraf Kontekstual v2 | Memori: <span id="mem-count">0</span> Data
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6 md:px-64">
            <div class="flex gap-4">
                <div class="w-8 h-8 bg-emerald-600 rounded-sm flex items-center justify-center text-xs">AI</div>
                <div class="flex-1 space-y-2">
                    <p class="text-gray-100">Halo Lan. Jaringan saraf saya sudah terhubung ke database. Apa yang mau kita bedah hari ini?</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-[#343541] border-t border-white/10 md:px-64 pb-8">
            <div class="relative flex items-center">
                <input type="text" id="userInput" placeholder="Ketik perintah atau tanya apapun..." 
                       class="w-full bg-[#40414f] text-white p-3 pr-12 rounded-xl border border-white/10 focus:border-emerald-500 outline-none shadow-xl">
                <button onclick="prosesSaraf()" class="absolute right-3 text-emerald-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
            <p class="text-[10px] text-gray-500 mt-2 text-center text-xs">Smart AI Alan: Berpikir menggunakan algoritma scoring kontekstual.</p>
        </div>
    </div>

    <script src="otakai.js"></script>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');
        const memCount = document.getElementById('mem-count');

        // Load Kapasitas Memori
        if (typeof dataMemori !== 'undefined') {
            memCount.innerText = dataMemori.length;
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") prosesSaraf(); });

        async function prosesSaraf() {
            const pesan = userInput.value.trim();
            if (!pesan) return;

            // Tampilkan Chat User
            tambahChat("user", pesan);
            userInput.value = "";

            // Animasi Berpikir (Simulasi Kerja Saraf)
            const loadingId = addLoading();
            
            // --- ALGORITMA JARINGAN SARAF (Logic Core) ---
            setTimeout(() => {
                const hasil = hitungLogika(pesan);
                removeLoading(loadingId);
                tambahChat("bot", hasil);
            }, 1200); 
        }

        function hitungLogika(input) {
            if (typeof dataMemori === 'undefined' || dataMemori.length === 0) {
                return "Saraf saya mendeteksi kegagalan koneksi ke database. Pastikan otakai.js sudah terisi.";
            }

            const tokens = input.toLowerCase().split(/\s+/);
            let kandidat = [];

            // 1. Scoring Engine (Layer 1)
            dataMemori.forEach(item => {
                let score = 0;
                const judul = (item.t || item.topic || "").toLowerCase();
                const isi = (item.s || item.summary || "").toLowerCase();

                tokens.forEach(t => {
                    if (judul.includes(t)) score += 10; // Bobot tinggi buat judul
                    if (isi.includes(t)) score += 2;   // Bobot pendukung buat isi
                });

                if (score > 0) {
                    kandidat.push({ ...item, finalScore: score });
                }
            });

            // 2. Sorting & Adaptabilitas (Layer 2)
            kandidat.sort((a, b) => b.finalScore - a.finalScore);

            if (kandidat.length > 0) {
                const top = kandidat[0];
                // Algoritma response generator
                return `${top.s || top.summary} \n\n(Relevansi Saraf: ${Math.min(top.finalScore * 5, 99)}%)`;
            }

            return "Maaf Lan, input tersebut belum terpetakan dalam jaringan saraf saya. Coba gunakan kata kunci koding atau sejarah yang lebih spesifik.";
        }

        function tambahChat(sender, teks) {
            const isBot = sender === 'bot';
            const html = `
                <div class="flex gap-4 ${isBot ? '' : 'flex-row-reverse'} animate-fadeIn">
                    <div class="w-8 h-8 ${isBot ? 'bg-emerald-600' : 'bg-blue-600'} rounded-sm flex items-center justify-center text-[10px] shrink-0">
                        ${isBot ? 'AI' : 'ALAN'}
                    </div>
                    <div class="flex-1 space-y-2 ${isBot ? '' : 'text-right'}">
                        <div class="inline-block text-gray-200 text-sm leading-relaxed">${teks.replace(/\n/g, '<br>')}</div>
                    </div>
                </div>
            `;
            chatBox.innerHTML += html;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addLoading() {
            const id = "load-" + Date.now();
            const loadingHtml = `
                <div id="${id}" class="flex gap-4 animate-pulse">
                    <div class="w-8 h-8 bg-emerald-600 rounded-sm flex items-center justify-center text-[10px]">AI</div>
                    <div class="flex gap-1 items-center">
                        <div class="typing-dot"></div>
                        <div class="typing-dot" style="animation-delay: 0.2s"></div>
                        <div class="typing-dot" style="animation-delay: 0.4s"></div>
                    </div>
                </div>`;
            chatBox.innerHTML += loadingHtml;
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
