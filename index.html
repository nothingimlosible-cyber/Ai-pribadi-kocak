<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAN NEURAL AI v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #e6edf3; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        .msg-user { background: #21262d; border: 1px solid #30363d; border-radius: 15px 15px 0 15px; }
        .msg-ai { background: #161b22; border: 1px solid #30363d; border-radius: 15px 15px 15px 0; position: relative; }
        .msg-ai::before { content: 'AI'; position: absolute; top: -18px; left: 0; font-size: 10px; color: #58a6ff; font-weight: bold; }
        
        input:focus { outline: none; border-color: #58a6ff !important; box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }
        .glow { box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <header class="w-full max-w-2xl p-6 flex justify-between items-center border-b border-[#30363d] sticky top-0 bg-[#0d1117]/80 backdrop-blur-md z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-sm font-bold tracking-tighter uppercase text-white">Alan Neural Engine <span class="text-blue-500">v2.0</span></h1>
        </div>
        <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white transition-all">SYNC DATABASE</button>
    </header>

    <main id="chatBox" class="chat-container w-full max-w-2xl p-4 space-y-6">
        <div class="msg-ai p-4 text-sm max-w-[85%] self-start mt-4">
            Halo Kak! Saya adalah AI pribadi Kak Alan yang sudah dilengkapi sistem Neural Engine. Mau bahas Trading, Sejarah, atau Geopolitik hari ini? ⛏️🚀
        </div>
    </main>

    <footer class="w-full max-w-2xl p-4 sticky bottom-0 bg-[#0d1117]">
        <div class="relative flex items-center">
            <input type="text" id="userInput" onkeypress="handleKey(event)" 
                placeholder="Tanyakan sesuatu..." 
                class="w-full bg-[#161b22] border border-[#30363d] text-white p-4 pr-16 rounded-2xl text-sm transition-all shadow-inner">
            <button onclick="prosesChat()" class="absolute right-2 bg-blue-600 hover:bg-blue-500 text-white p-2 px-4 rounded-xl text-xs font-bold transition-all">
                KIRIM
            </button>
        </div>
        <p class="text-[9px] text-center text-gray-600 mt-2 tracking-widest uppercase">Powered by Alan Neural Logic • Offline Database</p>
    </footer>

    <script src="otakai.js"></script>
    <script>
        /** * SISTEM INTELEGENSI NEURAL v2.0
         * Dibuat khusus untuk performa tinggi di HP 4GB
         */
        class NeuralEngine {
            constructor() {
                this.weights = {};
            }

            // Vektorisasi: Mengubah teks menjadi nilai matematika
            vektor(t) {
                let s = 0;
                const txt = t.toLowerCase();
                for (let i = 0; i < txt.length; i++) {
                    s += txt.charCodeAt(i) * (i + 1);
                }
                return (s % 1000) / 1000;
            }

            // Fuzzy Logic: Menghitung kemiripan karakter
            fuzzy(s1, s2) {
                const a = s1.toLowerCase();
                const b = s2.toLowerCase();
                let match = 0;
                for (let char of a) { if (b.includes(char)) match++; }
                return match / Math.max(a.length, b.length);
            }

            // Engine Utama: Menggabungkan Neural & Fuzzy
            pikirkan(input, db) {
                let topScore = -1;
                let topIndex = -1;
                const inputV = this.vektor(input);

                db.forEach((item, i) => {
                    const topicV = this.vektor(item.topic);
                    const fuzzyS = this.fuzzy(input, item.topic);
                    
                    // Skor Neural (40%) + Skor Fuzzy (60%)
                    const neuralS = (1 - Math.abs(inputV - topicV)) * 0.4;
                    const totalS = (fuzzyS * 0.6) + neuralS;

                    if (totalS > topScore) {
                        topScore = totalS;
                        topIndex = i;
                    }
                });

                return topScore > 0.25 ? db[topIndex] : null;
            }
        }

        const Engine = new NeuralEngine();

        function handleKey(e) { if (e.key === 'Enter') prosesChat(); }

        function tampilkanChat(teks, sender, id = null) {
            const box = document.getElementById('chatBox');
            const wrap = document.createElement('div');
            wrap.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const div = document.createElement('div');
            div.className = `p-4 text-sm max-w-[85%] ${sender === 'user' ? 'msg-user' : 'msg-ai'}`;
            if (id) div.id = id;
            div.innerHTML = teks;
            
            wrap.appendChild(div);
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }

        function prosesChat() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText) return;

            tampilkanChat(userText, 'user');
            input.value = '';

            const loadId = "ai-" + Date.now();
            tampilkanChat("<span class='animate-pulse text-blue-400'>Memproses memori...</span>", 'ai', loadId);

            setTimeout(() => {
                const hasil = Engine.pikirkan(userText, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const aiDiv = document.getElementById(loadId);

                if (hasil) {
                    const variasi = hasil.summary.split(' / ');
                    const final = variasi[Math.floor(Math.random() * variasi.length)];
                    aiDiv.innerHTML = `<b class="text-blue-400"># ${hasil.topic}</b><br>${final}`;
                } else {
                    aiDiv.innerHTML = "Maaf Kak, data tersebut tidak ditemukan di memori saya. Silakan tambahkan materinya ke database GitHub dulu ya! ⛏️";
                }
            }, 800);
        }
    </script>
</body>
</html>
