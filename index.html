<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Area Chat */
        .chat-container { height: calc(100vh - 140px); scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        
        /* Bubble User */
        .user-row { display: flex; justify-content: flex-end; margin-bottom: 24px; animation: slideUp 0.3s ease; }
        .user-bubble { background: #2b2d31; border-radius: 20px; padding: 12px 20px; max-width: 80%; font-size: 15px; color: #fff; }

        /* Bubble AI */
        .ai-row { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 32px; animation: fadeIn 0.5s ease; }
        .ai-name { font-size: 11px; font-weight: 600; color: #8ab4f8; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .ai-text { font-size: 16px; line-height: 1.7; color: #d1d1d1; max-width: 95%; white-space: pre-line; }
        
        /* Input Area */
        .footer-input { background: #131314; padding: 15px 20px; border-top: 1px solid #333; }
        .input-bar { background: #1e1f20; border-radius: 32px; padding: 10px 24px; display: flex; align-items: center; gap: 12px; transition: 0.2s; border: 1px solid transparent; }
        .input-bar:focus-within { border-color: #8ab4f8; background: #282a2c; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; height: 44px; font-size: 16px; }
        
        /* Animasi */
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .typing { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 4px; height: 4px; background: #8ab4f8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-[#131314]">
        <h1 class="text-sm font-bold tracking-[3px]">SMART <span class="text-[#8ab4f8]">AI</span></h1>
        <div id="mem-count" class="text-[9px] font-mono text-gray-600">SYNCING_MEMORIES...</div>
    </header>

    <main id="chatArea" class="chat-container p-5 flex flex-col overflow-y-auto">
        <div class="ai-row">
            <div class="ai-name">Smart AI</div>
            <div class="ai-text">Selamat datang, Kak Alan. Sistem siap memproses instruksi melalui ribuan memori lokal.</div>
        </div>
    </main>

    <footer class="footer-input">
        <div class="input-bar shadow-xl">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') startInference()" placeholder="Tanya sesuatu...">
            <button onclick="startInference()" class="text-[#8ab4f8] hover:scale-110 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
        <p class="text-[8px] text-center mt-3 text-gray-600 uppercase tracking-[2px]">On-Device Neural Engine v10.5</p>
    </footer>

    <script src="otakai.js"></script>
    <script>
        class SmartEngine {
            constructor() {
                this.noiseWords = ['apakah', 'bagaimana', 'apa', 'itu', 'saya', 'kak', 'dong', 'bang', 'bisa', 'tolong'];
                this.threshold = 1.0;
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.noiseWords.includes(w));
            }

            think(query, db) {
                const tokens = this.clean(query);
                let candidates = [];

                db.forEach(entry => {
                    let score = 0;
                    const topicStr = entry.topic.toLowerCase();
                    const summaryStr = entry.summary.toLowerCase();

                    tokens.forEach(tok => {
                        // Skor 10 jika ada di Topic (DNA Utama)
                        if (topicStr.includes(tok)) score += 10.0;
                        // Skor 1.5 jika ada di Summary (Konteks)
                        if (summaryStr.includes(tok)) score += 1.5;
                    });

                    if (score > this.threshold) {
                        candidates.push({ ...entry, power: score });
                    }
                });

                return candidates.sort((a, b) => b.power - a.power)[0];
            }
        }

        const Engine = new SmartEngine();

        // Load Memory Info
        window.onload = () => {
            const count = typeof dataMemori !== 'undefined' ? dataMemori.length : 0;
            document.getElementById('mem-count').innerText = `MEMORIES: ${count}`;
        };

        function startInference() {
            const el = document.getElementById('userInput');
            const prompt = el.value.trim();
            if (!prompt) return;

            // Render User Message
            addChat(prompt, 'user');
            el.value = '';

            // Render Typing
            const rid = "ai-" + Date.now();
            addChat(`<div class="typing"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = Engine.think(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let finalRes = result.summary;

                    // --- SMART SLICER (PILIH SATU JAWABAN) ---
                    if (finalRes.includes('/')) {
                        const parts = finalRes.split('/');
                        finalRes = parts[Math.floor(Math.random() * parts.length)].trim();
                    } else if (finalRes.length > 450) {
                        finalRes = finalRes.split('. ').slice(0, 4).join('. ') + '.';
                    }

                    // Render Clean Answer
                    box.innerHTML = `<div class="ai-name">Smart AI</div><div class="ai-text">${finalRes}</div>`;
                } else {
                    box.innerHTML = `<div class="ai-name">Smart AI</div><div class="ai-text italic opacity-40">Maaf Kak, pola saraf saya tidak menemukan data yang cocok untuk "${prompt}".</div>`;
                }
                const area = document.getElementById('chatArea');
                area.scrollTop = area.scrollHeight;
            }, 800);
        }

        function addChat(text, type, id = null) {
            const area = document.getElementById('chatArea');
            const row = document.createElement('div');
            row.className = type === 'user' ? 'user-row' : 'ai-row';
            if (id) row.id = id;
            
            const content = type === 'user' 
                ? `<div class="user-bubble">${text}</div>` 
                : text; // AI row is already formatted in startInference

            row.innerHTML = content;
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
