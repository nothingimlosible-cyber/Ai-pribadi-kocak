<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bot-bubble { animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-white/5 flex justify-between bg-[#050505] sticky top-0 z-10">
        <span class="text-emerald-500 font-bold tracking-tighter text-xl">LITE AI</span>
        <span class="text-[10px] text-gray-500 self-end">Neural Engine Active</span>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-8 hide-scroll">
        <div class="bot-bubble space-y-2">
            <p class="text-sm leading-relaxed">Sistem siap, Lan. Semua database sudah terhubung ke jaringan saraf saya. Apa yang ingin kamu ketahui?</p>
        </div>
    </main>

    <footer class="p-6 bg-[#050505] md:px-64">
        <div class="relative flex items-center max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." 
                   class="w-full bg-[#121212] border border-white/10 p-4 pr-16 rounded-2xl focus:outline-none focus:border-emerald-600 text-sm transition-all shadow-2xl">
            <button onclick="eksekusiSaraf()" class="absolute right-4 text-emerald-500 hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script src="otakai.js"></script>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") eksekusiSaraf(); });

        // --- INI ADALAH LOGIKA "OTAK" NYA ---
        function eksekusiSaraf() {
            const tanya = input.value.trim();
            if(!tanya) return;

            renderChat("user", tanya);
            input.value = "";

            // Simulasi loading "Thinking"
            const loadId = addThinking();

            setTimeout(() => {
                document.getElementById(loadId).remove();
                const jawaban = prosesLogika(tanya);
                renderChat("bot", jawaban);
            }, 800);
        }

        function prosesLogika(pesan) {
            if (typeof dataMemori === 'undefined') return "Maaf Lan, saraf saya belum terhubung ke memori pusat (otakai.js).";

            const inputan = pesan.toLowerCase();
            
            // 1. Logika Adaptif (Kemanusiaan)
            if(inputan.includes("halo") || inputan.includes("p")) return "Halo Lan! Ada yang bisa saya bantu bedah hari ini?";
            if(inputan.includes("siapa kamu")) return "Saya LITE AI, asisten digital yang belajar dari database yang kamu buat.";

            // 2. Jaringan Saraf Pencarian (Searching Algorithm)
            let skorTertinggi = 0;
            let dataFinal = null;
            const keywords = inputan.split(" ");

            dataMemori.forEach(item => {
                let point = 0;
                // Baca fleksibel (bisa t/topic atau s/summary)
                const judul = (item.t || item.topic || "").toLowerCase();
                const isi = (item.s || item.summary || "").toLowerCase();

                keywords.forEach(key => {
                    if(key.length < 3) return; 
                    if(judul.includes(key)) point += 10; // Point gede kalo ada di judul
                    if(isi.includes(key)) point += 2;   // Point kecil kalo di isi
                });

                if(point > skorTertinggi) {
                    skorTertinggi = point;
                    dataFinal = item;
                }
            });

            // 3. Output Decision
            if(dataFinal && skorTertinggi > 0) {
                const sapaan = ["Oke, ini penjelasannya: ", "Menurut data yang saya punya, ", "Ini yang saya tau, Lan: "];
                const hasil = dataFinal.s || dataFinal.summary;
                return sapaan[Math.floor(Math.random()*sapaan.length)] + hasil;
            }

            return "Wah, kayaknya saya belum punya data soal itu di database. Coba kamu suntik topiknya lewat Colab dulu ya!";
        }

        function renderChat(role, text) {
            const isBot = role === "bot";
            const div = document.createElement('div');
            div.className = `flex ${isBot ? 'justify-start' : 'justify-end'} bot-bubble`;
            div.innerHTML = `
                <div class="${isBot ? 'text-gray-300' : 'bg-emerald-600 text-white rounded-2xl'} p-3 px-4 max-w-[85%] text-sm leading-relaxed shadow-lg">
                    ${isBot ? '<span class="text-emerald-500 font-black text-[9px] uppercase block mb-1">LITE AI Core</span>' : ''}
                    ${text}
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addThinking() {
            const id = "think-" + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="bg-[#121212] text-gray-500 p-2 px-4 rounded-xl text-[10px]">LITE AI sedang berpikir...</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
