<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAN GPT-LITE v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #ced4da; font-family: 'Inter', sans-serif; }
        .ai-brain { border: 1px solid #1f242c; background: #0d1117; border-radius: 20px; }
        .token { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-xl py-6 text-center">
        <h1 class="text-xl font-black tracking-widest text-white italic">ALAN <span class="text-blue-500 text-2xl">CORE</span> AI</h1>
        <p class="text-[9px] text-gray-500 uppercase mt-1">Multi-Layer Transformer Architecture (Mobile Optimized)</p>
    </header>

    <main id="display" class="w-full max-w-xl h-[60vh] overflow-y-auto space-y-4 p-4 ai-brain mb-4"></main>

    <footer class="w-full max-w-xl sticky bottom-4">
        <div class="relative">
            <input type="text" id="input" onkeypress="if(event.key==='Enter') eksekusi()" placeholder="Coba tanya: 15 + 25 atau Sejarah..." 
                class="w-full p-5 bg-[#161b22] border border-[#30363d] rounded-2xl outline-none focus:border-blue-500 transition-all text-sm">
            <button onclick="eksekusi()" class="absolute right-3 top-3 bg-white text-black px-4 py-2 rounded-xl font-bold text-xs">THINK</button>
        </div>
    </footer>

    <script src="otakai.js"></script>
    <script>
        /**
         * ALAN TRANSFORMER-LITE ENGINE
         * Konsep: Membagi input ke dalam "Emosi", "Logika", dan "Data"
         */
        class AlanGPT {
            constructor() {
                this.history = [];
            }

            // 1. Layer Matematika (Tanpa Database)
            hitung(t) {
                try {
                    const mathMatch = t.match(/[0-9+\-*/().\s]+/g);
                    if (mathMatch && t.includes('+') || t.includes('-') || t.includes('*')) {
                        return "Hasil perhitungan logika saya adalah: " + eval(mathMatch[0]);
                    }
                } catch(e) { return null; }
                return null;
            }

            // 2. Layer Bahasa (Inggris - Indonesia Sederhana)
            translate(t) {
                const dict = {"hello": "Halo", "what": "Apa", "name": "Nama", "is": "adalah"};
                let words = t.toLowerCase().split(" ");
                let hasEnglish = words.some(w => dict[w]);
                if (hasEnglish) {
                    return "Saya mendeteksi bahasa Inggris. Inti pertanyaan Kakak adalah tentang: " + 
                           words.map(w => dict[w] || w).join(" ");
                }
                return null;
            }

            // 3. Layer Memori (Narik dari otakai.js)
            ambilMemori(t) {
                if (typeof dataMemori === 'undefined') return null;
                const match = dataMemori.find(i => t.toLowerCase().includes(i.topic.toLowerCase()));
                return match ? match.summary : null;
            }

            // MIKIR UTAMA (Brain Router)
            mikir(input) {
                // GPT bekerja dengan memprioritaskan "Task"
                const mathResult = this.hitung(input);
                if (mathResult) return mathResult;

                const transResult = this.translate(input);
                if (transResult) return transResult;

                const memResult = this.ambilMemori(input);
                if (memResult) return "Berdasarkan memori saya: " + memResult;

                return "Maaf Kak, pola input ini belum terpetakan di sirkuit saya. Coba kasih data baru ke tambang.txt!";
            }
        }

        const AI = new AlanGPT();

        function eksekusi() {
            const box = document.getElementById('input');
            const txt = box.value.trim();
            if(!txt) return;

            render(txt, 'user');
            box.value = '';

            setTimeout(() => {
                const reply = AI.mikir(txt);
                render(reply, 'ai');
            }, 600);
        }

        function render(t, s) {
            const d = document.getElementById('display');
            const m = document.createElement('div');
            m.className = s === 'user' ? 'text-right text-blue-400 text-sm' : 'text-left bg-[#1c2128] p-4 rounded-xl text-sm border border-[#30363d]';
            m.innerHTML = (s === 'ai' ? '<span class="token">●</span> ' : '') + t;
            d.appendChild(m);
            d.scrollTop = d.scrollHeight;
        }
    </script>
</body>
</html>
