<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX-X PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .chat-container { max-width: 700px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .message-area { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .ai-message { line-height: 1.7; margin-bottom: 25px; border-left: 2px solid #4f46e5; padding-left: 15px; }
        .user-message { background: #262626; border-radius: 15px; padding: 10px 15px; align-self: flex-end; margin-bottom: 25px; }
        .input-box { background: #262626; border-radius: 25px; padding: 12px 20px; display: flex; gap: 10px; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; }
            </style>
</head>
<body>

<div class="chat-container">
    <header class="p-4 border-b border-white/5 text-center">
        <h1 class="text-[10px] tracking-[4px] uppercase font-bold text-indigo-400">Axon-X Neural Core v7.0</h1>
    </header>

    <main id="chatArea" class="message-area flex flex-col"></main>

    <footer class="p-4">
        <div class="input-box">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') startThink()" placeholder="Apa itu Bumi?">
            <button onclick="startThink()" class="text-indigo-400 font-bold">SEND</button>
        </div>
    </footer>
</div>

<script src="otakai.js"></script>
<script>
    class AxonPro {
        constructor() {
            this.lastTopic = null;
        }

        tokenize(t) {
            return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 2);
        }

        process(query, db) {
            const tokens = this.tokenize(query);
            let candidates = [];

            db.forEach(entry => {
                let score = 0;
                const topicWords = this.tokenize(entry.topic);
                const contentWords = this.tokenize(entry.summary);

                tokens.forEach(q => {
                    // Skor tinggi untuk kecocokan di Topik (DNA)
                    if (topicWords.some(tw => tw.includes(q))) score += 10;
                    // Skor tambahan untuk kecocokan di isi
                    if (contentWords.some(cw => cw.includes(q))) score += 2;
                });

                if (score > 5) candidates.push({ ...entry, score });
            });

            // Urutkan dan hindari pengulangan topik yang sama
            const sorted = candidates.sort((a, b) => b.score - a.score);
            return sorted.length > 0 ? sorted[0] : null;
        }
    }

    const AI = new AxonPro();

    function startThink() {
        const input = document.getElementById('userInput');
        const q = input.value.trim();
        if (!q) return;

        addChat(q, 'user');
        input.value = '';

        setTimeout(() => {
            const data = AI.process(q, typeof dataMemori !== 'undefined' ? dataMemori : []);
            if (data) {
                // LOGIKA CERDAS: Pisahkan jawaban berdasarkan "/" dan pilih satu
                const parts = data.summary.split(' / ');
                const finalAnswer = parts[Math.floor(Math.random() * parts.length)];
                addChat(`<b>${data.topic}</b><br>${finalAnswer}`, 'ai');
            } else {
                addChat("Saya belum memiliki data spesifik tentang itu. Silakan tambahkan ke tambang.txt.", 'ai');
            }
        }, 500);
    }

    function addChat(text, type) {
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = type === 'user' ? 'user-message' : 'ai-message';
        div.innerHTML = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }
</script>
</body>
</html>
