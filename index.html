<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan AI - Personal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid #30363d; }
        .chat-area { height: calc(100vh - 180px); scroll-behavior: smooth; }
        .user-bubble { background: #21262d; border: 1px solid #30363d; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-bubble { background: #23863622; border: 1px solid #23863644; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center h-screen overflow-hidden">

    <nav class="w-full max-w-3xl p-4 flex justify-between items-center border-b border-[#30363d]">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="font-bold text-gray-200">ALAN-ENGINE <span class="text-xs font-light text-gray-500">v1.2</span></span>
        </div>
        <button onclick="location.reload()" class="text-xs text-gray-500 hover:text-white">Refresh Database</button>
    </nav>

    <div id="chatBox" class="w-full max-w-3xl chat-area overflow-y-auto p-4 flex flex-col gap-4">
        <div class="ai-bubble p-4 rounded-2xl max-w-[85%] text-sm leading-relaxed">
            Halo Bos Alan! Sistem siap. Mau nanya data apa yang baru dikeluarin dari tambang?
        </div>
    </div>

    <div class="w-full max-w-3xl p-4 absolute bottom-0 bg-[#0d1117]">
        <div class="glass rounded-xl p-2 flex gap-2 items-center">
            <input type="text" id="userInput" autocomplete="off" placeholder="Ketik topik tambang..." 
                class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-sm text-white">
            <button onclick="prosesChat()" class="bg-[#238636] hover:bg-[#2ea043] text-white px-5 py-2 rounded-lg font-semibold text-sm transition-all">
                Kirim
            </button>
        </div>
    </div>

    <script src="otakai.js"></script>

    <script>
        function prosesChat() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const teks = input.value.trim();

            if (!teks) return;

            // 1. Tampilkan Chat User
            chatBox.innerHTML += `<div class="user-bubble p-4 rounded-2xl max-w-[85%] text-sm shadow-sm">${teks}</div>`;
            
            // 2. Logika Balas (Cek apakah fungsi 'balas' ada di otakai.js)
            let jawaban = "";
            try {
                if (typeof balas === 'function') {
                    jawaban = balas(teks);
                } else {
                    // Jika otakai.js belum export function, pake cara manual cari di dataMemori
                    const query = teks.toLowerCase();
                    const temuan = dataMemori.find(item => 
                        query.includes(item.topic.toLowerCase()) || 
                        item.summary.toLowerCase().includes(query)
                    );
                    jawaban = temuan ? `[DATABASE] Mengenai ${temuan.topic}: ${temuan.summary}` : "Maaf Bos, data itu belum ditambang.";
                }
            } catch (e) {
                jawaban = "Aduh, otakai.js belum ke-load sempurna. Coba refresh halaman kak.";
            }

            // 3. Tampilkan Jawaban AI
            setTimeout(() => {
                chatBox.innerHTML += `<div class="ai-bubble p-4 rounded-2xl max-w-[85%] text-sm leading-relaxed">${jawaban}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 400);

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Fitur Enter
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') prosesChat();
        });
    </script>
</body>
</html>
