<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON-X | NEURAL CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400&display=swap');
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .neuron-line { background: linear-gradient(90deg, transparent, #3b82f6, transparent); height: 1px; width: 100%; opacity: 0.2; }
        .chat-area { height: calc(100vh - 180px); scrollbar-width: none; }
        .ai-bubble { border-left: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.03); padding-left: 20px; }
        .code-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #60a5fa; opacity: 0.7; }
        input:focus { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <header class="w-full max-w-4xl p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="relative"><div class="w-2 h-2 bg-blue-500 rounded-full animate-ping absolute"></div><div class="w-2 h-2 bg-blue-500 rounded-full relative"></div></div>
            <h1 class="text-[10px] font-bold tracking-[0.6em] uppercase text-blue-400">AXON-X NEURAL CORE</h1>
        </div>
        <div class="code-text uppercase">Module: Active // Data: 7B-Lite</div>
    </header>

    <main id="chatArea" class="chat-area w-full max-w-3xl p-6 space-y-12 overflow-y-auto"></main>

    <footer class="w-full max-w-3xl p-6 pb-10">
        <div class="relative group">
            <div class="absolute -top-10 left-0 text-[9px] code-text italic transition-all group-focus-within:opacity-100 opacity-30">Waiting for prompt input sequence...</div>
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') executeNeural()" 
                placeholder="Berikan instruksi..." 
                class="w-full bg-[#0a0a0a] border border-white/10 rounded-2xl p-5 px-8 outline-none focus:border-blue-500 transition-all text-sm shadow-2xl">
            <button onclick="executeNeural()" class="absolute right-3 top-2 bottom-2 px-6 bg-blue-600 text-white rounded-xl font-bold text-[10px] uppercase hover:bg-blue-400 transition-all">PROCESS</button>
        </div>
    </footer>

    <script src="otakai.js"></script>
    <script>
        /**
         * AXON-X NEURAL ENGINE v2.0
         * Fokus: Deep Scanning & Semantic Association
         */
        class AxonX {
            constructor() {
                this.history = [];
                this.weights = { topic: 3.5, body: 0.8 }; // Pembobotan Saraf
            }

            tokenize(text) {
                return text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 2);
            }

            // MODUL THINKING (Attention Mechanism KW)
            process(query, database) {
                const tokens = this.tokenize(query);
                let ranking = [];

                database.forEach(memory => {
                    let fireRate = 0; // Kekuatan sinyal saraf
                    const content = (memory.topic + " " + memory.summary).toLowerCase();

                    tokens.forEach(t => {
                        if (content.includes(t)) {
                            const isTopic = memory.topic.toLowerCase().includes(t);
                            // Sinyal lebih kuat kalau kata kunci ada di Judul
                            fireRate += isTopic ? this.weights.topic : this.weights.body;
                            
                            // Tambahan skor jika ada kecocokan frase unik
                            const occurrences = content.split(t).length - 1;
                            fireRate += (occurrences * 0.2);
                        }
                    });

                    if (fireRate > 0) ranking.push({ ...memory, power: fireRate.toFixed(2) });
                });

                return ranking.sort((a, b) => b.power - a.power)[0];
            }
        }

        const AI = new AxonX();

        function executeNeural() {
            const input = document.getElementById('userInput');
            const q = input.value.trim();
            if (!q) return;

            render(q, 'user');
            input.value = '';

            const nid = "axon-" + Date.now();
            render(`<div class="flex flex-col gap-2"><div class="code-text animate-pulse">ANALYZING_SYNAPSE_CONNECTION...</div><div class="neuron-line"></div></div>`, 'ai', nid);

            setTimeout(() => {
                const res = AI.process(q, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(nid);

                if (res) {
                    const variants = res.summary.split(' / ');
                    const final = variants[Math.floor(Math.random() * variants.length)];
                    box.innerHTML = `
                        <div class="flex flex-col gap-4">
                            <div class="flex justify-between items-center opacity-40">
                                <span class="code-text">#${res.topic}</span>
                                <span class="code-text">PWR_${res.power}</span>
                            </div>
                            <div class="text-lg leading-relaxed font-light text-gray-200">${final}</div>
                        </div>
                    `;
                } else {
                    box.innerHTML = `<div class="opacity-40 italic text-sm">Signal lost. Input tidak terdeteksi dalam sirkuit memori. Tambahkan data di tambang.txt.</div>`;
                }
            }, 800);
        }

        function render(text, type, id = null) {
            const area = document.getElementById('chatArea');
            const wrap = document.createElement('div');
            wrap.className = type === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const div = document.createElement('div');
            div.className = type === 'user' ? 'bg-[#111] p-4 px-6 rounded-2xl border border-white/5 text-sm max-w-[80%]' : 'ai-bubble w-full';
            if (id) div.id = id;
            div.innerHTML = text;

            wrap.appendChild(div);
            area.appendChild(wrap);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
