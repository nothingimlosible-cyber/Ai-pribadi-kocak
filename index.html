<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Intelligence</title>
    <script src="database/otakai.js"></script>
    <style>
        :root { --bg: #090b0f; --panel: #12151a; --accent: linear-gradient(135deg, #4285f4, #9b51e0); --text: #f0f2f5; --border: #23262b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: rgba(18, 21, 26, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); text-align: center; }
        .logo { font-weight: 800; font-size: 1rem; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; }
        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: var(--bg); }
        .input-bar { background: #1c1f26; border: 1px solid var(--border); border-radius: 25px; display: flex; padding: 5px 10px 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 15px; }
        button { background: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer; }
    </style>
</head>
<body>

<header><div class="logo">CORE INTELLIGENCE</div></header>

<div id="chat-container">
    <div class="msg ai">Sistem AI Lokal Aktif. Model 20MB & Tambang sudah siap, Lan!</div>
</div>

<div class="input-area">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tanya apa saja..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button id="sendBtn" onclick="sendChat()">↑</button>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    let modelAI = null;
    const chatContainer = document.getElementById('chat-container');

    // Inisialisasi Model (Si Kecil Pinter)
    async function loadModel() {
        try {
            modelAI = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
            console.log("Model Siap!");
        } catch (e) { console.log("Gagal muat model."); }
    }

    function cariDaging(q) {
        if (typeof otakAI === 'undefined') return "";
        const query = q.toLowerCase();
        let match = otakAI.find(i => (i.topic||"").toLowerCase().includes(query) || (i.summary||"").toLowerCase().includes(query));
        return match ? match.summary : "";
    }

    window.sendChat = async () => {
        const text = document.getElementById('userInput').value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        document.getElementById('userInput').value = '';

        const dataTambang = cariDaging(text);
        const aiMsgDiv = appendMsg("...", 'ai');

        if (modelAI) {
            try {
                // Prompt maut: Gabungin Model & Tambang
                const prompt = `<|im_start|>system\nKamu asisten cerdas. Gunakan info ini: ${dataTambang}\nJawab dengan ramah dan pinter.<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                
                const out = await modelAI(prompt, { max_new_tokens: 100, temperature: 0.6 });
                let hasil = out[0].generated_text.split('assistant\n')[1]?.trim() || "Saya sedang memikirkan itu...";
                
                // Efek ngetik real-time biar kerasa AI-nya
                aiMsgDiv.innerText = "";
                let i = 0;
                function ngetik() {
                    if (i < hasil.length) {
                        aiMsgDiv.innerText += hasil.charAt(i);
                        i++;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        setTimeout(ngetik, 20);
                    }
                }
                ngetik();
            } catch (err) {
                aiMsgDiv.innerText = dataTambang || "Aduh Lan, memoriku lagi penuh buat mikir itu.";
            }
        } else {
            aiMsgDiv.innerText = dataTambang || "Model belum siap, tapi di tambang gak ada data itu.";
        }
    };

    function appendMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        chatContainer.appendChild(d);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return d;
    }

    loadModel();
</script>
</body>
</html>
