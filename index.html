<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL CORE v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .neuron-bg { background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .ai-text { line-height: 1.8; color: #d1d5db; letter-spacing: -0.01em; }
        .pulse-ai { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="neuron-bg flex flex-col items-center min-h-screen">

    <header class="w-full max-w-4xl p-6 flex justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-blue-500 rounded-full pulse-ai"></div>
            <span class="text-[10px] font-bold tracking-[4px] uppercase">Alan GPT Core v1.0</span>
        </div>
        <span class="text-[10px] opacity-30 font-mono">STATUS: NEURAL_MAPPING_ACTIVE</span>
    </header>

    <main id="chatBox" class="flex-1 w-full max-w-3xl overflow-y-auto p-6 space-y-10 scrollbar-hide"></main>

    <footer class="w-full max-w-3xl p-6 pb-10">
        <div class="relative group">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') matrixThinking()" 
                placeholder="Masukkan prompt untuk diproses sirkuit neural..." 
                class="w-full bg-[#0a0a0a] border border-white/10 rounded-full p-5 px-8 outline-none focus:border-blue-500 transition-all text-sm shadow-2xl">
            <button onclick="matrixThinking()" class="absolute right-3 top-2 bottom-2 px-6 bg-white text-black rounded-full font-black text-[10px] uppercase hover:bg-blue-500 hover:text-white transition-all">
                PROCESS
            </button>
        </div>
    </footer>

    <script src="otakai.js"></script>
    <script>
        /**
         * PURE MATRIX NEURAL ENGINE
         * Menggunakan logika bobot (Weights) untuk menentukan arah pikiran.
         */
        class GPTCore {
            constructor() {
                this.weights = { title: 1.5, body: 0.5 };
                this.neurons = {};
            }

            // Fungsi Tokenizer: Mengubah kalimat menjadi Matrix Sinyal
            signal(text) {
                return text.toLowerCase().split(/\s+/).filter(w => w.length > 2);
            }

            // Hidden Layer: Mencari korelasi antar memori
            think(input, database) {
                const querySignals = this.signal(input);
                let ranking = [];

                database.forEach(memory => {
                    let fireRate = 0; // Seberapa kuat neuron merespon
                    const topicSignals = this.signal(memory.topic);
                    const bodySignals = this.signal(memory.summary);

                    querySignals.forEach(q => {
                        // Cek kedekatan di judul (Bobot 1.5)
                        if (topicSignals.some(t => t.includes(q))) fireRate += this.weights.title;
                        // Cek kedekatan di isi (Bobot 0.5)
                        if (bodySignals.some(b => b.includes(q))) fireRate += this.weights.body;
                    });

                    if (fireRate > 0) {
                        ranking.push({ ...memory, power: fireRate });
                    }
                });

                // Urutkan berdasarkan sinyal terkuat (Ranking Vektor)
                return ranking.sort((a, b) => b.power - a.power)[0];
            }
        }

        const AlanBrain = new GPTCore();

        function matrixThinking() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if (!prompt) return;

            render(prompt, 'user');
            input.value = '';

            // Tampilkan animasi sirkuit
            const cid = "core-" + Date.now();
            render(`<div class="text-[10px] font-mono text-blue-500 mb-2">NEURAL_CALCULATING...</div><div class="w-12 h-0.5 bg-blue-500 pulse-ai"></div>`, 'ai', cid);

            setTimeout(() => {
                const output = AlanBrain.think(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const display = document.getElementById(cid);

                if (output) {
                    const variants = output.summary.split(' / ');
                    const finalResponse = variants[Math.floor(Math.random() * variants.length)];
                    
                    display.innerHTML = `
                        <div class="text-[9px] opacity-30 font-mono mb-3 tracking-widest uppercase">Result found for: ${output.topic} (pwr_${output.power})</div>
                        <div class="ai-text text-lg">${finalResponse}</div>
                    `;
                } else {
                    display.innerHTML = `<div class="ai-text opacity-40 italic">Input tidak ditemukan dalam pemetaan memori. Silakan berikan asupan data di tambang.txt.</div>`;
                }
            }, 800);
        }

        function render(text, type, id = null) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'flex flex-col items-end' : 'flex flex-col items-start';
            
            const content = document.createElement('div');
            content.className = type === 'user' ? 'bg-white/5 p-4 px-6 rounded-3xl text-sm max-w-[80%]' : 'w-full';
            if (id) content.id = id;
            content.innerHTML = text;

            div.appendChild(content);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
