<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pribadi Alan - Google Edition</title>
    <script src="database/otakai.js"></script>
    <style>
        :root { --primary: #4285f4; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .typing { font-style: italic; font-size: 12px; color: #777; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="msg ai">Halo Alan! Aku asisten pribadi kamu yang sudah "makan" data tambang. Mau tanya apa hari ini?</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Tanya sesuatu..." onkeypress="if(event.key === 'Enter') sendChat()">
    <button onclick="sendChat()">Kirim</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');

    function sendChat() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        userInput.value = '';

        // Efek ngetik sebentar biar keren
        const typingId = 'typing-' + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.id = typingId;
        typingDiv.className = 'typing';
        typingDiv.innerText = 'AI Alan sedang memilah memori...';
        chatContainer.appendChild(typingDiv);

        setTimeout(() => {
            document.getElementById(typingId).remove();
            const jawaban = cariJawabanCerdas(text);
            appendMsg(jawaban, 'ai');
        }, 600);
    }

    function appendMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // --- LOGIKA GOOGLE LOKAL (SCORING) ---
    function cariJawabanCerdas(tanya) {
        const input = tanya.toLowerCase();
        const keywords = input.split(" ").filter(k => k.length > 2);
        
        let database = typeof otakAI !== 'undefined' ? otakAI : [];
        let rujukan = [];

        database.forEach(item => {
            let skor = 0;
            const judul = item.topic.toLowerCase();
            const isi = item.summary.toLowerCase();

            // 1. Cek kecocokan total (Skor paling tinggi)
            if (judul.includes(input)) skor += 20;
            if (isi.includes(input)) skor += 5;

            // 2. Cek kecocokan per kata kunci
            keywords.forEach(kw => {
                if (judul.includes(kw)) skor += 10; // Kata kunci ada di judul
                if (isi.includes(kw)) skor += 2;   // Kata kunci ada di penjelasan
            });

            if (skor > 0) {
                rujukan.push({ ...item, skor });
            }
        });

        // Urutkan dari skor tertinggi
        rujukan.sort((a, b) => b.skor - a.skor);

        if (rujukan.length > 0) {
            // Ambil yang paling relevan
            const terbaik = rujukan[0];
            return terbaik.summary;
        } else {
            // Kalimat kalau tidak nemu
            const bingung = [
                "Wah, data itu belum ada di tambang aku, Lan. Coba kasih kata kunci lain?",
                "Hmm, memori aku soal itu masih kosong. Perlu nambang lagi nih!",
                "Aku cari di database tapi nggak ketemu. Mungkin judulnya beda?"
            ];
            return bingung[Math.floor(Math.random() * bingung.length)];
        }
    }
</script>

</body>
</html>
