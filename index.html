<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Intelligence - Integrated</title>
    <script src="database/otakai.js"></script>
    <style>
        :root {
            --bg: #090b0f;
            --panel: #12151a;
            --accent: linear-gradient(135deg, #4285f4, #9b51e0);
            --text-main: #f0f2f5;
            --border: #23262b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: rgba(18, 21, 26, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center;
        }

        .logo {
            font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;
            background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 82%; padding: 12px 16px; border-radius: 20px;
            font-size: 14.5px; line-height: 1.5; word-wrap: break-word;
        }

        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 15px 20px 25px 20px; background: var(--bg); }
        .input-bar {
            background: #1c1f26; border: 1px solid var(--border);
            border-radius: 30px; display: flex; padding: 5px 8px 5px 18px; align-items: center;
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px 0; outline: none; font-size: 15px;
        }

        button {
            background: var(--accent); border: none; width: 38px; height: 38px;
            border-radius: 50%; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<header><div class="logo">CORE INTELLIGENCE</div></header>

<div id="chat-container">
    <div class="msg ai">Halo Alan! Sistem Model x Tambang sudah aktif. Coba sapa aku!</div>
</div>

<div class="input-area">
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Tanya sesuatu..." onkeypress="if(event.key === 'Enter') window.sendChat()">
        <button id="sendBtn" onclick="window.sendChat()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script type="module">
    // 1. Import dari brain.js
    import { bangunkanModel, tanyaModel } from './database/brain.js';

    // Bangunkan otak AI di background
    bangunkanModel();

    const chatContainer = document.getElementById('chat-container');

    // 2. Fungsi cari di tambang tetap di sini
    function ambilDataTambang(q) {
        if (typeof otakAI === 'undefined') return "";
        const query = q.toLowerCase();
        let match = otakAI.find(i => 
            (i.topic || "").toLowerCase().includes(query) || 
            (i.summary || "").toLowerCase().includes(query)
        );
        return match ? match.summary : "";
    }

    // 3. DAFTARKAN KE WINDOW BIAR TOMBOL BISA KLIK (PENTING!)
    window.sendChat = async () => {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        inputField.value = '';

        const dataDaging = ambilDataTambang(text);
        const aiMsgBox = appendMsg("...", 'ai');

        try {
            // Panggil model dari brain.js
            const jawabanAI = await tanyaModel(text, dataDaging);

            // Efek ngetik streaming
            aiMsgBox.innerText = "";
            let i = 0;
            const typingSpeed = 20;

            function typeWriter() {
                if (i < jawabanAI.length) {
                    aiMsgBox.innerText += jawabanAI.charAt(i);
                    i++;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    setTimeout(typeWriter, typingSpeed);
                }
            }
            typeWriter();
        } catch (e) {
            aiMsgBox.innerText = "Gagal memproses. Cek file brain.js kamu, Lan.";
        }
    };

    function appendMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        chatContainer.appendChild(d);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return d;
    }
</script>
</body>
</html>
