<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .chat-container { height: calc(100vh - 140px); scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        .user-row { display: flex; justify-content: flex-end; margin-bottom: 24px; animation: slideUp 0.3s ease; }
        .user-bubble { background: #2b2d31; border-radius: 20px; padding: 12px 20px; max-width: 80%; font-size: 15px; }
        .ai-row { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 32px; animation: fadeIn 0.5s ease; }
        .ai-name { font-size: 11px; font-weight: 600; color: #8ab4f8; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
        .ai-text { font-size: 16px; line-height: 1.7; color: #d1d1d1; max-width: 95%; white-space: pre-line; }
        .footer-input { background: #131314; padding: 15px 20px; border-top: 1px solid #333; }
        .input-bar { background: #1e1f20; border-radius: 32px; padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; height: 44px; font-size: 16px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .typing { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 4px; height: 4px; background: #8ab4f8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 flex justify-between items-center border-b border-white/5">
        <h1 class="text-sm font-bold tracking-[3px]">SMART <span class="text-[#8ab4f8]">AI</span></h1>
        <div class="text-[9px] font-mono text-gray-600 uppercase">Neural Context Active</div>
    </header>

    <main id="chatArea" class="chat-container p-5 flex flex-col overflow-y-auto"></main>

    <footer class="footer-input">
        <div class="input-bar">
            <input type="text" id="userInput" onkeypress="if(event.key==='Enter') startInference()" placeholder="Mulai obrolan baru...">
            <button onclick="startInference()" class="text-[#8ab4f8] hover:scale-110 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
        <p class="text-[8px] text-center mt-3 text-gray-600 uppercase tracking-[2px]">On-Device Neural Context v13.0</p>
    </footer>

    <script src="otakai.js"></script>
    <script>
        class GeminiSenseEngine {
            constructor() {
                this.noiseWords = ['apakah', 'bagaimana', 'apa', 'itu', 'saya', 'kak', 'dong', 'bang', 'bisa', 'tolong'];
                this.context = ""; // Hanya simpan 1 konteks terakhir yang valid
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.noiseWords.includes(w));
            }

            think(query, db) {
                const currentTokens = this.clean(query);
                
                // --- STRATEGI BARU: PRIORITAS PERTANYAAN BARU ---
                // 1. Coba cari tanpa konteks dulu (Biar gak "halusinasi")
                let result = this.search(currentTokens, db);
                
                // 2. Kalau gak ketemu, baru coba pake bantuan konteks
                if (!result && this.context) {
                    const combinedTokens = this.clean(this.context + " " + query);
                    result = this.search(combinedTokens, db);
                }

                if (result) this.context = result.topic; // Simpan konteks buat nanti
                return result;
            }

            search(tokens, db) {
                let candidates = [];
                db.forEach(entry => {
                    let score = 0;
                    const topicStr = entry.topic.toLowerCase();
                    const summaryStr = entry.summary.toLowerCase();

                    tokens.forEach(tok => {
                        if (topicStr.includes(tok)) score += 15.0; // Skor Topic dinaikkan
                        if (summaryStr.includes(tok)) score += 2.0;
                    });

                    if (score > 1.5) candidates.push({ ...entry, pwr: score });
                });
                return candidates.sort((a, b) => b.pwr - a.pwr)[0];
            }
        }

        const AI = new GeminiSenseEngine();

        function startInference() {
            const el = document.getElementById('userInput');
            const prompt = el.value.trim();
            if (!prompt) return;

            addChat(prompt, 'user');
            el.value = '';

            const rid = "ai-" + Date.now();
            addChat(`<div class="typing"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = AI.think(prompt, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let finalRes = result.summary;
                    if (finalRes.includes('/')) {
                        const parts = finalRes.split('/');
                        finalRes = parts[Math.floor(Math.random() * parts.length)].trim();
                    }
                    box.innerHTML = `<div class="ai-name">Smart AI</div><div class="ai-text">${finalRes}</div>`;
                } else {
                    box.innerHTML = `<div class="ai-name">Smart AI</div><div class="ai-text italic opacity-40">Maaf Kak Alan, saya belum paham konteksnya.</div>`;
                }
                document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
            }, 700);
        }

        function addChat(text, type, id = null) {
            const area = document.getElementById('chatArea');
            const row = document.createElement('div');
            row.className = type === 'user' ? 'user-row' : 'ai-row';
            if (id) row.id = id;
            row.innerHTML = type === 'user' ? `<div class="user-bubble">${text}</div>` : text;
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
