<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Professional Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', -apple-system, sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #30363d; }
        .chat-area { height: calc(100vh - 160px); scroll-behavior: smooth; }
        
        /* Bubble Chat Style */
        .user-bubble { 
            background: #21262d; 
            border: 1px solid #30363d; 
            align-self: flex-end; 
            border-radius: 15px 15px 2px 15px; 
            max-width: 85%;
        }
        .ai-bubble { 
            background: rgba(35, 134, 54, 0.05); 
            border: 1px solid rgba(35, 134, 54, 0.2); 
            align-self: flex-start; 
            border-radius: 15px 15px 15px 2px; 
            max-width: 85%;
        }
        
        /* Typing Indicator */
        .typing { font-size: 11px; color: #8b949e; display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
        .dot { width: 4px; height: 4px; background: #8b949e; border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center h-screen overflow-hidden">

    <nav class="w-full max-w-3xl p-4 flex justify-between items-center border-b border-[#30363d] bg-[#0d1117] sticky top-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-blue-500 rounded-full shadow-[0_0_10px_#1f6feb]"></div>
            <span class="font-semibold tracking-tight text-gray-100">AI ASSISTANT <span class="text-[9px] text-blue-400 border border-blue-400/30 px-1.5 py-0.5 rounded ml-1 uppercase">v2.5</span></span>
        </div>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white transition uppercase tracking-tighter">Sync Database</button>
        </div>
    </nav>

    <div id="chatBox" class="w-full max-w-3xl chat-area overflow-y-auto p-5 flex flex-col gap-6">
        <div class="ai-bubble p-4 text-sm leading-relaxed text-gray-200">
            Halo. Saya adalah asisten AI Anda. Basis data telah dimuat sepenuhnya dan saya siap membantu menjawab pertanyaan Anda berdasarkan informasi yang tersedia.
        </div>
    </div>

    <div class="w-full max-w-3xl p-4 glass absolute bottom-0">
        <div class="flex gap-2 items-center bg-[#161b22] border border-[#30363d] rounded-xl p-1 focus-within:border-[#58a6ff] transition-all">
            <input type="text" id="userInput" autocomplete="off" placeholder="Ketik pesan Anda di sini..." 
                class="flex-1 bg-transparent border-none outline-none px-4 py-2.5 text-sm text-white placeholder-gray-500">
            <button onclick="prosesChat()" class="bg-[#238636] hover:bg-[#2ea043] text-white w-10 h-10 rounded-lg flex items-center justify-center transition shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338L4.21 7.39l7.992-5.993-.001-.001ZM14.17 1.174 6.757 8.587 5.01 7.5l7.992-5.993-1.832 1.89-2.99 3.987L14.17 1.174Z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="otakai.js"></script>

    <script>
        function prosesChat() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const teks = input.value.trim();

            if (!teks) return;

            // 1. Pesan Pengguna
            chatBox.innerHTML += `<div class="user-bubble p-4 text-sm">${teks}</div>`;
            
            // 2. Indikator Berpikir
            const typingId = "typing-" + Date.now();
            chatBox.innerHTML += `
                <div id="${typingId}" class="typing px-2">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    <span>Mencari informasi...</span>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const typingElem = document.getElementById(typingId);
                if(typingElem) typingElem.remove();

                let jawaban = "";
                try {
                    const query = teks.toLowerCase();
                    // Mencari kecocokan topik atau ringkasan
                    const temuan = dataMemori.find(item => 
                        query.includes(item.topic.toLowerCase()) || 
                        item.topic.toLowerCase().includes(query)
                    );

                    if (temuan) {
                        // Logika Merakit Bahasa Profesional
                        const variasi = temuan.summary.split('/');
                        const pilihan = variasi[Math.floor(Math.random() * variasi.length)].trim();
                        
                        // Kalimat Pembuka Formal
                        const bumbu = [
                            "Berdasarkan data yang saya temukan: ",
                            "Tentu, berikut adalah penjelasan mengenai hal tersebut: ",
                            "Informasi yang relevan dalam basis data menyebutkan bahwa: ",
                            "Saya telah menemukan referensi terkait. Berikut detailnya: ",
                            "Menurut catatan informasi saya: "
                        ];
                        const pembuka = bumbu[Math.floor(Math.random() * bumbu.length)];

                        jawaban = `<strong>${temuan.topic.toUpperCase()}</strong><br><br>${pembuka}${pilihan.replace(/\n/g, '<br>')}`;
                    } else {
                        jawaban = "Mohon maaf, saya tidak menemukan informasi yang relevan dalam basis data saya saat ini. Pastikan informasi tersebut telah dimasukkan melalui sistem input data.";
                    }
                } catch (e) {
                    jawaban = "<span class='text-red-400'>Terjadi kesalahan teknis saat mengakses basis data.</span>";
                }

                // 3. Pesan AI
                chatBox.innerHTML += `<div class="ai-bubble p-4 text-sm leading-relaxed">${jawaban}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);

            input.value = "";
        }

        // Enter Listener
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') prosesChat();
        });
    </script>
</body>
</html>
