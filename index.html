<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan AI - Professional Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: #e5e7eb; }
        .chat-container { height: calc(100vh - 160px); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div class="w-full max-w-2xl flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">ALAN-AI v1.0</h1>
        <div class="text-xs bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/30">● Online</div>
    </div>

    <div id="chatBox" class="w-full max-w-2xl chat-container glass rounded-2xl p-4 overflow-y-auto mb-4 flex flex-col gap-4">
        <div class="bg-blue-600/20 self-start p-3 rounded-2xl rounded-tl-none max-w-[80%] border border-blue-500/30">
            Halo Bos Alan! Ada yang bisa saya bantu tambang hari ini?
        </div>
    </div>

    <div class="w-full max-w-2xl flex gap-2 glass p-2 rounded-2xl">
        <input type="text" id="userInput" placeholder="Tanya sesuatu..." 
            class="flex-1 bg-transparent border-none outline-none p-2 text-sm text-white placeholder-gray-500">
        <button onclick="kirimPesan()" class="bg-blue-600 hover:bg-blue-500 transition px-6 py-2 rounded-xl font-bold text-sm">
            Kirim
        </button>
    </div>

    <script type="module">
        // Import otak dari file hasil tambang robot
        import { balas } from './otakai.js';

        window.kirimPesan = function() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const teks = input.value.trim();

            if (!teks) return;

            // Tampilkan pesan user
            chatBox.innerHTML += `<div class="bg-gray-700/50 self-end p-3 rounded-2xl rounded-tr-none max-w-[80%] border border-gray-600/30 text-sm">${teks}</div>`;
            
            // AI Mikir (Panggil fungsi dari otakai.js)
            const jawaban = balas(teks);

            // Tampilkan balasan AI
            setTimeout(() => {
                chatBox.innerHTML += `<div class="bg-blue-600/20 self-start p-3 rounded-2xl rounded-tl-none max-w-[80%] border border-blue-500/30 text-sm">${jawaban}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Support tekan Enter buat kirim
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') kirimPesan();
        });
    </script>
</body>
</html>
