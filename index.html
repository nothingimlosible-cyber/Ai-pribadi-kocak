<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hybrid GPT Brain Correct Architecture</title>

<script src="otakai.js"></script>
<script src="dataMemori.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  display:flex;
  height:100vh;
}

#sidebar{
  width:260px;
  background:#111;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
}

#chat{
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg{
  margin:10px 0;
  padding:10px 14px;
  border-radius:12px;
  max-width:80%;
}

.user{background:#2a2a2a;margin-left:auto}
.ai{background:#151515;border:1px solid #333}

#bar{
  display:flex;
  padding:10px;
  background:#111;
  border-top:1px solid #222;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:#222;
  color:white;
  border-radius:10px;
}

button{
  padding:12px 16px;
  border:none;
  background:white;
  color:black;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div style="padding:10px;font-weight:bold;border-bottom:1px solid #222">
    🧠 AI Brain System
  </div>
</div>

<div style="flex:1;display:flex;flex-direction:column">

<div id="chat"></div>

<div id="bar">
  <input id="input" placeholder="Tanya AI...">
  <button onclick="send()">Kirim</button>
</div>

</div>

<script>

// =========================
// 🧠 EMOTION ENGINE
// =========================

function detectEmotion(t){

  t=t.toLowerCase()

  if(t.includes("sedih")||t.includes("capek")) return "empathetic"
  if(t.includes("kenapa")||t.includes("jelasin")) return "analytical"
  if(t.includes("ai")) return "focused"

  return "neutral"
}

// =========================
// 🧠 OTACAI ENGINE (WAJIB UTAMA)
// =========================
// ini yang kamu bilang "otakai.js"

function runOtakai(input){

  // fallback kalau AI.think tidak ada hasil
  try{
    return AI.think(input)
  }catch(e){
    return null
  }
}

// =========================
// 🧠 DATABASE SEARCH (dataMemori.js)
// =========================

function searchDB(input){

  let words = input.toLowerCase().split(" ")

  let best = null
  let score = 0

  for(let d of dataMemori){

    let s = 0

    words.forEach(w=>{
      if(d.topic.includes(w)) s += 3
      if(d.summary.includes(w)) s += 1
    })

    if(s > score){
      score = s
      best = d
    }
  }

  return best
}

// =========================
// 🧠 GPT STYLE RESPONSE ENGINE
// =========================

function buildResponse(input, dbResult, otakaiResult, emotion){

  let out = ""

  // 1. ACKNOWLEDGE
  out += "🧠 Aku proses dulu maksud kamu...<br>"

  // 2. DATABASE (dataMemori.js)
  if(dbResult){
    out += "📦 Dari database:<br>"
    out += dbResult.summary + "<br><br>"
  }

  // 3. OTACAI (reasoning engine)
  if(otakaiResult){
    out += "⚙️ Analisis otakai.js menemukan pola relevan.<br><br>"
  }

  // 4. EMOTION LAYER
  if(emotion === "empathetic"){
    out += "Aku ngerti ini mungkin berat buat kamu...<br>"
  }

  if(emotion === "analytical"){
    out += "Aku jelasin secara logis ya.<br>"
  }

  if(emotion === "focused"){
    out += "Ini topik teknis, aku breakdown pelan.<br>"
  }

  // 5. FINAL GPT FEELING
  out += "<br>🤖 Kesimpulan:<br>"
  out += "Aku menggabungkan database + pola otakai + konteks untuk menjawab secara paling relevan."

  return out
}

// =========================
// 🧠 MAIN FLOW
// =========================

function send(){

  let input=document.getElementById("input")
  let text=input.value
  if(!text)return

  add(text,"user")

  // STEP 1: emotion
  let emo = detectEmotion(text)

  // STEP 2: OTACAI ENGINE
  let otakaiResult = runOtakai(text)

  // STEP 3: DATABASE SEARCH
  let dbResult = searchDB(text)

  add("🧠 thinking...","ai")

  setTimeout(()=>{

    let response = buildResponse(
      text,
      dbResult,
      otakaiResult,
      emo
    )

    add(response,"ai")

  },600)

  input.value=""
}

// =========================
// UI
// =========================

function add(t,type){
  let d=document.createElement("div")
  d.className="msg "+type
  d.innerHTML=t
  document.getElementById("chat").appendChild(d)
  document.getElementById("chat").scrollTop=999999
}

</script>

</body>
</html>
