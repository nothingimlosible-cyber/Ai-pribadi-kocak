<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { background: #131314; color: #e3e3e3; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        
        .sidebar { background: #1e1f20; width: 260px; height: 100vh; flex-shrink: 0; transition: 0.3s; }
        .nav-item { transition: 0.2s; border-radius: 8px; cursor: pointer; color: #c4c7c5; }
        .nav-item:hover { background: #333537; color: white; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        .message-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .message-area::-webkit-scrollbar { display: none; }
        .chat-container { max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; }
        
        .user-row { display: flex; justify-content: flex-end; margin-bottom: 24px; }
        .user-bubble { background: #2b2d31; border-radius: 20px; padding: 12px 20px; max-width: 85%; font-size: 15px; }
        .ai-row { margin-bottom: 40px; }
        .ai-name { font-size: 11px; font-weight: 600; color: #8ab4f8; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .ai-text { font-size: 16px; line-height: 1.8; color: #e3e3e3; white-space: pre-line; }

        .input-section { padding: 20px; max-width: 850px; margin: 0 auto; width: 100%; }
        .input-box { background: #1e1f20; border-radius: 32px; padding: 8px 20px; display: flex; align-items: center; gap: 12px; }
        input { background: transparent; border: none; outline: none; color: white; width: 100%; height: 48px; font-size: 16px; }

        .dot { width: 4px; height: 4px; background: #8ab4f8; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex">

    <aside class="sidebar hidden md:flex flex-col p-4">
        <button onclick="location.reload()" class="flex items-center gap-3 p-3 mb-6 bg-[#333537] rounded-full text-sm font-medium hover:bg-[#444]">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Obrolan Baru
        </button>
        <div class="flex-1 overflow-y-auto">
            <p class="text-[10px] text-gray-500 font-bold px-3 mb-3 uppercase tracking-widest">History</p>
            <div id="historyList" class="space-y-1"></div>
        </div>
    </aside>

    <div class="main-content">
        <header class="p-4 flex justify-between items-center border-b border-white/5 bg-[#131314]">
            <h1 class="text-sm font-bold tracking-[3px]">SMART <span class="text-[#8ab4f8]">AI</span></h1>
            <div class="flex gap-4">
                 <button class="text-gray-500 hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg></button>
            </div>
        </header>

        <main id="chatWindow" class="message-area">
            <div class="chat-container" id="chatContainer">
                <div class="ai-row">
                    <div class="ai-name">Smart AI</div>
                    <div class="ai-text">Halo Kak Alan! Sistem Algoritma v10.5 sudah aktif. Silakan ajukan pertanyaan yang akurat.</div>
                </div>
            </div>
        </main>

        <footer class="input-section">
            <div class="input-box shadow-2xl">
                <input type="text" id="userInput" onkeypress="if(event.key==='Enter') startInference()" placeholder="Tanya sesuatu...">
                <div class="flex items-center gap-4 px-2">
                    <button class="text-gray-500 hover:text-white"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
                    <button onclick="startInference()" class="text-[#8ab4f8]"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
                </div>
            </div>
            <p class="text-[9px] text-center mt-3 text-gray-600 uppercase tracking-widest">Strict Heuristic Algorithm Active</p>
        </footer>
    </div>

    <script src="otakai.js"></script>
    <script>
        class StrictEngine {
            constructor() {
                this.noise = ['apakah', 'bagaimana', 'apa', 'itu', 'saya', 'kak', 'dong', 'bang', 'bisa', 'tolong'];
            }

            clean(t) {
                return t.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/)
                    .filter(w => w.length > 2 && !this.noise.includes(w));
            }

            // ALGORITMA v10.5 ORIGINAL (PALING PINTER)
            think(query, db) {
                const tokens = this.clean(query);
                let ranking = [];

                db.forEach(entry => {
                    let score = 0;
                    const topicStr = entry.topic.toLowerCase();
                    const summaryStr = entry.summary.toLowerCase();

                    tokens.forEach(tok => {
                        // Skor 10: Harus ada kata yang SAMA PERSIS di judul
                        if (topicStr.includes(tok)) score += 10.0;
                        // Skor 1.5: Kecocokan di isi
                        if (summaryStr.includes(tok)) score += 1.5;
                    });

                    if (score > 1.2) ranking.push({ ...entry, pwr: score });
                });

                return ranking.sort((a, b) => b.pwr - a.pwr)[0];
            }
        }

        const AI = new StrictEngine();

        function startInference() {
            const el = document.getElementById('userInput');
            const q = el.value.trim();
            if(!q) return;

            renderBubble(q, 'user');
            el.value = '';

            const rid = "ai-" + Date.now();
            renderBubble(`<div class="flex gap-1 py-2"><div class="dot"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>`, 'ai', rid);

            setTimeout(() => {
                const result = AI.think(q, typeof dataMemori !== 'undefined' ? dataMemori : []);
                const box = document.getElementById(rid);

                if (result) {
                    let out = result.summary;
                    if (out.includes('/')) {
                        const parts = out.split('/');
                        out = parts[Math.floor(Math.random() * parts.length)].trim();
                    }
                    box.innerHTML = `<div class="ai-text">${out}</div>`;
                    addHistory(result.topic);
                } else {
                    box.innerHTML = `<div class="ai-text italic opacity-40">Maaf, data spesifik tidak ditemukan. Cobalah kata kunci lain.</div>`;
                }
                scrollDown();
            }, 800);
        }

        function renderBubble(txt, type, id = null) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'user-row' : 'ai-row';
            div.innerHTML = type === 'user' 
                ? `<div class="user-bubble">${txt}</div>`
                : `<div class="ai-name">Smart AI</div><div id="${id}">${txt}</div>`;
            container.appendChild(div);
            scrollDown();
        }

        function addHistory(topic) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = "nav-item p-2 px-3 text-[11px] truncate mb-1";
            item.innerHTML = `<span class="opacity-30">#</span> ${topic}`;
            list.prepend(item);
        }

        function scrollDown() {
            const area = document.getElementById('chatWindow');
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
