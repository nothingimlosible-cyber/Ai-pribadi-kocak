  summary: 'A: ''Duh, perut udah keroncongan tapi bingung banget mau makan apa, rasanya
    semua warung biasa aja.'' B: ''Coba deh kita cari yang lagi viral di medsos atau
    mungkin pesan online aja biar nggak perlu panas-panasan keluar kantor.'' A: ''Iya
    juga sih, tapi takut mahal dan ongkirnya nambah lagi, dompet lagi tipis nih menjelang
    akhir bulan.'' B: ''Tenang, ada kok rekomendasi nasi padang langganan yang porsinya
    banyak harganya masih ramah di kantong, plus gratis es teh manis kalau beli paket
    hemat.'' A: ''Wah, ide bagus tuh, ayo sana langsung meluncur sebelum kehabisan
    lauk favorit kita.''  Keluhan macet total di jalan pulang kerja A: ''Gila sih,
    jalanan macetnya nggak karu-karuan, dari tadi cuma geser-geser dikit doang padahal
    biasanya lancar jaya.'' B: ''Iya nih, kayaknya ada kecelakaan di depan atau mungkin
    truk mogok yang bikin antrean jadi panjang banget sampai simpang empat.'' A: ''Duuh,
    gimana ini kalau begini terus, nanti ketinggalan acara nonton bareng di rumah
    teman, belum mandi lagi pula.'' B: ''Sabar aja, coba kita putar balik lewat jalan
    tikus sebelah kiri, biasanya sih sepi walau agak gelap tapi bisa potong waktu
    setengah jam.'' A: ''Oke deh, mending nyasar dikit daripada diam di sini stres
    liat lampu rem mobil depan mulu, hati-hati ya beloknya.''  Ajakan nugas bareng
    di kafe baru A: ''Eh, tugas kelompok kita belum kelar nih,deadline-nya besok pagi,
    mau nggak kita nugas bareng sore ini?'' B: ''Boleh banget, tapi jangan di kost
    dong, bising soalnya adik-adik lagi pada liburan di rumah.'' A: ''Gimana kalau
    ke kafe baru yang buka di seberang kampus itu, katanya WiFi-nya kenceng dan colokannya
    banyak di tiap meja.'' B: ''Wih, asik tuh, sekalian kita bisa pesan kopi biar
    melek ngerjain hitungan yang rumit itu, kamu bawa laptop kan?'' A: ''Siap, udah
    aku charge penuh dari tadi, nanti aku beliin camilan buat temen nugas biar nggak
    lapar di tengah jalan.'' B: ''Mantap, berarti ketemuan jam 4 sore di lobi kampus
    ya, jangan telat nanti tempat duduknya habis diambil orang.''  Curhat soal pacar
    yang jarang balas chat A: ''Akhir-akhir ini aku merasa aneh sama pacarku, chat
    dibalasnya lama banget kadang seharian cuma baca doang tanpa kabar.'' B: ''Hmm,
    mungkin dia lagi sibuk banget sama pekerjaan atau kuliahnya, coba tanya baik-baik
    dulu jangan langsung negatif thinking.'' A: ''Udah pernah tanya sih, jawabnya
    cuma ''lagi sibuk'' doang singkat banget, rasanya kayak diabaikan gitu lho.''
    B: ''Coba kasih dia ruang dulu beberapa hari, siapa tahu dia butuh waktu sendiri,
    kalau masih begini terus baru ajak ngobrol serius tatap muka.'' A: ''Iya sih,
    mungkin aku yang terlalu sensitif karena lagi kangen aja, thanks ya udah dengerin
    curhatanku.'' B: ''Santai aja, namanya juga hubungan pasti ada naik turunnya,
    yang penting komunikasi tetap terbuka jangan dipendam sendiri nanti sakit hati.''  Rencana
    liburan akhir tahun yang mendadak A: ''Eh, tiba-tiba aku pengen banget liburan
    akhir tahun ini, bosen banget kerja terus nggak punya waktu istirahat sama sekali.''
    B: ''Wah, ide bagus tuh, punya tujuan favorit belum? Mau ke pantai biar segar
    atau ke gunung biar dingin dan tenang?'' A: ''Pengennya sih ke pantai, tapi takut
    mahal kalau sekarang baru cari tiket pesawat dan hotel, musim liburan kan harga
    naik gila-gilaan.'' B: ''Tenang, kita bisa cari paket last minute yang sering
    diskon besar-besaran atau coba cari penginapan homestay milik warga yang lebih
    murah dari resort.'' A: ''Wah, bener juga, ayo nanti malam kita browsing bareng
    cari promo, siapa tahu dapat harga miring buat pergi berdua.'' B: ''Gas pol! Aku
    bakal cek aplikasi travel itu, kamu siapin cuti dulu sama bos biar nggak ditolak
    mendadak.''  Diskusi soal harga sembako yang naik terus A: ''Kamu ngerasa nggak
    sih belakangan ini harga beras sama minyak goreng naik drastis banget, belanja
    bulanan jadi membengkak?'' B: ''Iya banget, kemarin aku ke pasar cuma beli kebutuhan
    pokok biasa aja udah habis ratusan ribu, rasanya uang cepat banget habisnya.''
    A: ''Gimana dong caranya ngirit, kalau begini terus gaji pas-pasan cuma cukup
    buat makan doang nggak bisa nabung sama sekali.'' B: ''Mungkin kita bisa mulai
    beli dalam jumlah grosir bareng tetangga biar lebih murah, atau cari alternatif
    bahan makanan lokal yang harganya lebih stabil.'' A: ''Ide bagus tuh, nanti aku
    usul di grup WhatsApp RT buat patungan beli beras langsung dari penggilingan biar
    potong tengkulak.'' B: ''Setuju, daripada kelabakan sendiri-sendiri, mending kita
    gotong royong cari solusi biar dapur tetap ngebul dengan budget terbatas.''  Minta
    rekomendasi film untuk nonton malam minggu A: ''Minggu malam gini enaknya ngapain
    ya? Bosen banget kalau cuma scroll medsos terus tanpa tujuan jelas.'' B: ''Nonton
    film aja yuk, ada rekomendasi film seru yang lagi bagus ratingnya di bioskop atau
    streaming?'' A: ''Pengennya yang genre thriller misteri biar deg-degan, tapi jangan
    yang terlalu seram sampai nggak bisa tidur nanti.'' B: ''Coba tonton film terbaru
    yang lagi rame dibahas di Twitter itu, ceritanya tentang detektif yang memecahkan
    kasus pembunuhan berantai, alurnya pintar banget.'' A: ''Wah, terdengar menarik,
    ada di platform streaming mana tuh? Aku udah berlangganan beberapa aplikasi nih.''
    B: ''Ada di aplikasi biru itu, nanti aku kirim link-nya via chat, siapin popcorn
    sama selimut biar makin nyaman nontonnya.'' A: ''Oke siap, makasih rekomendasinya,
    semoga filmnya nggak ngecewain dan worth it buat nemenin malam minggu yang sepi
    ini.''  Keluhan WiFi lemot saat meeting penting A: ''Gawat nih, sinyal WiFi tiba-tiba
    lemot banget padahal lagi meeting penting sama klien dari luar negeri, suaranya
    putus-putus terus.'' B: ''Coba restart modemnya dulu kali, kadang emang butuh
    disegarkan lagi kalau udah nyala seharian penuh.'' A: ''Udah dicoba tapi masih
    sama aja, malah sekarang videonya freeze nggak gerak-gerak, malu banget kalau
    mereka kira kita nggak profesional.'' B: ''Coba pakai tethering HP aja sebagai
    cadangan, paket datamu kan masih banyak, ganti koneksi segera biar meeting bisa
    lanjut lancar.'' A: ''Oke siap, aku coba switch ke hotspot HP dulu, doain sih
    sinyalnya kuat jangan sampai putus di tengah penjelasan proposal.'' B: ''Siap,
    aku temani di sini sampai meeting selesai, kalau perlu aku bantu catat poin-poin
    penting yang terlewat gara-gara gangguan teknis.''  Ajakan olahraga pagi buta
    di hari Minggu A: ''Besok pagi bangun yuk, kita jogging keliling komplek biar
    badan seger dan nggak mager terus-terusan di rumah.'' B: ''Duh, berat banget bangun
    pagi buta di hari libur, rasanya pengen tidur lagi aja sampai siang.'' A: ''Ayolah,
    cuma 30 menit kok, habis itu kita bisa sarapan bubur ayam hangat enak banget sebagai
    hadiah buat tubuh yang udah bergerak.'' B: ''Hmm, kalau ada iming-iming sarapan
    enak sih mungkin bisa nyoba, tapi janji ya nggak boleh lari terlalu kencang nanti
    aku ngos-ngosan.'' A: ''Tenang, kita jalan santai aja dulu biar nggak kaget, yang
    penting keringetan dikit biar toksin keluar dan mood jadi bagus seharian.'' B:
    ''Ya udah deh deal, pasang alarm jam 6 pagi ya, jangan sampai kesiangan nanti
    kepanasan matahari.''  Bingung memilih jurusan kuliah untuk masa depan A: ''Aku
    masih bingung banget mau ambil jurusan apa tahun depan, antara ikut passion di
    seni atau pilih teknik yang katanya prospek kerjanya jelas.'' B: ''Itu sih dilema
    klasik, coba deh kamu list apa sih yang benar-benar kamu sukai dan bisa lakuin
    seharian tanpa merasa bosan atau tertekan.'' A: ''Aku sih suka gambar dan desain,
    tapi takut nanti susah cari kerja dan penghasilannya nggak menentu dibanding anak
    teknik.'' B: ''Sekarang zaman udah berubah, kreatifitas itu mahal harganya kalau
    kamu benar-benar jago dan punya portofolio yang kuat, banyak kok desainer sukses
    yang penghasilannya fantastis.'' A: ''Benar juga sih, mungkin aku kurang percaya
    diri aja, butuh riset lebih lanjut soal peluang karir di bidang kreatif itu.''
    B: ''Nanti malam kita cari info bareng ya, lihat alumni yang sukses di kedua jurusan
    itu biar kamu punya gambaran nyata sebelum memutuskan.'''
  topic: Bingung mau makan siang apa hari ini
