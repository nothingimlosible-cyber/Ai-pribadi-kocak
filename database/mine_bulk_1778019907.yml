  id: 1778019916
  summary: Kolonialisme Belanda di Indonesia dimulai sejak kedatangan VOC pada 1602
    yang mendapat hak octrooi untuk monopoli dagang, mencetak uang, dan memiliki tentara,
    lalu berlanjut menjadi pemerintahan Hindia Belanda setelah VOC bangkrut 1799.
    Eksploitasi ekonomi dilakukan lewat sistem Tanam Paksa atau Cultuurstelsel oleh
    Gubernur Jenderal Van den Bosch yang mewajibkan rakyat menanam komoditas ekspor
    seperti kopi, tebu, dan nila di seperlima tanahnya. Dampak sosialnya mencakup
    stratifikasi rasial, munculnya kaum priyayi birokrat, dan Politik Etis 1901 yang
    membuka pendidikan Barat bagi bumiputra sehingga melahirkan kaum terpelajar pergerakan
    nasional. Perlawanan bersenjata muncul seperti Perang Padri, Perang Jawa, Perang
    Aceh, dan Perang Banjar, sedangkan perlawanan modern dilakukan lewat organisasi
    Boedi Oetomo, Sarekat Islam, dan PNI. Kolonialisme berakhir secara de facto setelah
    Proklamasi 1945 dan de jure melalui Konferensi Meja Bundar 1949.
  topic: Kolonialisme Belanda di Indonesia
