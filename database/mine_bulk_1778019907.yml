  summary: "Kebudayaan Megalitikum di Indonesia berkembang sejak 2500 SM hingga awal\
    \ Masehi dengan ciri utama pembuatan bangunan batu besar untuk pemujaan arwah\
    \ leluhur dalam kepercayaan animisme-dinamisme. Bentuk peninggalannya beragam:\
    \ menhir sebagai tugu batu di Toraja dan Sumba, dolmen sebagai meja batu kubur\
    \ di Bondowoso, sarkofagus atau peti batu di Bali, punden berundak di Lebak Cibedug,\
    \ dan arca megalitik di Pasemah. Fungsi utamanya terkait upacara kematian, kesuburan,\
    \ dan status sosial, menunjukkan stratifikasi masyarakat prasejarah yang sudah\
    \ mengenal konsep pemimpin atau ketua adat. Tradisi megalitik masih hidup pada\
    \ masyarakat Nias dengan lompat batu dan di Flores dengan rumah adat Sa\u2019\
    o. Penelitian arkeologi menggunakan metode pertanggalan karbon dan tipologi artefak\
    \ untuk merekonstruksi migrasi Austronesia yang membawa budaya ini."
  topic: Kebudayaan Megalitikum di Indonesia
