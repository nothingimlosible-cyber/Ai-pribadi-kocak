  summary: "Runtuhnya Tembok Berlin pada 9 November 1989 menjadi simbol berakhirnya\
    \ Perang Dingin dan terbelahnya Eropa oleh Tirai Besi. Tembok dibangun 13 Agustus\
    \ 1961 oleh Jerman Timur untuk menghentikan eksodus warga ke Jerman Barat, dilengkapi\
    \ zona kematian, menara jaga, dan perintah tembak di tempat atau Schie\xDFbefehl.\
    \ Tekanan reformasi Glasnost dari Uni Soviet, demonstrasi damai Montagsdemonstrationen\
    \ di Leipzig, dan keputusan Hungaria membuka perbatasan dengan Austria memicu\
    \ krisis. Kesalahan pengumuman juru bicara G\xFCnter Schabowski bahwa aturan perjalanan\
    \ baru berlaku segera membuat warga menyerbu pos pemeriksaan, dan penjaga akhirnya\
    \ membuka gerbang. Peristiwa ini mempercepat reunifikasi Jerman 3 Oktober 1990\
    \ dan disintegrasi Blok Timur serta Pakta Warsawa."
  topic: Runtuhnya Tembok Berlin
