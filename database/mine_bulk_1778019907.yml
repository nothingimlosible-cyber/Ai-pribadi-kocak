  summary: Proklamasi Kemerdekaan Indonesia dibacakan oleh Soekarno didampingi Mohammad
    Hatta pada 17 Agustus 1945 pukul 10.00 WIB di Jalan Pegangsaan Timur No. 56 Jakarta,
    menandai berakhirnya kolonialisme Jepang dan Belanda. Naskah proklamasi dirumuskan
    di rumah Laksamana Maeda pada dini hari setelah Peristiwa Rengasdengklok, yaitu
    desakan golongan pemuda seperti Sukarni dan Chaerul Saleh agar kemerdekaan tidak
    terpengaruh Jepang. Teks asli ditulis tangan Soekarno, kemudian diketik oleh Sayuti
    Melik, dan ditandatangani atas nama bangsa Indonesia. Setelah pembacaan, bendera
    Merah Putih dijahit Fatmawati dikibarkan oleh Latief Hendraningrat, dan berita
    menyebar melalui radio dan kantor berita Domei. Proklamasi menjadi staatsfundamentalnorm
    yang kemudian dikukuhkan dalam UUD 1945 dan memicu Revolusi Fisik 1945-1949 untuk
    mempertahankan kedaulatan dari Agresi Militer Belanda.
  topic: Proklamasi Kemerdekaan Indonesia
