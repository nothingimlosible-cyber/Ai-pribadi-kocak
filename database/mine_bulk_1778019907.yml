  summary: Perang Salib adalah serangkaian ekspedisi militer bersenjata yang diserukan
    Gereja Katolik antara abad ke-11 hingga ke-13 dengan tujuan merebut Yerusalem
    dan Tanah Suci dari kekuasaan Dinasti Seljuk dan selanjutnya Dinasti Ayyubiyah.
    Perang Salib I tahun 1096-1099 dicetuskan Paus Urbanus II dalam Konsili Clermont
    dan berhasil mendirikan negara-negara Latin seperti Kerajaan Yerusalem, namun
    Perang Salib II hingga IV banyak mengalami kegagalan. Tokoh penting meliputi Richard
    the Lionheart dari Inggris, Saladin atau Salahuddin Al-Ayyubi yang merebut kembali
    Yerusalem 1187 pada Pertempuran Hattin, dan Frederick II yang melakukan diplomasi.
    Dampak jangka panjangnya adalah terbukanya jalur dagang Levant, transfer ilmu
    pengetahuan Arab ke Eropa, penguatan monarki Eropa, dan melemahnya Kekaisaran
    Bizantium setelah Perang Salib IV menjarah Konstantinopel 1204.
  topic: Perang Salib
