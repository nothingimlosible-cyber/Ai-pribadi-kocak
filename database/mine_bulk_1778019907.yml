  summary: Perang Dunia II adalah konflik militer global yang berlangsung dari 1 September
    1939 hingga 2 September 1945, melibatkan dua aliansi utama yaitu Blok Poros yang
    dipimpin Jerman Nazi, Italia Fasis, dan Jepang, melawan Blok Sekutu yang terdiri
    dari Britania Raya, Uni Soviet, Amerika Serikat, dan Tiongkok. Pemicu langsungnya
    adalah invasi Jerman ke Polandia dengan strategi Blitzkrieg, yang membuat Inggris
    dan Prancis menyatakan perang karena melanggar Perjanjian Versailles. Teater perang
    terbagi menjadi Teater Eropa dengan front Timur dan front Barat, serta Teater
    Pasifik yang ditandai peristiwa Pearl Harbor pada 7 Desember 1941. Perang ini
    memperkenalkan konsep perang total, Holocaust, penggunaan senjata nuklir di Hiroshima
    dan Nagasaki, serta Proyek Manhattan, dan berakhir dengan menyerahnya Jepang setelah
    pengeboman atom. Dampak geopolitiknya melahirkan PBB, Perang Dingin, dekolonisasi
    di Asia-Afrika, dan doktrin pembendungan atau containment.
  topic: Perang Dunia II
