  summary: Peradaban Mesir Kuno berkembang di sepanjang Lembah Sungai Nil dari sekitar
    3100 SM hingga 30 SM, ditandai dengan unifikasi Mesir Hulu dan Hilir oleh Firaun
    Menes atau Narmer pada Periode Dinasti Awal. Struktur politiknya bersifat teokrasi
    dengan firaun sebagai dewa-raja yang memiliki kekuasaan absolut dan dianggap inkarnasi
    Horus, didukung birokrasi vizier, nomarch, dan pendeta. Kemajuan teknologi mencakup
    pembangunan piramida di Giza pada Kerajaan Lama, sistem irigasi basin irrigation,
    kalender solar 365 hari, dan aksara hieroglif yang diuraikan lewat Batu Rosetta.
    Kepercayaan terhadap kehidupan setelah mati melahirkan praktik mumifikasi, Kitab
    Orang Mati, dan kompleks makam Lembah Para Raja di Kerajaan Baru. Peradaban ini
    runtuh setelah invasi Persia, Yunani di bawah Aleksander Agung, dan akhirnya menjadi
    provinsi Romawi setelah kematian Cleopatra VII.
  topic: Peradaban Mesir Kuno
