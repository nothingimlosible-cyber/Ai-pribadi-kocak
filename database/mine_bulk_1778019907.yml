  summary: 'Sumpah Pemuda adalah keputusan Kongres Pemuda Kedua yang diselenggarakan
    pada 27-28 Oktober 1928 di Batavia, dihadiri organisasi Jong Java, Jong Sumatranen
    Bond, Jong Ambon, dan PPPI, dengan tujuan menegaskan cita-cita persatuan Indonesia.
    Rumusan sumpah terdiri dari tiga poin: bertumpah darah satu tanah air Indonesia,
    berbangsa satu bangsa Indonesia, dan menjunjung bahasa persatuan bahasa Indonesia,
    yang pertama kali dibacakan oleh Mohammad Yamin. Kongres ini juga menetapkan lagu
    Indonesia Raya ciptaan Wage Rudolf Supratman sebagai lagu kebangsaan dan bendera
    Merah Putih sebagai simbol pergerakan. Sumpah Pemuda menjadi tonggak historis
    konsolidasi nasionalisme modern karena melampaui primordialisme kedaerahan dan
    menjadi landasan ideologis bagi Proklamasi 1945. Dokumen otentik kongres disimpan
    di Museum Sumpah Pemuda, Jalan Kramat Raya 106, Jakarta.'
  topic: Sumpah Pemuda
