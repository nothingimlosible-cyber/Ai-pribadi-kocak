  summary: Konferensi Asia-Afrika atau KAA diselenggarakan di Bandung pada 18-24 April
    1955 atas inisiatif Indonesia, India, Pakistan, Birma, dan Sri Lanka sebagai respons
    terhadap blok-blokan Perang Dingin. Konferensi dihadiri 29 negara dari Asia dan
    Afrika yang baru merdeka dengan tujuan mempromosikan kerja sama ekonomi dan kebudayaan,
    menentang kolonialisme, serta mendukung hak menentukan nasib sendiri atau self-determination.
    Hasil utama KAA adalah Dasasila Bandung yang berisi prinsip-prinsip koeksistensi
    damai, non-intervensi, dan penghormatan kedaulatan, yang menjadi cikal bakal Gerakan
    Non-Blok pada 1961. KAA juga memperkuat solidaritas Asia-Afrika, mengecam apartheid
    di Afrika Selatan, dan mendukung perjuangan Palestina serta Aljazair. Gedung Merdeka
    dan Gedung Dwi Warna menjadi situs historis yang merekam diplomasi bebas aktif
    Indonesia.
  topic: Konferensi Asia-Afrika
