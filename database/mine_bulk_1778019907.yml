  summary: Reformasi Gereja atau Reformasi Protestan adalah gerakan keagamaan abad
    ke-16 yang diprakarsai Martin Luther pada 1517 ketika memaku 95 dalil di Gereja
    Wittenberg sebagai protes terhadap praktik indulgensi Gereja Katolik. Luther menolak
    doktrin sola fide atau keselamatan hanya oleh iman, sola scriptura atau Alkitab
    sebagai otoritas tunggal, dan menerjemahkan Alkitab ke bahasa Jerman sehingga
    bisa diakses rakyat. Gerakan ini menyebar ke Swiss oleh Yohanes Calvin dengan
    konsep predestinasi, ke Inggris lewat Anglikanisme oleh Henry VIII, dan memicu
    Kontra-Reformasi Katolik melalui Konsili Trente dan Ordo Yesuit. Dampak historisnya
    mencakup pecahnya kekristenan Barat, perang agama seperti Perang Tiga Puluh Tahun,
    sekularisasi politik, dan penguatan negara-bangsa serta literasi karena percetakan.
  topic: Reformasi Gereja
