  id: 1778019923
  summary: Perang Vietnam berlangsung dari 1 November 1955 hingga 30 April 1975 sebagai
    konflik antara Vietnam Utara yang komunis didukung Uni Soviet dan Tiongkok melawan
    Vietnam Selatan yang didukung Amerika Serikat dalam konteks doktrin pembendungan.
    Akar konfliknya adalah Perjanjian Jenewa 1954 yang membagi Vietnam pada garis
    17 derajat LU setelah kekalahan Prancis di Dien Bien Phu. AS terlibat langsung
    setelah Insiden Teluk Tonkin 1964 dan menerapkan strategi Search and Destroy serta
    pengeboman Operation Rolling Thunder, sementara Viet Cong menggunakan perang gerilya
    dan Terowongan Cu Chi. Perang berakhir dengan Kejatuhan Saigon dan reunifikasi
    di bawah Republik Sosialis Vietnam, menewaskan lebih dari 3 juta orang. Dampaknya
    adalah sindrom Vietnam di politik AS, penguatan Gerakan Non-Blok, dan trauma Agent
    Orange.
  topic: Perang Vietnam
