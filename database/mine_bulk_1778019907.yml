  summary: Peradaban Yunani Kuno berkembang dari 800 SM hingga 146 SM dan menjadi
    fondasi peradaban Barat melalui konsep polis, demokrasi, filsafat, dan olimpiade.
    Periode Arkais melahirkan negara-kota seperti Athena dengan demokrasi langsung
    di bawah Kleisthenes dan Sparta dengan sistem militer oligarkis Likurgus. Zaman
    Keemasan Athena pada abad ke-5 SM di bawah Perikles menghasilkan Parthenon, drama
    tragedi Sophocles, dan filsafat Sokrates, Plato, serta Aristoteles yang mengembangkan
    logika dan metode ilmiah. Persatuan Yunani dicapai oleh Aleksander Agung dari
    Makedonia yang melakukan ekspansi Hellenisasi sampai India, menyebarkan bahasa
    Koine dan perpustakaan Aleksandria. Warisan Yunani meliputi mitologi, sistem arsitektur
    Doric, Ionic, Corinthian, serta pemikiran politik yang mempengaruhi Romawi dan
    Eropa modern.
  topic: Peradaban Yunani Kuno
