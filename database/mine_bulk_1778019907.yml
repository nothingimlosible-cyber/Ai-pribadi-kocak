  summary: Kerajaan Sriwijaya adalah kerajaan maritim Buddha Mahayana yang berpusat
    di Palembang, Sumatera, dan mencapai puncak kejayaan pada abad ke-7 hingga ke-11
    M sebagai pengendali jalur perdagangan Selat Malaka dan Selat Sunda. Bukti keberadaannya
    berasal dari Prasasti Kedukan Bukit 683 M, catatan pendeta Tiongkok I-Tsing, dan
    berita Arab, yang menyebut Sriwijaya sebagai pusat pembelajaran agama Buddha dengan
    Universitas Nalanda sebagai mitra. Kekuatan Sriwijaya bertumpu pada angkatan laut
    yang kuat, sistem kadatuan, dan hubungan upeti dengan kerajaan di Semenanjung
    Malaya, Jawa, dan Kalimantan. Kemunduran disebabkan serangan Rajendra Chola I
    dari India pada 1025 M, persaingan dengan Kerajaan Medang dan kemudian Majapahit,
    serta pendangkalan Sungai Musi yang menggeser bandar utama. Peninggalannya berupa
    kompleks Candi Muara Takus, arca Buddha, dan manuskrip Melayu Kuno.
  topic: Kerajaan Sriwijaya
