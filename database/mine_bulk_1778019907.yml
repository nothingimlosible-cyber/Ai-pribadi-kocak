  summary: "Revolusi Prancis periode 1789-1799 merupakan pergolakan sosial-politik\
    \ radikal yang meruntuhkan Ancien R\xE9gime, monarki absolut Bourbon, dan feodalisme\
    \ di Prancis. Krisis fiskal akibat keterlibatan dalam Perang Tujuh Tahun dan Revolusi\
    \ Amerika, ditambah sistem pajak yang timpang terhadap Estate Ketiga, memicu pertemuan\
    \ Etats-G\xE9n\xE9raux dan Sumpah Lapangan Tenis oleh Majelis Nasional. Penyerbuan\
    \ Penjara Bastille 14 Juli 1789 menjadi simbol perlawanan rakyat, diikuti Deklarasi\
    \ Hak Asasi Manusia dan Warga Negara yang mengusung prinsip libert\xE9, \xE9galit\xE9\
    , fraternit\xE9. Fase radikal dipimpin Maximilien Robespierre melalui Pemerintahan\
    \ Teror dan Komite Keselamatan Publik dengan penggunaan guillotine, sebelum akhirnya\
    \ digulingkan dalam Reaksi Thermidor. Revolusi berakhir dengan kudeta 18 Brumaire\
    \ oleh Napoleon Bonaparte yang menandai transisi ke Konsulat dan Kekaisaran, namun\
    \ ideologi nasionalisme dan republikanisme menyebar ke seluruh Eropa."
