  summary: Perang Dingin adalah periode ketegangan geopolitik dan persaingan ideologi
    antara Blok Barat kapitalis liberal pimpinan Amerika Serikat dan Blok Timur komunis
    pimpinan Uni Soviet yang berlangsung dari 1947 hingga 1991 tanpa konfrontasi militer
    langsung antar keduanya. Istilah ini dipopulerkan oleh Bernard Baruch dan dipicu
    oleh Doktrin Truman, Marshall Plan, serta blokade Berlin yang memunculkan kebijakan
    containment. Karakteristik utamanya adalah perlombaan senjata nuklir dengan konsep
    MAD atau Mutual Assured Destruction, perlombaan antariksa yang dimulai dari Sputnik
    1, dan perang proksi seperti Perang Korea, Krisis Rudal Kuba, serta Perang Vietnam.
    Aliansi militer NATO dan Pakta Warsawa menjadi instrumen kolektif kedua blok,
    sementara Gerakan Non-Blok muncul sebagai alternatif di Konferensi Asia-Afrika.
    Perang Dingin berakhir setelah kebijakan Glasnost dan Perestroika oleh Mikhail
    Gorbachev, runtuhnya Tembok Berlin 1989, dan disolusi Uni Soviet 1991.
  topic: Perang Dingin
