  summary: Kerajaan Majapahit merupakan kerajaan Hindu-Buddha maritim terbesar dalam
    historiografi Nusantara yang berdiri pada tahun 1293 M setelah Raden Wijaya berhasil
    mengusir pasukan Dinasti Yuan dan mendirikan ibu kota di Trowulan, Jawa Timur.
    Puncak kejayaan Majapahit terjadi pada masa pemerintahan Hayam Wuruk dengan Mahapatih
    Gajah Mada yang mencetuskan Sumpah Palapa untuk menyatukan Nusantara, konsep yang
    tercatat dalam Kakawin Nagarakretagama karya Mpu Prapanca. Sistem pemerintahan
    Majapahit menggunakan struktur mandala dengan wilayah inti Nagara Agung, daerah
    Mancanegara, dan Nusantara sebagai wilayah pengaruh yang membayar upeti, serta
    memiliki armada jong yang dominan dalam thalassocracy di Selat Malaka. Kemunduran
    Majapahit dipicu oleh perang saudara Paregreg, melemahnya ekonomi akibat pergeseran
    jalur perdagangan, dan ekspansi Kesultanan Demak, hingga akhirnya runtuh sekitar
    tahun 1527 M. Peninggalan arkeologis seperti Candi Tikus, Gapura Bajang Ratu,
    dan sistem irigasi subak menjadi bukti kemajuan teknik sipil dan agraria Majapahit.
  topic: Majapahit
