  summary: Kekaisaran Romawi adalah entitas politik dan sosial yang berpusat di kota
    Roma, dimulai dengan periode Kerajaan 753-509 SM, Republik 509-27 SM, dan Kekaisaran
    27 SM-476 M untuk Romawi Barat, serta berlanjut sebagai Kekaisaran Bizantium hingga
    1453 M. Transformasi menjadi kekaisaran terjadi setelah Augustus atau Oktavianus
    mengalahkan Markus Antonius pada Pertempuran Actium dan mendapat gelar Princeps
    dari Senat. Ciri khas Romawi meliputi hukum Dua Belas Tabel, sistem jalan raya
    Via Appia, aquaduct, Pax Romana yang menjamin stabilitas 200 tahun, dan legiun
    sebagai mesin militer profesional. Agama awalnya politeisme, kemudian Kristen
    menjadi agama negara melalui Edik Milano oleh Konstantinus Agung sebelum ibu kota
    dipindah ke Konstantinopel. Keruntuhan Romawi Barat disebabkan faktor invasi bangsa
    Barbar seperti Visigoth dan Vandal, krisis ekonomi inflasi, serta pembagian kekaisaran
    oleh Diokletianus melalui sistem Tetrarki.
  topic: Kekaisaran Romawi
