  id: 1778019915
  summary: Renaissance atau Renaisans adalah gerakan kebangkitan intelektual dan seni
    yang bermula di Italia pada abad ke-14 hingga ke-17 sebagai jembatan antara Abad
    Pertengahan dan Zaman Modern. Gerakan ini menekankan humanisme, yaitu kembalinya
    minat pada teks-teks klasik Yunani-Romawi, rasionalisme, dan antroposentrisme
    yang menempatkan manusia sebagai pusat kajian, berbeda dengan teosentrisme Abad
    Pertengahan. Kota Florence di bawah patronase Keluarga Medici menjadi pusat dengan
    tokoh seperti Leonardo da Vinci yang menerapkan sfumato, Michelangelo dengan fresco
    Kapel Sistina, dan Machiavelli lewat Il Principe. Penemuan mesin cetak oleh Johannes
    Gutenberg mempercepat diseminasi ilmu pengetahuan, sementara Filippo Brunelleschi
    mengembangkan perspektif linear dalam arsitektur. Renaissance melahirkan semangat
    inkuiri yang menjadi fondasi Revolusi Ilmiah dan Reformasi Protestan di Eropa
    Utara.
  topic: Renaissance
