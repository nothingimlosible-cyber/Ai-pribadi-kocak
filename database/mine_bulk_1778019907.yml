  summary: Revolusi Industri Kedua terjadi antara tahun 1870 hingga 1914 dan ditandai
    oleh penerapan ilmu pengetahuan pada industri secara masif, berbeda dengan Revolusi
    Industri Pertama yang berbasis batu bara dan mesin uap. Inovasi kuncinya adalah
    listrik yang dikembangkan Thomas Edison dan Nikola Tesla, baja murah lewat proses
    Bessemer, kimia industri, dan motor bakar internal oleh Karl Benz. Sistem produksi
    berubah dengan munculnya lini perakitan atau assembly line oleh Henry Ford yang
    menerapkan manajemen ilmiah Taylorisme untuk efisiensi. Dampaknya adalah urbanisasi
    gelombang kedua, munculnya korporasi modern dan kartel, imperialisme baru untuk
    mencari bahan baku dan pasar, serta kesenjangan buruh-kapital yang memicu ideologi
    Marxisme dan serikat pekerja. Revolusi ini juga melahirkan telegraf, telepon,
    dan jaringan kereta api transkontinental yang mempercepat globalisasi awal.
  topic: Revolusi Industri Kedua
