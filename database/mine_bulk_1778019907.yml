  id: 1778019924
  summary: Zaman Penjelajahan Samudra atau Age of Discovery pada abad ke-15 hingga
    ke-17 dipicu oleh jatuhnya Konstantinopel 1453 yang memutus jalur rempah Eropa
    ke Asia, sehingga Portugis dan Spanyol mencari rute laut baru. Pangeran Henry
    Sang Navigator mendirikan sekolah navigasi di Sagres, menghasilkan karavel dan
    astrolab, yang memungkinkan Bartolomeu Dias mencapai Tanjung Harapan 1488 dan
    Vasco da Gama sampai ke India 1498. Spanyol mendanai Christopher Columbus yang
    menemukan Benua Amerika 1492, diikuti Ferdinand Magellan dalam ekspedisi mengelilingi
    dunia 1519-1522. Perjanjian Tordesillas 1494 membagi dunia non-Eropa antara Spanyol
    dan Portugis, memicu kolonialisme, perdagangan budak Atlantik, dan pertukaran
    Kolumbus yang menyebarkan tanaman, hewan, dan penyakit. Era ini melahirkan merkantilisme
    dan peta dunia modern.
  topic: Zaman Penjelajahan Samudra
