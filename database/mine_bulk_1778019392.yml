  summary: 'Teori evolusi Darwin menjelaskan bahwa semua makhluk hidup berasal dari
    nenek moyang yang sama dan berubah pelan-pelan lewat seleksi alam. Ide utamanya
    adalah variasi: dalam satu spesies pasti ada individu yang sedikit beda, misalnya
    jerapah ada yang lehernya lebih panjang. Kalau lingkungannya banyak pohon tinggi,
    jerapah leher panjang lebih gampang makan, lebih sehat, dan lebih banyak punya
    anak, sedangkan yang leher pendek kalah saing. Sifat leher panjang itu diwariskan
    ke anaknya, lama-lama populasi jerapah jadi didominasi leher panjang. Jadi bukan
    individunya yang berubah saat hidup, tapi populasi yang berubah lintas generasi
    karena yang paling cocok dengan lingkungan yang bertahan. Bukti evolusi banyak:
    fosil, kemiripan embrio, dan DNA.'
  topic: Teori Evolusi Darwin
