- date: '2026-05-05'
  id: 1778019392
  summary: 'Candlestick adalah jenis grafik harga yang paling umum dipakai trader
    untuk membaca pergerakan pasar karena menampilkan 4 data penting sekaligus dalam
    satu periode: harga pembukaan, penutupan, tertinggi, dan terendah. Tubuh atau
    body candle yang tebal menunjukkan jarak antara harga buka dan tutup, sedangkan
    sumbu atau shadow menunjukkan harga tertinggi dan terendah yang sempat disentuh.
    Warna hijau atau putih biasanya berarti harga naik, sedangkan merah atau hitam
    berarti harga turun. Pola-pola seperti doji, hammer, engulfing, dan morning star
    sering dipakai trader untuk memprediksi pembalikan arah atau kelanjutan tren,
    tapi harus dikonfirmasi dengan volume dan indikator lain biar nggak kena sinyal
    palsu.'
  topic: Candlestick dalam Trading
- date: '2026-05-05'
  id: 1778019393
  summary: Risk management adalah pondasi utama supaya trader bisa bertahan lama di
    market karena trading tanpa manajemen risiko sama aja kaya judi. Prinsip paling
    dasarnya adalah aturan 1-2%, artinya sekali loss maksimal hanya merelakan 1-2%
    dari total modal supaya akun nggak jebol kalau kena rentetan rugi. Alat bantu
    utamanya ada stop loss untuk membatasi kerugian otomatis, take profit untuk mengunci
    keuntungan, dan position sizing untuk ngitung lot atau jumlah saham yang dibeli
    sesuai jarak SL. Trader profesional selalu ngitung risk to reward ratio minimal
    1:2, artinya kalau risiko 100 ribu maka target profit 200 ribu, jadi meski winrate
    cuma 40% pun akun masih bisa profit dalam jangka panjang.
  topic: Risk Management
