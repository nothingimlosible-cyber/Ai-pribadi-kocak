  summary: 'Sistem imun adalah pasukan pertahanan tubuh yang kerja 24 jam untuk ngelawan
    patogen seperti virus, bakteri, jamur, dan sel kanker. Pertahanan lapis pertama
    itu fisik seperti kulit, air liur, dan asam lambung yang ngeblokir kuman masuk.
    Kalau jebol, masuk ke imunitas bawaan yang langsung nyerang pakai sel fagosit
    dan natural killer tanpa pandang bulu. Lapis ketiga adalah imunitas adaptif yang
    lebih spesifik lewat sel T dan sel B yang bisa ingat musuh lama, makanya vaksin
    bekerja dengan ngelatih sel ini. Sistem imun bisa kacau juga: terlalu lemah bikin
    gampang sakit, terlalu kuat bisa nyerang tubuh sendiri jadi penyakit autoimun
    seperti lupus.'
  topic: Sistem Imun Tubuh
