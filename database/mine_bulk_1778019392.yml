  summary: 'Revolusi Industri adalah periode perubahan besar cara produksi dari tenaga
    manusia dan hewan ke mesin yang dimulai di Inggris sekitar tahun 1760-an. Penemuan
    mesin uap oleh James Watt jadi pemicu utama karena bisa menggerakkan pabrik tekstil,
    kereta api, dan kapal uap sehingga distribusi barang jadi jauh lebih cepat dan
    murah. Dampaknya luas banget: muncul kelas buruh dan kapitalis, urbanisasi besar-besaran
    karena orang pindah ke kota cari kerja, tapi juga muncul masalah polusi, jam kerja
    panjang, dan pekerja anak. Revolusi Industri terus berkembang jadi fase 2 dengan
    listrik dan baja, fase 3 dengan komputer, dan sekarang masuk fase 4 dengan AI
    dan otomasi.'
  topic: Revolusi Industri
