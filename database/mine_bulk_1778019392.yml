  summary: Gizi seimbang adalah susunan makanan sehari-hari yang mengandung zat gizi
    dalam jenis dan jumlah yang sesuai kebutuhan tubuh, bukan cuma 4 sehat 5 sempurna
    lagi. Pedoman 'Isi Piringku' dari Kemenkes membagi piring jadi 50% buah dan sayur,
    50% sisanya dibagi karbohidrat dan protein, ditambah batasi gula, garam, lemak.
    Karbohidrat jadi sumber energi utama, protein buat bangun sel dan otot, lemak
    bantu serap vitamin, sedangkan vitamin dan mineral jaga fungsi organ. Kekurangan
    gizi bisa bikin stunting, anemia, atau daya tahan turun, tapi kelebihan gizi juga
    bahaya karena memicu obesitas, diabetes, dan jantung. Jadi kuncinya di beragam,
    cukup, dan sesuai aktivitas harian.
  topic: Gizi Seimbang
- date: '2026-05-05'
  id: 1778019400
  summary: Support dan resistance adalah level harga penting di trading yang sering
    bikin harga mental atau berbalik arah karena banyaknya order beli dan jual di
    area itu. Support adalah lantai harga tempat buyer biasanya ngumpul sehingga harga
    susah turun lebih jauh, sedangkan resistance adalah atap harga tempat seller banyak
    nongkrong sehingga harga susah naik. Level ini bisa terbentuk dari harga tertinggi
    atau terendah sebelumnya, angka bulat seperti 1000, atau bantuan indikator moving
    average. Kalau harga berhasil jebol resistance, maka resistance itu bisa berubah
    jadi support baru, istilah ini disebut role reversal. Trader pakai S&R buat nentuin
    entry, stop loss, dan target profit yang logis.
  topic: Support dan Resistance
- date: '2026-05-05'
