  summary: Hukum Newton adalah 3 aturan dasar yang menjelaskan hubungan antara gaya
    dan gerak benda dan jadi fondasi fisika klasik. Hukum I atau kelembaman bilang
    kalau benda diam akan tetap diam dan benda bergerak akan tetap bergerak lurus
    beraturan kecuali ada gaya luar, contohnya penumpang terdorong ke depan saat mobil
    ngerem mendadak. Hukum II rumusnya F = m x a, artinya percepatan benda berbanding
    lurus dengan gaya dan berbanding terbalik dengan massa, makanya dorong gerobak
    kosong lebih enteng daripada gerobak penuh. Hukum III aksi-reaksi menyatakan setiap
    ada gaya aksi pasti ada gaya reaksi yang sama besar tapi berlawanan arah, seperti
    roket meluncur karena gas panas mendorong ke bawah dan roket terdorong ke atas.
  topic: Hukum Newton
