  summary: "Fotosintesis adalah proses tumbuhan hijau mengubah energi cahaya matahari\
    \ jadi energi kimia dalam bentuk glukosa yang terjadi di kloroplas, tepatnya di\
    \ klorofil daun. Prosesnya punya 2 tahap besar: reaksi terang di membran tilakoid\
    \ yang butuh cahaya untuk memecah air jadi oksigen, ATP, dan NADPH, lalu reaksi\
    \ gelap atau siklus Calvin di stroma yang nggak butuh cahaya langsung untuk menggabungkan\
    \ CO2 dengan ATP dan NADPH jadi gula. Persamaan umumnya 6CO2 + 6H2O + cahaya \u2192\
    \ C6H12O6 + 6O2, jadi selain menghasilkan makanan buat tumbuhan, fotosintesis\
    \ juga jadi sumber oksigen utama di bumi. Faktor yang mempengaruhi kecepatannya\
    \ antara lain intensitas cahaya, konsentrasi CO2, suhu, dan ketersediaan air."
  topic: Fotosintesis
