  summary: Perang Diponegoro atau Perang Jawa terjadi tahun 1825-1830 dan jadi salah
    satu perlawanan terbesar terhadap Belanda di Nusantara yang menelan korban lebih
    dari 200 ribu jiwa di pihak Jawa dan 15 ribu di pihak Belanda. Pemicunya adalah
    pemasangan patok jalan oleh Belanda melewati makam leluhur Pangeran Diponegoro
    di Tegalrejo tanpa izin, ditambah kebijakan pajak tanah dan campur tangan keraton
    yang bikin rakyat menderita. Diponegoro menggunakan strategi perang gerilya dengan
    basis di Goa Selarong dan mendapat dukungan luas dari petani, ulama, dan bangsawan.
    Perang berakhir setelah Belanda memakai taktik Benteng Stelsel dan berhasil menangkap
    Diponegoro lewat tipu muslihat di Magelang, lalu diasingkan ke Manado dan Makassar
    hingga wafat.
  topic: Perang Diponegoro
- date: '2026-05-05'
