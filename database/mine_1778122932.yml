  topic: Sapaan dalam Bahasa Indonesia
  summary: Assalamu'alaikum adalah salam Islami yang berarti "semoga keselamatan tercurah
    kepada kalian" dan biasa digunakan untuk menyapa sesama Muslim. / Kata "Hai" merupakan
    sapaan informal yang umum dipakai dalam percakapan sehari-hari untuk memulai obrolan
    secara santai. / Sapaan seperti "Halo", "Selamat pagi", atau "Permisi" juga sering
    digunakan tergantung situasi formal atau nonformal dan siapa lawan bicaranya.
