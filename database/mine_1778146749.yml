  topic: Nefron
  summary: 'Nefron adalah unit kerja terkecil ginjal. Nefron terdiri dari korpuskula
    renalis dan tubulus renalis. Korpuskula renalis terdiri dari kumpulan pembuluh
    kapiler yang disebut dengan nama glomerulus dan sebuah struktur mangkuk yang bernama
    kapsul Bowman. Tubulus renalis memanjang dari kapsul. Kapsul dan tubulus terhubung
    dan terdiri dari sel epitel dengan lumen. Seorang manusia dewasa memiliki 1 sampai
    1.5 juta nefron pada tiap ginjal. Darah disaring saat melewati tiga lapisan: sel
    endotelial pada dinding kapilari, membran basalnya, dan di antara proses kaki
    podosit pada lapisan kapsul tersebut.'
  date: '2026-05-07'
