  topic: Honda Beat (mobil)
  summary: Honda Beat adalah sebuah mobil berpenggerak roda belakang, mobil roadster
    dua pintu dengan konfigurasi mesin ditengah (mid-engine) yang diproduksi sejak
    tahun 1991-1996. Honda Beat itu adalah mobil terakhir yang disetujui oleh Soichiro
    Honda sebelum ia meninggal pada tahun 1991. Jumlah total mobil yang saat itu diproduksi
    sekitar 33.600 unit. Sebagian besar produksi terjadi pada tahun pertama, dan kemudian
    produksi dan penjualan turun secara drastis. Desain mobil berasal dari Pininfarina,
    yang kemudian menjual rencana desain ke Honda. Honda Beat adalah salah satu dari
    banyak mobil yang dirancang untuk memanfaatkan kelas Keicar, yakni sebuah segmen
    mobil rendah emisi atau di indonesia seperti LCGC tetapi peraturannya lebih ketat,
    bahkan ukuran dimensi pada mobil itu sendiri dihitung. [2]
