  topic: Charles K. Kao
  summary: Sir Charles Kuen Kao, GBM, KBE, FRS, FREng adalah seorang fisikawan dan
    insinyur elektro Hong Kong-Amerika-Britania yang menjadi perintis pengembangan
    dan penggunaan serat optik dalam telekomunikasi. Pada tahun 1960an, Kao membuat
    berbagai macam metode untuk menggabungkan serat kaca dengan laser untuk mengirim
    data digital, yang merupakan dasar bagi evolusi internet. "Komunikasi seperti
    yang kita tahu, termasuk internet, tidak akan ada tanpa serat optik," kata William
    Wulf, presiden National Academy of Engineering pada tahun 1999.
  date: '2026-05-07'
