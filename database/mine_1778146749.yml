  topic: Daftar wilayah otonom menurut negara
  summary: Daftar wilayah otonom yang diangkat oleh negara meliputi wilayah otonom
    di seluruh dunia. Sebuah wilayah otonom didefinisikan sebagai sebuah wilayah dari
    sebuah negara yang memiliki tingkat otonomi, atau memiliki kebebasan dari otoritas
    luar. Wilayah tersebut biasanya memiliki jarak geografi yang jauh dari negaranya,
    atau ditempati oleh minoritas nasional. Negara-negara yang meliputi wilayah-wilayah
    otonomi sering kali adalah federasi. Wilayah otonomi berbeda dengan unit federal
    dan negara independen yang dalam esensinya mereka menikmati status istimewa, dalam
    hubungannya dengan mayoritas teritorial sub-nasional di negara yang sama, yang
    meliputi beberapa kekuasaan legislatif, di dalam negara tersebut.
  date: '2026-05-07'
