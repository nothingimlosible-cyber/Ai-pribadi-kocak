  topic: Soraya Esfandiary-Bakhtiary
  summary: Soraya Esfandiary-Bakhtiary merupakan Permaisuri Kerajaan Iran setelah
    menikah dengan Mohammad Reza Syah Pahlavi pada tahun 1951 sebagai istri keduanya.
    Pernikahan mereka dihujani berbagai tekanan, terutama setelah diketahui bahwa
    Soraya sulit untuk memiliki keturunan. Ketika suaminya mengusulkan untuk menikah
    lagi demi mendapatkan seorang penerus, Soraya menentang keras usulan tersebut.
    Di sisi lain, suaminya juga tidak setuju dengan ide Soraya yang menyarankan agar
    ia turun takhta dan menyerahkan kekuasaan kepada saudara tirinya. Pada bulan Maret
    1958, mereka memutuskan untuk bercerai. Setelah itu, Soraya sempat menekuni karier
    sebagai pemeran dan menjalin hubungan dengan sutradara Italia, Franco Indovina,
    sebelum akhirnya hidup sebatang kara di Paris hingga akhir hayatnya.
