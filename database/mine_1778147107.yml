  topic: 25 Primata Paling Terancam Punah di Dunia
  summary: '25 Primata Paling Terancam Punah di Dunia adalah daftar spesies primata
    paling terancam punah yang dipilih dan diterbitkan oleh International Union for
    Conservation of Nature Species Survival Commission Primate Specialist Group, International
    Primatological Society (IPS), dan Conservation International (CI). Daftar 2012â€“2014
    ditambahkan Bristol Conservation and Science Foundation (BCSF) kepada daftar penerbit.
    IUCN/SSC PSG bekerja sama dengan CI untuk memulai daftar tersebut pada 2000, tetapi
    pada 2002, saat Kongres International Primatological Society ke-19, para primatologis
    meninjau dan memperdebatkan daftar tersebut, menghasilkan revisi 2002â€“2004 dan
    dorongan dari IPS. Publikasi tersebut sejak itu telah menjadi proyek bersama antara
    tiga organisasi konservasi dan telah direvisi setiap dua tahun setelah Kongres
    dwitahunan IPS. Dimulai dengan laporan 2004â€“2006, judulnya diubah menjadi "Primates
    in Peril: The World''s 25 Most Endangered Primates". Pada tahun yang sama, daftar
    tersebut melaui menyediakan informasi tentang setiap spesies, termasuk status
    konservasi mereka dan ancaman-ancaman yang mereka hadapi di alam liar. Teks spesies
    ditulis dalam kolaborasi dengan para pakar dalam bidang tersebut, dengan 60Â orang
    berkontribusi pada laporan 2006â€“2008 dan 85Â orang berkontribusi pada laporan
    2008â€“2010. Laporan 2004â€“2006 dan 2006â€“2008 diterbitkan dalam jurnal IUCN/SSC
    PSG Primate Conservation, sementara laporan 2008â€“2010 dan 2010-2012 diterbitkan
    sebagai publikasi-publikasi independen oleh seluruh tiga organisasi yang berkontribusi.'
