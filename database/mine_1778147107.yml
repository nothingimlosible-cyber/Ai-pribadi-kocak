  topic: Lugh
  summary: Lugus, sering disebut sebagai Lugh atau Lug menurut mitos celtic adalah
    dewa utama bagi Bangsa Celtic kuno, raja penguasa Tuatha DÃ© Danann. Dalam beberapa
    catatan oleh Julius Caesar, ia disandingkan dengan Mercury, dewa utama dalam mitologi
    Romawi karena memiliki kesamaan yang serupa. Ia juga dijuluki sebagai pejuang
    karena kemampuan bertarungnya di medan perang serta memiliki keahlian dalam membuat
    segala keterampilan pandai besi. Dalam peperangan Lugh dilengkapi dengan senjata
    tombak petir Assal atau Assail - seperti julukan pada namanya "Lugh Lama-fada"
    atau "Lug LÃ¡mfota", yang merujuk pada tombak petir-panjang miliknya yang tidak
    bisa dilawan oleh musuh manapun dan ahli dalam menggunakannya. Ia mempunyai dua
    tempat tinggal yang berada di Tara di County Meath dan di Moytura, di County Sligo.
    Bangsa Celtic kuno memperingati setiap tanggal 1 Agustus yang disebut dengan Lughnasa,
    yang diyakini mereka sebagai hari suci untuk Dewa Laugh. Kultusnya tersebar luas
    di seluruh Celtic kuno dan namanya hingga saat ini sering digunakan sebagai nama
    suatu tempat atau lokasi di berbagai wilayah di Eropa dan Britania Raya seperti
    Lyon, Laon, Leiden, dan Carlisle. Di sebagian tempat yang tidak pernah diduduki
    Bangsa Romawi seperti di Isle of Man dan Irlandia, ia diberi nama Sam Ildanach
    yang memiliki arti terampil menguasai berbagai seni dan kemampuan sekaligus. Di
    Wales, Lugh dikenal dengan nama Lleu Llaw Gyffes.
